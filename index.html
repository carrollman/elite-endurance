<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Paul Carroll — Elite Endurance 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#0f1117;--bg2:#181c27;--bg3:#1e2333;--bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.14);--tx:#e8eaf0;--mu:#8891a8;--te:#1bc4a0;--or:#f07830;--am:#f5c518;--re:#e84545;--bl:#4a90d9;--pu:#9b7dea;--gr:#4caf7a;--r:12px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5}
button,input,select,textarea{font-family:inherit}
.app{display:flex;flex-direction:column;min-height:100vh}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:40}
.hdr-logo{font-size:12px;font-weight:700;color:var(--te);letter-spacing:1.1px;text-transform:uppercase}
.hdr-sub{font-size:11px;color:var(--mu);margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:10px}
.sync{font-size:10px;color:var(--mu);background:var(--bg3);border:1px solid var(--bd);border-radius:20px;padding:3px 8px;white-space:nowrap;display:none}
.sync.err{color:var(--re);border-color:rgba(232,69,69,.3)}
.av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1bc4a0,#4a90d9);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.body{flex:1;overflow-y:auto;padding:16px 14px 90px}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bd);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{flex:1;background:transparent;border:none;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.ni{font-size:20px}
.nl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--mu);transition:color .15s}
.nl.on{color:var(--te)}
.card{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:16px}
.ct{font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.sc{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:0}
.sl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.sv{font-size:24px;font-weight:600;line-height:1}
.ss{font-size:10px;color:var(--mu);margin-top:3px}
.rc{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:12px 10px;text-align:center}
.rn{font-size:11px;font-weight:600;line-height:1.2;margin-bottom:2px}
.rd{font-size:10px;color:var(--mu);margin-bottom:8px}
.ry{font-size:28px;font-weight:700;line-height:1}
.rt{font-size:9px;color:var(--mu);margin-top:2px;margin-bottom:6px}
.rb{font-size:10px;font-weight:600}
.pbt{height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;margin-bottom:6px}
.pbf{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--te),var(--bl));transition:width .5s}
.pbl{display:flex;justify-content:space-between}
.pbl span{font-size:9px;color:var(--mu)}
.cw{position:relative;width:100%}
.leg{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mu)}
.ld{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.ins{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--rs);margin-bottom:8px;border:1px solid}
.ins-red{background:rgba(232,69,69,.08);border-color:rgba(232,69,69,.25)}
.ins-amber{background:rgba(245,197,24,.06);border-color:rgba(245,197,24,.2)}
.ins-green{background:rgba(76,175,122,.06);border-color:rgba(76,175,122,.2)}
.ins-blue{background:rgba(74,144,217,.06);border-color:rgba(74,144,217,.2)}
.ii{font-size:16px;flex-shrink:0;margin-top:1px}
.it{font-size:13px;line-height:1.5}
.itl{font-weight:600;margin-bottom:2px}
.hmw{overflow-x:auto;padding-bottom:4px}
.hmg{display:grid;gap:3px;width:max-content}
.hmc{width:13px;height:13px;border-radius:2px;position:relative;cursor:default}
.hmc:hover .hmt{display:block}
.hmt{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--bd2);border-radius:6px;padding:5px 8px;font-size:10px;white-space:nowrap;z-index:10;pointer-events:none}
.hml{display:flex;align-items:center;gap:5px;margin-top:8px;font-size:10px;color:var(--mu);flex-wrap:wrap}
.scard{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.smg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.smc{background:rgba(255,255,255,.03);border-radius:8px;padding:8px 10px}
.sml{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.smv{font-size:15px;font-weight:600}
.snt{font-size:12px;color:var(--mu);margin-top:8px;line-height:1.5}
.wcard{border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden;background:var(--bg3)}
.wcard.cur{border-color:var(--te);background:rgba(27,196,160,.04)}
.wh{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.whl{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wn{font-size:14px;font-weight:700}
.wdt{font-size:10px;color:var(--mu)}
.wpt{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;background:rgba(74,144,217,.15);color:var(--bl)}
.wch{color:var(--mu);font-size:14px;flex-shrink:0}
.wb{padding:0 14px 14px}
.wr{display:flex;gap:10px;padding:7px 0;border-top:1px solid rgba(255,255,255,.04)}
.wrd{font-size:11px;font-weight:600;color:var(--mu);width:28px;flex-shrink:0;padding-top:1px}
.wrs{font-size:13px}
.rgr{font-size:13px;color:var(--mu);margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.04)}
.rgr strong{color:var(--tx);font-weight:500}
.rwr{font-size:13px;color:var(--mu);margin-bottom:5px;padding-left:10px;border-left:2px solid rgba(255,255,255,.08)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.btn-save{width:100%;background:var(--te);color:#0f1117;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;margin-top:4px;cursor:pointer}
.btn-ref{background:transparent;border:1px solid var(--bd2);border-radius:var(--rs);padding:8px 16px;font-size:12px;color:var(--mu);display:flex;align-items:center;gap:6px;cursor:pointer}
.fld label{display:block;font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.fld input,.fld select,.fld textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--bd);border-radius:var(--rs);padding:11px 13px;color:var(--tx);font-size:16px;outline:none;transition:border-color .15s}
.fld input:focus,.fld select:focus{border-color:var(--te)}
.spin{width:28px;height:28px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--te);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ld-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:12px;color:var(--mu)}
.err-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:10px;text-align:center;padding:24px}
.err-title{font-size:16px;font-weight:600}
.err-sub{font-size:13px;color:var(--mu);max-width:300px;line-height:1.7}
.err-sub strong{color:var(--tx)}
.btn-act{background:var(--te);color:#0f1117;border:none;border-radius:var(--rs);padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px}
.empty{text-align:center;padding:60px 24px;color:var(--mu)}
.setup-step{display:flex;gap:12px;margin-bottom:14px;padding:14px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r)}
.setup-num{width:24px;height:24px;border-radius:50%;background:var(--te);color:#0f1117;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.setup-body{font-size:13px;line-height:1.6;color:var(--mu)}
.setup-body strong{color:var(--tx)}
.setup-body code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;font-size:12px;color:var(--te)}
.url-inp{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--bd);border-radius:var(--rs);padding:12px 14px;color:var(--tx);font-size:13px;outline:none;margin-top:6px}
.url-inp:focus{border-color:var(--te)}
.btn-conn{background:var(--te);color:#0f1117;border:none;border-radius:var(--rs);padding:12px 24px;font-size:14px;font-weight:700;width:100%;margin-top:8px;cursor:pointer}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:100;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;transition:opacity .2s;pointer-events:none}
.toast.on{opacity:1}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div>
      <div class="hdr-logo">Elite Endurance</div>
      <div class="hdr-sub" id="hdr-sub">Paul Carroll</div>
    </div>
    <div class="hdr-r">
      <div class="sync" id="sync"></div>
      <div class="av">PC</div>
    </div>
  </header>
  <main class="body" id="body">
    <div class="ld-state"><div class="spin"></div><span>Loading...</span></div>
  </main>
  <nav class="nav">
    <button class="nb" onclick="go('overview')"><span class="ni">&#128202;</span><span class="nl" id="nl-overview">Overview</span></button>
    <button class="nb" onclick="go('history')"><span class="ni">&#128203;</span><span class="nl" id="nl-history">History</span></button>
    <button class="nb" onclick="go('load')"><span class="ni">&#9889;</span><span class="nl" id="nl-load">Load</span></button>
    <button class="nb" onclick="go('plan')"><span class="ni">&#128197;</span><span class="nl" id="nl-plan">Plan</span></button>
    <button class="nb" onclick="go('races')"><span class="ni">&#127937;</span><span class="nl" id="nl-races">Races</span></button>
    <button class="nb" onclick="go('setup')"><span class="ni">&#9881;&#65039;</span><span class="nl" id="nl-setup">Setup</span></button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
var SKEY = 'ee_api_url_v2';
var APIURL = localStorage.getItem(SKEY) || '';
var TAB = 'overview';
var DATA = [];
var LAST_FETCH = 0;
var LAST_TIME = null;
var CHARTS = {};
var FETCH_ERR = false;

var PLAN = [
  [1,'2026-03-16','Strength Session A','4x1km @ 10k pace','Easy run 6km','Strength B + 5km','Rest','Long run 10km Z2','Easy cycle 60min','Base + 10k build'],
  [2,'2026-03-23','Strength Session A','5x800m @ 10k pace','Easy run 6km','Strength B + 5km','Rest','Long run 11km','Easy cycle 60min','Base + 10k build'],
  [3,'2026-03-30','Strength Session A','5x1km @ 10k pace','Easy run 6km','Strength B + 6km','Rest','Long run 12km','Recovery run 5km','Base + 10k build'],
  [4,'2026-04-06','Strength Session A','3x2km tempo','Easy run 6km','Strength B + 6km','Rest','Long run 12km','Easy cycle 60min','Base + 10k build'],
  [5,'2026-04-13','Strength Session A','6x1km @ 10k pace','Easy run 6km','Strength B + 6km','Rest','Long run 13km','Easy cycle 60min','10k peak'],
  [6,'2026-04-20','Strength Session A','4x1.5km threshold','Easy run 6km','Strength B + 6km','Rest','Long run 14km','Recovery run 5km','10k peak'],
  [7,'2026-04-27','Strength Session A','5x1km race pace','Easy run 5km','Strength B + 5km','Rest','Long run 12km','Easy cycle 45min','10k peak'],
  [8,'2026-05-04','Light strength','4x800m race pace','Easy run 5km','Easy run 4km','Rest','Killarney 10k','Recovery spin 30min','10k taper/race'],
  [9,'2026-05-11','Strength Session A','Tempo run 6km','Cycle 60min Z2','Strength B + 5km','Rest','Long ride 50km','Easy run 6km','Cycle base'],
  [10,'2026-05-18','Strength Session A','4x1km intervals','Cycle 75min Z2','Strength B + 6km','Rest','Long ride 70km','Easy run 6km','Cycle base'],
  [11,'2026-05-25','Strength Session A','Tempo run 7km','Cycle 75min Z2','Strength B + 5km','Rest','Long ride 90km','Easy run 6km','Cycle base'],
  [12,'2026-06-01','Strength Session A','5x1km intervals','Cycle 90min Z2','Strength B + 6km','Rest','Long ride 110km','Easy run 6km','Cycle base'],
  [13,'2026-06-08','Strength Session A','Tempo run 8km','Cycle 90min + tempo','Strength B + 5km','Rest','Long ride 130km','Easy run 6km','Ring build'],
  [14,'2026-06-15','Strength Session A','4x1km intervals','Cycle 75min Z2','Strength B + 5km','Rest','Long ride 150km','Recovery run 5km','Ring build'],
  [15,'2026-06-22','Light strength','Easy run 6km','Easy spin 45min','Rest','Easy spin 20min','Ring of Kerry 170km','Recovery','Ring taper/race'],
  [16,'2026-06-29','Strength Session A','Tempo run 8km','Easy run 6km','Strength B + 6km','Rest','Long run 14km','Recovery run 5km','Half build'],
  [17,'2026-07-06','Strength Session A','5x1km intervals','Easy run 6km','Strength B + 6km','Rest','Long run 15km','Easy cycle 45min','Half build'],
  [18,'2026-07-13','Strength Session A','Tempo run 9km','Easy run 7km','Strength B + 6km','Rest','Long run 16km','Recovery run 5km','Half build'],
  [19,'2026-07-20','Strength Session A','6x1km intervals','Easy run 7km','Strength B + 7km','Rest','Long run 17km','Easy cycle 45min','Half build'],
  [20,'2026-07-27','Strength Session A','Tempo run 10km','Easy run 7km','Strength B + 6km','Rest','Long run 18km','Recovery run 5km','Half build'],
  [21,'2026-08-03','Strength Session A','3x3km tempo','Easy run 7km','Strength B + 6km','Rest','Long run 18km','Recovery run 5km','Half peak'],
  [22,'2026-08-10','Strength Session A','5x1km intervals','Easy run 6km','Strength B + 6km','Rest','Long run 16km','Recovery run 5km','Half peak'],
  [23,'2026-08-17','Light strength','Tempo 6km','Easy run 6km','Easy run 6km','Rest','Long run 12km','Recovery','Half taper'],
  [24,'2026-08-24','Light strength','4x800m race pace','Easy run 6km','Easy run 5km','Rest','Dingle Half Marathon','Recovery','Race week'],
  [25,'2026-08-31','Recovery','Optional easy jog','Rest','Mobility','Rest','Optional easy walk','Rest','Post-race recovery']
];

var PLANNED_KM = [10,11,12,12,13,14,12,0,6,6,6,6,6,5,0,14,15,16,17,18,18,16,12,0,0];

var R1 = new Date('2026-05-09');
var R2 = new Date('2026-07-04');
var R3 = new Date('2026-09-05');

function daysUntil(d) {
  var now = new Date(); now.setHours(0,0,0,0);
  var diff = Math.ceil((d - now) / 86400000);
  return diff > 0 ? diff : 0;
}

function curWeek() {
  var s = new Date('2026-03-16'); s.setHours(0,0,0,0);
  var n = new Date(); n.setHours(0,0,0,0);
  var w = Math.floor((n - s) / (7*86400000)) + 1;
  return Math.max(1, Math.min(25, w));
}

function pn(v) {
  if (v === null || v === undefined || v === '') return null;
  var n = parseFloat(v);
  return isNaN(n) ? null : n;
}

function isDone(r) {
  return String(r['Completed?'] || '').trim().toLowerCase() === 'yes';
}

function wStats(data) {
  var weeks = {};
  for (var w = 1; w <= 25; w++) {
    weeks[w] = {run:0, cycle:0, dur:0, load:0, rpes:[], fats:[], done:0, total:0};
  }
  for (var i = 0; i < data.length; i++) {
    var r = data[i];
    var w = parseInt(r['Week']);
    if (!weeks[w]) continue;
    weeks[w].total++;
    if (isDone(r)) {
      weeks[w].done++;
      var run = pn(r['Run Distance (km)']) || 0;
      var cyc = pn(r['Cycle Distance (km)']) || 0;
      var dur = pn(r['Duration (min)']) || 0;
      var rpe = pn(r['RPE']);
      var fat = pn(r['Fatigue (1-5)']);
      weeks[w].run += run;
      weeks[w].cycle += cyc;
      weeks[w].dur += dur;
      if (dur > 0 && rpe !== null && rpe > 0) weeks[w].load += dur * rpe;
      if (rpe !== null && rpe > 0) weeks[w].rpes.push(rpe);
      if (fat !== null && fat > 0) weeks[w].fats.push(fat);
    }
  }
  var out = [];
  for (var w = 1; w <= 25; w++) {
    var d = weeks[w];
    var ar = d.rpes.length ? d.rpes.reduce(function(a,b){return a+b;},0)/d.rpes.length : null;
    var af = d.fats.length ? d.fats.reduce(function(a,b){return a+b;},0)/d.fats.length : null;
    out.push({
      week: w,
      run: Math.round(d.run*10)/10,
      cycle: Math.round(d.cycle*10)/10,
      dur: Math.round(d.dur),
      load: Math.round(d.load),
      avgRpe: ar ? Math.round(ar*10)/10 : null,
      avgFat: af ? Math.round(af*10)/10 : null,
      done: d.done,
      total: d.total,
      pct: d.total > 0 ? Math.round((d.done/d.total)*100) : 0,
      plan: PLANNED_KM[w-1]
    });
  }
  return out;
}

function toast(msg, col) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = col || '#1bc4a0';
  el.style.color = col ? '#fff' : '#0f1117';
  el.className = 'toast on';
  setTimeout(function(){ el.className = 'toast'; }, 2500);
}

function setSyncBadge(state) {
  var el = document.getElementById('sync');
  el.style.display = 'block';
  if (state === 'err') {
    el.className = 'sync err';
    el.textContent = 'Connection error';
  } else if (LAST_TIME) {
    el.className = 'sync';
    var m = Math.floor((Date.now() - LAST_TIME) / 60000);
    el.textContent = m < 1 ? 'Synced just now' : 'Synced ' + m + 'm ago';
  }
}

function killCharts() {
  var keys = Object.keys(CHARTS);
  for (var i = 0; i < keys.length; i++) {
    try { CHARTS[keys[i]].destroy(); } catch(e){}
  }
  CHARTS = {};
}

function mkChart(id, type, labels, datasets, opts) {
  var ctx = document.getElementById(id);
  if (!ctx) return;
  var base = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { color:'rgba(255,255,255,.04)' }, ticks: { color:'#8891a8', font:{size:9}, maxRotation:0, autoSkip:true, maxTicksLimit:13 } },
      y: { grid: { color:'rgba(255,255,255,.04)' }, ticks: { color:'#8891a8', font:{size:11} }, beginAtZero:true }
    }
  };
  if (opts) {
    if (opts.maxY) base.scales.y.max = opts.maxY;
  }
  CHARTS[id] = new Chart(ctx, { type:type, data:{labels:labels, datasets:datasets}, options:base });
}

// ── FETCH ──────────────────────────────────────────────────────────────────
function fetchData(force, cb) {
  if (!APIURL) { cb([]); return; }
  if (!force && DATA.length && (Date.now() - LAST_FETCH) < 120000) { cb(DATA); return; }

  var url = APIURL + (APIURL.indexOf('?') >= 0 ? '&' : '?') + 'action=getData&t=' + Date.now();
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = 12000;
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var json = JSON.parse(xhr.responseText);
        if (json.status === 'ok') {
          DATA = json.data;
          LAST_FETCH = Date.now();
          LAST_TIME = Date.now();
          FETCH_ERR = false;
          setSyncBadge('ok');
          cb(DATA);
          return;
        }
        throw new Error(json.error || 'Bad response');
      } catch(e) {
        FETCH_ERR = true;
        setSyncBadge('err');
        cb(DATA);
      }
    } else {
      FETCH_ERR = true;
      setSyncBadge('err');
      cb(DATA);
    }
  };
  xhr.onerror = xhr.ontimeout = function() {
    FETCH_ERR = true;
    setSyncBadge('err');
    cb(DATA);
  };
  xhr.send();
}

// ── NAV ────────────────────────────────────────────────────────────────────
function go(tab) {
  TAB = tab;
  var tabs = ['overview','history','load','plan','races','setup'];
  for (var i = 0; i < tabs.length; i++) {
    var el = document.getElementById('nl-' + tabs[i]);
    if (el) el.className = 'nl' + (tabs[i] === tab ? ' on' : '');
  }
  render();
}

function render() {
  killCharts();
  var body = document.getElementById('body');

  if (!APIURL) {
    document.getElementById('hdr-sub').textContent = 'Setup required';
    body.innerHTML = setupPage(true);
    return;
  }

  if (TAB === 'setup') { body.innerHTML = setupPage(false); return; }
  if (TAB === 'plan')  { body.innerHTML = planPage(curWeek()); scrollToCurWeek(); return; }
  if (TAB === 'races') { body.innerHTML = racesPage(); return; }

  body.innerHTML = '<div class="ld-state"><div class="spin"></div><span>Fetching from Google Sheets...</span></div>';

  fetchData(false, function(data) {
    if (FETCH_ERR && !data.length) {
      body.innerHTML = errPage();
      return;
    }
    var cw = curWeek();
    document.getElementById('hdr-sub').textContent = 'Paul Carroll - Week ' + cw + ' of 25';
    if (TAB === 'overview') overviewPage(data, cw);
    else if (TAB === 'history') historyPage(data);
    else if (TAB === 'load') loadPage(data, cw);
  });
}

function errPage() {
  return '<div class="err-state">' +
    '<div style="font-size:40px">&#9888;&#65039;</div>' +
    '<div class="err-title">Could not load data</div>' +
    '<div class="err-sub">The API returned an error or timed out.<br><br>' +
    '<strong>Check:</strong><br>' +
    '1. Apps Script deployed as Web App<br>' +
    '2. Who has access = <strong>Anyone</strong><br>' +
    '3. URL in Setup starts with https://script.google.com<br>' +
    '4. Try opening the URL directly in your browser</div>' +
    '<button class="btn-act" onclick="go(\'setup\')">Go to Setup</button>' +
    '<button class="btn-ref" style="margin-top:8px" onclick="refreshData()">&#8635; Try again</button>' +
    '</div>';
}

function refreshData() {
  DATA = [];
  LAST_FETCH = 0;
  FETCH_ERR = false;
  toast('Refreshing...');
  render();
}

// ── INSIGHTS ───────────────────────────────────────────────────────────────
function insights(ws, cw) {
  var out = [];
  var cwd = ws[cw-1];
  var pwd = ws[cw-2];

  if (cwd && pwd && cwd.load > 0 && pwd.load > 0) {
    var spike = ((cwd.load - pwd.load) / pwd.load) * 100;
    if (spike > 15) {
      out.push({c:'red', icon:'&#128308;', title:'Load spike this week (+' + Math.round(spike) + '%)', body:'Training load jumped more than 15% from last week. Consider an extra rest day or reduce intensity tomorrow.'});
    }
  }

  if (cwd && cwd.avgFat !== null && cwd.avgFat >= 4) {
    out.push({c:'red', icon:'&#128308;', title:'High fatigue (avg ' + cwd.avgFat + '/5)', body:'Average fatigue above 3.5 — your body is asking for recovery. Prioritise sleep and keep easy days easy.'});
  } else if (cwd && cwd.avgFat !== null && cwd.avgFat >= 3) {
    out.push({c:'amber', icon:'&#128992;', title:'Moderate fatigue building (' + cwd.avgFat + '/5)', body:'Fatigue is creeping up. Monitor closely and protect sleep and easy days this week.'});
  }

  var recent = [];
  for (var i = Math.max(0, cw-4); i < cw; i++) { if (ws[i] && ws[i].total > 0) recent.push(ws[i]); }
  if (recent.length) {
    var avgPct = Math.round(recent.reduce(function(a,w){return a+w.pct;},0) / recent.length);
    if (avgPct >= 85) out.push({c:'green', icon:'&#128994;', title:'Strong consistency (' + avgPct + '% over last ' + recent.length + ' weeks)', body:'Excellent adherence to the plan. Consistent training is your biggest asset heading into race prep.'});
    else if (avgPct < 60 && recent.length >= 2) out.push({c:'amber', icon:'&#128993;', title:'Consistency needs attention (' + avgPct + '% recently)', body:'Completion rate has dipped. Focus on the key sessions — intervals and long run — even if you miss others.'});
  }

  if (cw >= 23 && cw <= 25) out.push({c:'blue', icon:'&#128309;', title:'Taper phase — trust the process', body:'Volume drops now are intentional. Resist adding extra sessions. Your fitness is banked, the goal is freshness.'});

  var r1d = daysUntil(R1), r2d = daysUntil(R2), r3d = daysUntil(R3);
  if (r1d > 0 && r1d <= 14) out.push({c:'blue', icon:'&#127937;', title:'Killarney 10k in ' + r1d + ' days', body:'Race week: keep volume low, one short sharpener midweek, full rest the day before.'});
  if (r2d > 0 && r2d <= 14) out.push({c:'blue', icon:'&#128690;', title:'Ring of Kerry in ' + r2d + ' days', body:'Legs should feel springy. Short easy spin midweek, no hard efforts.'});
  if (r3d > 0 && r3d <= 14) out.push({c:'blue', icon:'&#127941;', title:'Dingle Half Marathon in ' + r3d + ' days', body:'Trust your training. Short sharpener Tuesday, easy shakeout Friday, race Saturday.'});

  if (!out.length) out.push({c:'green', icon:'&#9989;', title:'All systems good', body:'No alerts this week. Stay consistent, keep easy days easy, and trust the plan.'});
  return out;
}

function insHtml(ins) {
  var html = '';
  for (var i = 0; i < ins.length; i++) {
    var x = ins[i];
    html += '<div class="ins ins-' + x.c + '"><div class="ii">' + x.icon + '</div><div class="it"><div class="itl">' + x.title + '</div>' + x.body + '</div></div>';
  }
  return html;
}

// ── HEATMAP ────────────────────────────────────────────────────────────────
function heatmap(data) {
  var byDate = {};
  for (var i = 0; i < data.length; i++) {
    var r = data[i];
    var d = String(r['Date']).split('T')[0].split(' ')[0];
    byDate[d] = { done: isDone(r), type: String(r['Session Type'] || '').toLowerCase(), plan: r['Planned Session'] || '' };
  }

  var start = new Date('2026-03-16');
  var end = new Date('2026-09-06');
  var today = new Date(); today.setHours(0,0,0,0);
  var days = [];
  var d = new Date(start);
  while (d <= end) { days.push(new Date(d)); d.setDate(d.getDate()+1); }

  var firstDay = days[0].getDay();
  var pad = firstDay === 0 ? 6 : firstDay - 1;
  var totalCols = Math.ceil((pad + days.length) / 7);

  function cellColor(date, info) {
    if (date > today) return 'rgba(255,255,255,0.05)';
    if (!info) return 'rgba(255,255,255,0.05)';
    if (!info.done) return 'rgba(232,69,69,0.35)';
    var t = info.type;
    if (t.indexOf('run') >= 0 || t.indexOf('tempo') >= 0 || t.indexOf('interval') >= 0) return '#1bc4a0';
    if (t.indexOf('cycle') >= 0 || t.indexOf('ride') >= 0 || t.indexOf('spin') >= 0) return '#f07830';
    if (t.indexOf('strength') >= 0) return '#9b7dea';
    return '#4a90d9';
  }

  var cells = '';
  for (var i = 0; i < pad; i++) cells += '<div class="hmc" style="background:transparent"></div>';
  for (var i = 0; i < days.length; i++) {
    var key = days[i].toISOString().split('T')[0];
    var info = byDate[key];
    var color = cellColor(days[i], info);
    var tip = days[i].toLocaleDateString('en-IE', {day:'numeric',month:'short'});
    if (info) tip += ' - ' + info.plan + (info.done ? ' (done)' : ' (missed)');
    cells += '<div class="hmc" style="background:' + color + '"><span class="hmt">' + tip + '</span></div>';
  }

  var monthLabels = '';
  var colW = 13 + 3;
  var lastM = -1;
  var col = pad;
  for (var i = 0; i < days.length; i++) {
    var m = days[i].getMonth();
    if (m !== lastM) {
      var colPos = Math.floor(col / 7) * colW;
      monthLabels += '<span style="position:absolute;left:' + colPos + 'px;font-size:9px;color:var(--mu)">' + days[i].toLocaleDateString('en-IE',{month:'short'}) + '</span>';
      lastM = m;
    }
    col++;
  }

  var gridCols = 'repeat(' + totalCols + ',13px)';
  return '<div class="hmw">' +
    '<div style="position:relative;height:14px;width:' + (totalCols*16) + 'px;margin-bottom:2px">' + monthLabels + '</div>' +
    '<div class="hmg" style="grid-template-columns:' + gridCols + ';grid-template-rows:repeat(7,13px)">' + cells + '</div>' +
    '<div class="hml">' +
    '<div class="hmc" style="background:#1bc4a0;border-radius:2px;display:inline-block"></div> Run &nbsp;' +
    '<div class="hmc" style="background:#f07830;border-radius:2px;display:inline-block"></div> Cycle &nbsp;' +
    '<div class="hmc" style="background:#9b7dea;border-radius:2px;display:inline-block"></div> Strength &nbsp;' +
    '<div class="hmc" style="background:rgba(232,69,69,.35);border-radius:2px;display:inline-block"></div> Missed &nbsp;' +
    '<div class="hmc" style="background:rgba(255,255,255,.05);border-radius:2px;display:inline-block"></div> Upcoming' +
    '</div></div>';
}

    '<div class="rt">days</div>' +
    '<div class="rb" style="color:' + color + '">' + dist + '</div>' +
  '</div>';
}

// ── HISTORY ────────────────────────────────────────────────────────────────
function historyPage(data) {
  var done = data.filter(isDone).reverse();
  var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">' +
    '<div style="font-size:20px;font-weight:600">Session History</div>' +
    '<button class="btn-ref" onclick="refreshData()">&#8635; Refresh</button></div>' +
    '<div style="font-size:13px;color:var(--mu);margin-bottom:20px">' + done.length + ' completed sessions</div>';

  if (!done.length) {
    html += '<div class="empty"><div style="font-size:40px;opacity:.4;margin-bottom:12px">&#128203;</div>' +
      '<div style="font-size:15px;font-weight:600;color:var(--tx);margin-bottom:6px">No completed sessions yet</div>' +
      '<div>Mark sessions as Yes in the Completed? column of your Google Sheet</div></div>';
  } else {
    for (var i = 0; i < done.length; i++) {
      var r = done[i];
      var t = String(r['Session Type'] || '').toLowerCase();
      var kind = t.indexOf('run') >= 0 || t.indexOf('tempo') >= 0 || t.indexOf('interval') >= 0 ? 'run'
        : t.indexOf('cycle') >= 0 || t.indexOf('ride') >= 0 || t.indexOf('spin') >= 0 ? 'cycle'
        : t.indexOf('strength') >= 0 ? 'strength' : 'rest';
      var bcolors = {run:['#1bc4a0','rgba(27,196,160,.15)'],cycle:['#f07830','rgba(240,120,48,.15)'],strength:['#9b7dea','rgba(155,125,234,.15)'],rest:['#8891a8','rgba(136,145,168,.15)']};
      var bc = bcolors[kind];
      var runKm = pn(r['Run Distance (km)']) || 0;
      var cycKm = pn(r['Cycle Distance (km)']) || 0;

      html += '<div class="scard">' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">' +
          '<span class="badge" style="background:' + bc[1] + ';color:' + bc[0] + '">' + (r['Session Type'] || 'session') + '</span>' +
          '<span style="font-size:12px;color:var(--mu)">W' + r['Week'] + '</span>' +
        '</div>' +
        '<div style="font-size:13px;font-weight:600;margin-bottom:8px">' + r['Date'] + ' - ' + (r['Actual Description'] || r['Planned Session'] || '') + '</div>' +
        '<div class="smg">' +
          '<div class="smc"><div class="sml">Run</div><div class="smv" style="color:var(--te)">' + (runKm > 0 ? runKm + 'km' : '-') + '</div></div>' +
          '<div class="smc"><div class="sml">Cycle</div><div class="smv" style="color:var(--or)">' + (cycKm > 0 ? cycKm + 'km' : '-') + '</div></div>' +
          '<div class="smc"><div class="sml">RPE</div><div class="smv" style="color:var(--bl)">' + (r['RPE'] || '-') + '</div></div>' +
          '<div class="smc"><div class="sml">Fatigue</div><div class="smv" style="color:var(--re)">' + (r['Fatigue (1-5)'] || '-') + '</div></div>' +
        '</div>' +
        (r['Notes'] ? '<div class="snt">' + r['Notes'] + '</div>' : '') +
      '</div>';
    }
  }
  document.getElementById('body').innerHTML = html;
}

// ── LOAD ───────────────────────────────────────────────────────────────────
function loadPage(data, cw) {
  var ws = wStats(data);
  var curLoad = ws[cw-1] ? ws[cw-1].load : 0;
  var allLoads = ws.filter(function(w){return w.load>0;}).map(function(w){return w.load;});
  var avgLoad = allLoads.length ? Math.round(allLoads.reduce(function(a,b){return a+b;},0)/allLoads.length) : 0;
  var allFats = data.filter(isDone).map(function(r){return pn(r['Fatigue (1-5)']);}).filter(function(v){return v!==null&&v>0;});
  var avgFat = allFats.length ? (allFats.reduce(function(a,b){return a+b;},0)/allFats.length).toFixed(1) : '-';
  var labels = ws.map(function(w){return 'W'+w.week;});

  var loadColors = ws.map(function(w,i){
    if (!w.load) return 'rgba(255,255,255,.04)';
    var prev = i > 0 ? ws[i-1].load : 0;
    return prev > 0 && w.load > prev * 1.15 ? '#e84545' : '#4a90d9';
  });

  var cum = 0;
  var cumData = ws.map(function(w){ cum += w.run; return cum > 0 ? Math.round(cum*10)/10 : null; });

  document.getElementById('body').innerHTML =
    '<div style="font-size:20px;font-weight:600;margin-bottom:4px">Training Load</div>' +
    '<div style="font-size:13px;color:var(--mu);margin-bottom:20px">Load = sum of (duration x RPE) per session. Red = &gt;15% jump.</div>' +
    '<div class="g3">' +
      '<div class="sc"><div class="sl">This week</div><div class="sv" style="color:var(--am)">' + (curLoad || '-') + '</div><div class="ss">load score</div></div>' +
      '<div class="sc"><div class="sl">Avg load</div><div class="sv" style="color:var(--bl)">' + (avgLoad || '-') + '</div><div class="ss">per week</div></div>' +
      '<div class="sc"><div class="sl">Avg fatigue</div><div class="sv" style="color:var(--re)">' + avgFat + '</div><div class="ss">target below 3.5</div></div>' +
    '</div>' +
    '<div class="card"><div class="ct">Session load by week</div><div class="cw" style="height:200px"><canvas id="lc1"></canvas></div></div>' +
    '<div class="card"><div class="ct">Cumulative run km</div><div class="cw" style="height:180px"><canvas id="lc2"></canvas></div></div>' +
    '<div class="card" style="margin-bottom:0"><div class="ct">Run and cycle km by week</div><div class="cw" style="height:180px"><canvas id="lc3"></canvas></div>' +
      '<div class="leg"><div class="li"><div class="ld" style="background:var(--te)"></div>Run</div><div class="li"><div class="ld" style="background:var(--or)"></div>Cycle</div></div></div>';

  var loadDs = [{
    label:'Load',
    data: ws.map(function(w){return w.load||null;}),
    backgroundColor: loadColors,
    borderRadius: 3
  }];
  loadDs[0].backgroundColor = loadColors;
  mkChart('lc1','bar',labels,loadDs);
  mkChart('lc2','line',labels,[{label:'Cumulative run',data:cumData,borderColor:'#1bc4a0',backgroundColor:'rgba(27,196,160,.1)',tension:.3,pointRadius:2,fill:true}]);
  mkChart('lc3','bar',labels,[
    {label:'Run',data:ws.map(function(w){return w.run||null;}),backgroundColor:'#1bc4a0',borderRadius:3},
    {label:'Cycle',data:ws.map(function(w){return w.cycle||null;}),backgroundColor:'#f07830',borderRadius:3}
  ]);
}

// ── PLAN ───────────────────────────────────────────────────────────────────
function planPage(cw) {
  var days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var html = '<div style="font-size:20px;font-weight:600;margin-bottom:4px">Training Plan</div>' +
    '<div style="font-size:13px;color:var(--mu);margin-bottom:20px">25 weeks - currently Week ' + cw + '</div>';

  for (var i = 0; i < PLAN.length; i++) {
    var row = PLAN[i];
    var isCur = row[0] === cw;
    var sd = new Date(row[1]).toLocaleDateString('en-IE',{day:'numeric',month:'short'});
    html += '<div class="wcard' + (isCur ? ' cur' : '') + '" id="wk' + row[0] + '">' +
      '<div class="wh" onclick="toggleWeek(' + row[0] + ')">' +
        '<div class="whl">' +
          '<span class="wn" style="color:' + (isCur ? 'var(--te)' : 'var(--tx)') + '">' + row[0] + (isCur ? ' - now' : '') + '</span>' +
          '<span class="wdt">' + sd + '</span>' +
          '<span class="wpt">' + row[9] + '</span>' +
        '</div>' +
        '<span class="wch" id="wch' + row[0] + '">' + (isCur ? '&#9652;' : '&#9662;') + '</span>' +
      '</div>' +
      '<div class="wb" id="wb' + row[0] + '" style="display:' + (isCur ? 'block' : 'none') + '">';
    for (var j = 0; j < days.length; j++) {
      html += '<div class="wr"><span class="wrd">' + days[j] + '</span><span class="wrs">' + row[j+2] + '</span></div>';
    }
    html += '</div></div>';
  }
  return html;
}

function scrollToCurWeek() {
  setTimeout(function(){
    var el = document.getElementById('wk' + curWeek());
    if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
  }, 100);
}

function toggleWeek(w) {
  var b = document.getElementById('wb'+w);
  var c = document.getElementById('wch'+w);
  if (!b) return;
  var open = b.style.display !== 'none';
  b.style.display = open ? 'none' : 'block';
  c.innerHTML = open ? '&#9662;' : '&#9652;';
}

      raceweek:['Warm-up: 10-15 min jog + drills + 3-4 strides','Race week: light strength Mon, 4x800m Wed at race pace','Day before: 20-30 min easy or full rest','Avoid: hard gym, extra mileage, testing fitness'] },
    { color:'var(--or)', name:'Ring of Kerry Cycle', date:'Saturday 4 July 2026', week:15,
      pacing:[['Start','Conservative - ride well below ego'],['Fuel','60-90g carbs/hr from first 30 min'],['Fluid','500-750ml/hr, 500-700mg sodium/hr'],['Rule','Never chase groups above your plan']],
      raceweek:['Short easy sessions only - legs must feel fresh','Wed: easy 45min spin + 2-3 cadence lifts only','Day before: easy check spin 20min or full rest','Warm-up: first 20 min of the ride IS your warm-up'] },
    { color:'var(--pu)', name:'Dingle Half Marathon', date:'Saturday 5 September 2026', week:24,
      pacing:[['0-5km','Conservative 5:05-5:10/km'],['5-15km','Settle at race rhythm'],['15-21km','Build if strong - target 5:00/km avg'],['Goal','1:45 finish']],
      raceweek:['Warm-up: 12-15 min jog + mobility + 3 strides','Race week: 4x800m Wed at threshold/race rhythm','Day before: easy shakeout + 3 strides, or rest','Higher carbs day before - small gel only if practiced','Avoid: poor sleep, long standing, starting too fast'] }
  ];

  var html = '<div style="font-size:20px;font-weight:600;margin-bottom:4px">Race Guides</div>' +
    '<div style="font-size:13px;color:var(--mu);margin-bottom:20px">Pacing, fuelling and race week strategy</div>';

  for (var i = 0; i < races.length; i++) {
    var r = races[i];
    html += '<div class="card">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">' +
        '<div style="width:10px;height:10px;border-radius:50%;background:' + r.color + ';flex-shrink:0"></div>' +
        '<div><div style="font-size:15px;font-weight:600">' + r.name + '</div>' +
        '<div style="font-size:11px;color:var(--mu)">' + r.date + ' - Week ' + r.week + '</div></div>' +
      '</div>' +
      '<div class="ct">Pacing</div>';
    for (var j = 0; j < r.pacing.length; j++) {
      html += '<div class="rgr"><strong>' + r.pacing[j][0] + '</strong> - ' + r.pacing[j][1] + '</div>';
    }
    html += '<div class="ct" style="margin-top:14px">Race week</div>';
    for (var j = 0; j < r.raceweek.length; j++) {
      html += '<div class="rwr">' + r.raceweek[j] + '</div>';
    }
    html += '</div>';
  }
  return html;
}

// ── SETUP ──────────────────────────────────────────────────────────────────
function setupPage(first) {
  return '<div style="max-width:480px;margin:0 auto">' +
    '<div style="font-size:20px;font-weight:600;margin-bottom:4px">' + (first ? 'Setup Required' : 'Setup') + '</div>' +
    '<div style="font-size:13px;color:var(--mu);margin-bottom:20px">' + (first ? 'Connect your Google Sheet to activate the dashboard' : 'Update your Google Apps Script URL') + '</div>' +
    '<div class="setup-step"><div class="setup-num">1</div><div class="setup-body"><strong>Open your Google Sheet</strong> then go to <strong>Extensions</strong> then <strong>Apps Script</strong></div></div>' +
    '<div class="setup-step"><div class="setup-num">2</div><div class="setup-body">Paste in the <code>google_apps_script.gs</code> code and click <strong>Save</strong></div></div>' +
    '<div class="setup-step"><div class="setup-num">3</div><div class="setup-body">Click <strong>Deploy</strong> then <strong>New deployment</strong><br>Type: <strong>Web app</strong><br>Execute as: <strong>Me</strong><br>Who has access: <strong>Anyone</strong><br>Click Deploy and authorise when prompted</div></div>' +
    '<div class="setup-step"><div class="setup-num">4</div><div class="setup-body">Copy the <strong>Web app URL</strong> (ends in /exec) and paste below</div></div>' +
    '<div class="fld"><label>Google Apps Script URL</label>' +
    '<input type="url" id="url-inp" placeholder="https://script.google.com/macros/s/..." value="' + APIURL + '" style="width:100%;background:rgba(255,255,255,.05);border:1px solid var(--bd);border-radius:var(--rs);padding:12px 14px;color:var(--tx);font-size:13px;outline:none;margin-top:6px">' +
    '</div>' +
    '<button class="btn-conn" onclick="saveUrl()">Save and Connect</button>' +
    (APIURL ? '<button class="btn-ref" style="width:100%;margin-top:10px;justify-content:center" onclick="refreshData()">&#8635; Refresh data from Google Sheets</button>' : '') +
    '<div style="margin-top:20px;padding:14px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);font-size:12px;color:var(--mu);line-height:1.7">' +
    '<strong style="color:var(--tx)">How it works:</strong><br>' +
    'Paul logs sessions in the <strong>Training_Log</strong> tab by marking Completed? as <strong>Yes</strong> and filling in actuals. The dashboard reads from the sheet automatically.</div>' +
  '</div>';
}

function saveUrl() {
  var el = document.getElementById('url-inp');
  if (!el) return;
  var url = el.value.trim();
  if (!url || url.indexOf('https://') !== 0) { toast('Please enter a valid URL', '#e84545'); return; }
  APIURL = url;
  localStorage.setItem(SKEY, url);
  DATA = [];
  toast('Saved! Loading data...');
  go('overview');
}

// ── INIT ───────────────────────────────────────────────────────────────────
go('overview');
setInterval(function(){ if (LAST_TIME) setSyncBadge('ok'); }, 60000);
</script>
</body>
</html>
