<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Paul Carroll — Elite Endurance 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:#0f1117; --bg2:#181c27; --bg3:#1e2333;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
  --text:#e8eaf0; --muted:#8891a8;
  --teal:#1bc4a0; --orange:#f07830; --amber:#f5c518;
  --red:#e84545; --blue:#4a90d9; --purple:#9b7dea; --green:#4caf7a;
  --radius:12px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

/* ── Layout ── */
.app{display:flex;flex-direction:column;min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:40}
.header-left .logo{font-size:12px;font-weight:700;color:var(--teal);letter-spacing:1.1px;text-transform:uppercase}
.header-left .sub{font-size:11px;color:var(--muted);margin-top:1px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1bc4a0,#4a90d9);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:16px 14px 90px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;background:transparent;border:none;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn .nav-icon{font-size:20px}
.nav-btn .nav-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;transition:color .15s}
.nav-btn .nav-active-bar{width:16px;height:2px;background:var(--teal);border-radius:1px}

/* ── Cards & layout ── */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.card-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.section-title{font-size:20px;font-weight:600;margin-bottom:4px}
.section-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.mb16{margin-bottom:16px}

/* ── Stat cards ── */
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.stat-value{font-size:24px;font-weight:600;line-height:1}
.stat-sub{font-size:10px;color:var(--muted);margin-top:3px}

/* ── Race countdown cards ── */
.race-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 10px;text-align:center}
.race-card-name{font-size:11px;font-weight:600;line-height:1.2;margin-bottom:2px}
.race-card-date{font-size:10px;color:var(--muted);margin-bottom:8px}
.race-card-days{font-size:28px;font-weight:700;line-height:1}
.race-card-daystxt{font-size:9px;color:var(--muted);margin-top:2px;margin-bottom:6px}
.race-card-dist{font-size:10px;font-weight:600}

/* ── Phase bar ── */
.phase-bar-track{height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;margin-bottom:6px}
.phase-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--teal),var(--blue));transition:width .5s}
.phase-bar-labels{display:flex;justify-content:space-between}
.phase-bar-labels span{font-size:9px;color:var(--muted)}

/* ── Chart wrappers ── */
.chart-wrap{position:relative;width:100%}

/* ── Legend ── */
.legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* ── Log form ── */
.form-row{display:grid;gap:12px;margin-bottom:12px}
.form-row.cols-2{grid-template-columns:1fr 1fr}
.form-row.cols-3{grid-template-columns:1fr 1fr 1fr}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;color:var(--text);font-size:16px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal)}
.field select option{background:var(--bg3)}
.field textarea{min-height:72px;resize:vertical}
.type-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.type-btn{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 4px;font-size:12px;font-weight:600;color:var(--muted);text-transform:capitalize;transition:all .15s}
.bar-track{display:flex;gap:3px;margin-top:6px}
.bar-seg{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.1);transition:background .15s}
.btn-save{width:100%;background:var(--teal);color:#0f1117;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;margin-top:4px}
.btn-save:active{opacity:.85}

/* ── Session history cards ── */
.session-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.session-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.session-mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.session-mini-cell{background:rgba(255,255,255,.03);border-radius:8px;padding:8px 10px}
.session-mini-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.session-mini-value{font-size:15px;font-weight:600}
.session-notes{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}

/* ── Week accordion ── */
.week-card{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.week-card.current{border-color:var(--teal);background:rgba(27,196,160,.04)}
.week-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.week-header-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.week-num{font-size:14px;font-weight:700}
.week-date{font-size:10px;color:var(--muted)}
.phase-tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;background:rgba(74,144,217,.15);color:var(--blue)}
.week-chevron{color:var(--muted);font-size:14px;transition:transform .2s;flex-shrink:0}
.week-body{padding:0 14px 14px}
.week-row{display:flex;gap:10px;padding:7px 0;border-top:1px solid rgba(255,255,255,.04)}
.week-row-day{font-size:11px;font-weight:600;color:var(--muted);width:28px;flex-shrink:0;padding-top:1px}
.week-row-session{font-size:13px}

/* ── Race guide ── */
.race-guide-card{margin-bottom:16px}
.race-guide-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.race-guide-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.race-guide-name{font-size:15px;font-weight:600}
.race-guide-date{font-size:11px;color:var(--muted)}
.race-guide-row{font-size:13px;color:var(--muted);margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.04)}
.race-guide-row strong{color:var(--text);font-weight:500}
.race-week-row{font-size:13px;color:var(--muted);margin-bottom:5px;padding-left:10px;border-left:2px solid rgba(255,255,255,.08)}

/* ── Loading / error states ── */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:12px;color:var(--muted)}
.spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 24px;color:var(--muted)}
.empty-icon{font-size:40px;opacity:.4;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}

/* ── Config screen ── */
.config-wrap{max-width:480px;margin:0 auto}
.config-url-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-size:13px;outline:none;margin-top:6px;word-break:break-all}
.config-url-input:focus{border-color:var(--teal)}
.config-step{display:flex;gap:12px;margin-bottom:16px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius)}
.config-step-num{width:24px;height:24px;border-radius:50%;background:var(--teal);color:#0f1117;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.config-step-body{font-size:13px;line-height:1.6;color:var(--muted)}
.config-step-body strong{color:var(--text)}
.config-step-body code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;font-size:12px;color:var(--teal)}
.btn-config-save{background:var(--teal);color:#0f1117;border:none;border-radius:var(--radius-sm);padding:12px 24px;font-size:14px;font-weight:700;width:100%;margin-top:8px}
.btn-refresh{background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 16px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.btn-refresh:active{opacity:.7}

/* ── Toast ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:100;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

/* ── Completion dots ── */
.completion-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.comp-dot{width:10px;height:10px;border-radius:50%}
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-left">
      <div class="logo">Elite Endurance</div>
      <div class="sub" id="hdr-sub">Paul Carroll · Loading...</div>
    </div>
    <div class="avatar">PC</div>
  </header>

  <main class="content" id="content">
    <div class="loading-state"><div class="spinner"></div><span>Loading dashboard...</span></div>
  </main>

  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-btn" onclick="navigate('overview')">
      <span class="nav-icon">📊</span>
      <span class="nav-label" id="nl-overview">Overview</span>
    </button>
    <button class="nav-btn" onclick="navigate('history')">
      <span class="nav-icon">📋</span>
      <span class="nav-label" id="nl-history">History</span>
    </button>
    <button class="nav-btn" onclick="navigate('load')">
      <span class="nav-icon">⚡</span>
      <span class="nav-label" id="nl-load">Load</span>
    </button>
    <button class="nav-btn" onclick="navigate('plan')">
      <span class="nav-icon">📅</span>
      <span class="nav-label" id="nl-plan">Plan</span>
    </button>
    <button class="nav-btn" onclick="navigate('races')">
      <span class="nav-icon">🏁</span>
      <span class="nav-label" id="nl-races">Races</span>
    </button>
    <button class="nav-btn" onclick="navigate('setup')">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label" id="nl-setup">Setup</span>
    </button>
  </nav>

</div>
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'elite_endurance_api_url';
let API_URL = localStorage.getItem(STORAGE_KEY) || '';
let currentTab = 'overview';
let trainingData = [];
let lastFetch = 0;
let chartInstances = {};

// ─── PLAN DATA ─────────────────────────────────────────────────────────────
const PLAN = [
  [1,'2026-03-16','Strength Session A','4×1km @ 10k pace','Easy run 6km','Strength B + 5km easy','Rest / mobility','Long run 10km Z2','Easy cycle 60min','Base + 10k build'],
  [2,'2026-03-23','Strength Session A','5×800m @ 10k pace','Easy run 6km','Strength B + 5km easy','Rest / mobility','Long run 11km','Easy cycle 60min','Base + 10k build'],
  [3,'2026-03-30','Strength Session A','5×1km @ 10k pace','Easy run 6km','Strength B + 6km easy','Rest / mobility','Long run 12km','Recovery run 5km','Base + 10k build'],
  [4,'2026-04-06','Strength Session A','3×2km tempo','Easy run 6km','Strength B + 6km easy','Rest / mobility','Long run 12km','Easy cycle 60min','Base + 10k build'],
  [5,'2026-04-13','Strength Session A','6×1km @ 10k pace','Easy run 6km','Strength B + 6km easy','Rest / mobility','Long run 13km','Easy cycle 60min','10k peak'],
  [6,'2026-04-20','Strength Session A','4×1.5km threshold','Easy run 6km','Strength B + 6km easy','Rest / mobility','Long run 14km','Recovery run 5km','10k peak'],
  [7,'2026-04-27','Strength Session A','5×1km race pace','Easy run 5km','Strength B + 5km easy','Rest / mobility','Long run 12km','Easy cycle 45min','10k peak'],
  [8,'2026-05-04','Light strength','4×800m race pace','Easy run 5km','Easy run 4km','Rest','Killarney 10k 🏁','Recovery spin 30min','10k taper/race'],
  [9,'2026-05-11','Strength Session A','Tempo run 6km','Cycle 60min Z2','Strength B + 5km easy','Rest','Long ride 50km','Easy run 6km','Cycle base'],
  [10,'2026-05-18','Strength Session A','4×1km intervals','Cycle 75min Z2','Strength B + 6km easy','Rest','Long ride 70km','Easy run 6km','Cycle base'],
  [11,'2026-05-25','Strength Session A','Tempo run 7km','Cycle 75min Z2','Strength B + 5km easy','Rest','Long ride 90km','Easy run 6km','Cycle base'],
  [12,'2026-06-01','Strength Session A','5×1km intervals','Cycle 90min Z2','Strength B + 6km easy','Rest','Long ride 110km','Easy run 6km','Cycle base'],
  [13,'2026-06-08','Strength Session A','Tempo run 8km','Cycle 90min Z2 + 4×5min tempo','Strength B + 5km easy','Rest','Long ride 130km','Easy run 6km','Ring build'],
  [14,'2026-06-15','Strength Session A','4×1km intervals','Cycle 75min Z2','Strength B + 5km easy','Rest','Long ride 150km','Recovery run 5km','Ring build'],
  [15,'2026-06-22','Light strength','Easy run 6km','Easy spin 45min','Rest','Easy spin 20min','Ring of Kerry 170km 🚴','Recovery','Ring taper/race'],
  [16,'2026-06-29','Strength Session A','Tempo run 8km','Easy run 6km','Strength B + 6km easy','Rest / mobility','Long run 14km','Recovery run 5km','Half build'],
  [17,'2026-07-06','Strength Session A','5×1km intervals','Easy run 6km','Strength B + 6km easy','Rest / mobility','Long run 15km','Easy cycle 45min','Half build'],
  [18,'2026-07-13','Strength Session A','Tempo run 9km','Easy run 7km','Strength B + 6km easy','Rest / mobility','Long run 16km','Recovery run 5km','Half build'],
  [19,'2026-07-20','Strength Session A','6×1km intervals','Easy run 7km','Strength B + 7km easy','Rest / mobility','Long run 17km','Easy cycle 45min','Half build'],
  [20,'2026-07-27','Strength Session A','Tempo run 10km','Easy run 7km','Strength B + 6km easy','Rest / mobility','Long run 18km','Recovery run 5km','Half build'],
  [21,'2026-08-03','Strength Session A','3×3km tempo','Easy run 7km','Strength B + 6km easy','Rest / mobility','Long run 18km','Recovery run 5km','Half peak'],
  [22,'2026-08-10','Strength Session A','5×1km intervals','Easy run 6km','Strength B + 6km easy','Rest / mobility','Long run 16km','Recovery run 5km','Half peak'],
  [23,'2026-08-17','Light strength','Tempo 6km','Easy run 6km','Easy run 6km','Rest','Long run 12km','Recovery','Half taper'],
  [24,'2026-08-24','Light strength','4×800m race pace','Easy run 6km','Easy run 5km','Rest','Dingle Half Marathon 🏅','Recovery','Race week'],
  [25,'2026-08-31','Recovery / mobility','Optional easy jog 30min','Rest','Mobility','Rest','Optional easy walk','Rest','Post-race recovery'],
];

const RACE_DATES = {
  r1: new Date('2026-05-09'),
  r2: new Date('2026-07-04'),
  r3: new Date('2026-09-05'),
};

// ─── HELPERS ───────────────────────────────────────────────────────────────
function daysUntil(d) {
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.ceil((d - now) / 86400000);
  return diff > 0 ? diff : 0;
}

function currentWeek() {
  const start = new Date('2026-03-16'); start.setHours(0,0,0,0);
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.max(1, Math.min(25, Math.floor((now - start) / (7*86400000)) + 1));
}

function parseNum(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }

function weeklyStats(data) {
  const weeks = {};
  for (let w = 1; w <= 25; w++) weeks[w] = { run:0, cycle:0, duration:0, rpes:[], fatigues:[], completed:0, total:0 };
  data.forEach(r => {
    const w = parseInt(r['Week']);
    if (!weeks[w]) return;
    weeks[w].total++;
    if (String(r['Completed?']).toLowerCase() === 'yes') {
      weeks[w].completed++;
      weeks[w].run += parseNum(r['Run Distance (km)']);
      weeks[w].cycle += parseNum(r['Cycle Distance (km)']);
      weeks[w].duration += parseNum(r['Duration (min)']);
      const rpe = parseNum(r['RPE']); if (rpe > 0) weeks[w].rpes.push(rpe);
      const fat = parseNum(r['Fatigue (1-5)']); if (fat > 0) weeks[w].fatigues.push(fat);
    }
  });
  return Object.entries(weeks).map(([w, d]) => {
    const avgRpe = d.rpes.length ? d.rpes.reduce((a,b)=>a+b,0)/d.rpes.length : null;
    const avgFat = d.fatigues.length ? d.fatigues.reduce((a,b)=>a+b,0)/d.fatigues.length : null;
    return {
      week: parseInt(w),
      run: Math.round(d.run*10)/10,
      cycle: Math.round(d.cycle*10)/10,
      duration: d.duration,
      load: avgRpe ? Math.round(d.duration * avgRpe) : 0,
      avgRpe: avgRpe ? Math.round(avgRpe*10)/10 : null,
      avgFat: avgFat ? Math.round(avgFat*10)/10 : null,
      completed: d.completed,
      total: d.total,
    };
  });
}

function badgeHtml(type) {
  const map = {
    run: ['#1bc4a0','rgba(27,196,160,.15)'],
    cycle: ['#f07830','rgba(240,120,48,.15)'],
    strength: ['#9b7dea','rgba(155,125,234,.15)'],
    rest: ['#8891a8','rgba(136,145,168,.15)'],
  };
  const t = (String(type||'').toLowerCase().includes('run') ? 'run' :
             String(type||'').toLowerCase().includes('cycle') ? 'cycle' :
             String(type||'').toLowerCase().includes('strength') ? 'strength' : 'rest');
  const [c,bg] = map[t]||map.rest;
  return `<span class="badge" style="background:${bg};color:${c}">${type||'—'}</span>`;
}

function showToast(msg, color) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = color || 'var(--teal)';
  el.style.color = color ? '#fff' : '#0f1117';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function destroyCharts() {
  Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e){} });
  chartInstances = {};
}

// ─── FETCH DATA ────────────────────────────────────────────────────────────
async function fetchData(force) {
  if (!API_URL) return [];
  if (!force && trainingData.length && Date.now() - lastFetch < 120000) return trainingData;
  try {
    const r = await fetch(API_URL + '?action=getData');
    const json = await r.json();
    if (json.status === 'ok') {
      trainingData = json.data;
      lastFetch = Date.now();
      return trainingData;
    }
  } catch(e) {
    showToast('Could not fetch data — check your API URL in Setup', '#e84545');
  }
  return trainingData;
}

// ─── NAVIGATION ────────────────────────────────────────────────────────────
const tabs = ['overview','history','load','plan','races','setup'];

function navigate(tab) {
  currentTab = tab;
  tabs.forEach(t => {
    const el = document.getElementById('nl-'+t);
    if (el) el.style.color = t === tab ? 'var(--teal)' : 'var(--muted)';
  });
  render();
}

async function render() {
  destroyCharts();
  const content = document.getElementById('content');
  if (!API_URL && currentTab !== 'setup') {
    content.innerHTML = setupHTML(true);
    document.getElementById('hdr-sub').textContent = 'Setup required';
    return;
  }
  content.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>Loading...</span></div>';
  const data = await fetchData();
  const cw = currentWeek();
  document.getElementById('hdr-sub').textContent = `Paul Carroll · W${cw} of 25`;

  if (currentTab === 'overview') renderOverview(data, cw);
  else if (currentTab === 'history') renderHistory(data);
  else if (currentTab === 'load') renderLoad(data, cw);
  else if (currentTab === 'plan') renderPlan(cw);
  else if (currentTab === 'races') renderRaces();
  else if (currentTab === 'setup') content.innerHTML = setupHTML(false);
}

// ─── OVERVIEW ──────────────────────────────────────────────────────────────
function renderOverview(data, cw) {
  const ws = weeklyStats(data);
  const totRun = data.filter(r=>String(r['Completed?']).toLowerCase()==='yes').reduce((a,r)=>a+parseNum(r['Run Distance (km)']),0);
  const totCycle = data.filter(r=>String(r['Completed?']).toLowerCase()==='yes').reduce((a,r)=>a+parseNum(r['Cycle Distance (km)']),0);
  const totMin = data.filter(r=>String(r['Completed?']).toLowerCase()==='yes').reduce((a,r)=>a+parseNum(r['Duration (min)']),0);
  const totSessions = data.filter(r=>String(r['Completed?']).toLowerCase()==='yes').length;
  const phase = PLAN[cw-1]?.[9] || 'Complete';
  const pct = Math.round((cw/25)*100);

  const races = [
    {label:'Killarney 10k',date:'9 May',key:'r1',dist:'10km',color:'var(--teal)'},
    {label:'Ring of Kerry',date:'4 Jul',key:'r2',dist:'170km',color:'var(--orange)'},
    {label:'Dingle HM',date:'5 Sep',key:'r3',dist:'21.1km',color:'var(--purple)'},
  ];

  document.getElementById('content').innerHTML = `
    <div class="section-title">Overview</div>
    <div class="section-sub">${new Date().toLocaleDateString('en-IE',{weekday:'long',day:'numeric',month:'short',year:'numeric'})}</div>

    <div class="grid-3 mb16">
      ${races.map(r=>`
        <div class="race-card" style="border-top:3px solid ${r.color}">
          <div class="race-card-name">${r.label}</div>
          <div class="race-card-date">${r.date}</div>
          <div class="race-card-days" style="color:${r.color}">${daysUntil(RACE_DATES[r.key])}</div>
          <div class="race-card-daystxt">days</div>
          <div class="race-card-dist" style="color:${r.color}">${r.dist}</div>
        </div>`).join('')}
    </div>

    <div class="card mb16">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span class="card-title" style="margin:0">Phase</span>
        <span style="font-size:12px;font-weight:600;color:var(--teal)">W${cw} — ${phase}</span>
      </div>
      <div class="phase-bar-track"><div class="phase-bar-fill" style="width:${pct}%"></div></div>
      <div class="phase-bar-labels">
        <span>W1</span><span>10k W8</span><span>RoK W15</span><span>HM W24</span>
      </div>
    </div>

    <div class="grid-2 mb16">
      <div class="stat-card"><div class="stat-label">Run km</div><div class="stat-value" style="color:var(--teal)">${totRun.toFixed(1)}</div><div class="stat-sub">total logged</div></div>
      <div class="stat-card"><div class="stat-label">Cycle km</div><div class="stat-value" style="color:var(--orange)">${totCycle.toFixed(1)}</div><div class="stat-sub">total logged</div></div>
      <div class="stat-card"><div class="stat-label">Hours</div><div class="stat-value" style="color:var(--blue)">${(totMin/60).toFixed(1)}</div><div class="stat-sub">training time</div></div>
      <div class="stat-card"><div class="stat-label">Sessions</div><div class="stat-value" style="color:var(--green)">${totSessions}</div><div class="stat-sub">completed</div></div>
    </div>

    <div class="card mb16">
      <div class="card-title">Weekly run km — actual vs planned</div>
      <div class="chart-wrap" style="height:180px"><canvas id="chart-run"></canvas></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--teal)"></div>Actual</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,.2)"></div>Planned</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">RPE & fatigue trend (RPE /10, fatigue /5)</div>
      <div class="chart-wrap" style="height:180px"><canvas id="chart-rpe"></canvas></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Avg RPE</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Avg fatigue</div>
      </div>
    </div>
  `;

  const PLANNED_KM = [10,11,12,12,13,14,12,0,6,6,6,6,6,5,0,14,15,16,17,18,18,16,12,0,0];
  const labels = ws.map(w=>`W${w.week}`);
  const ticks = { color:'#8891a8', font:{size:9} };
  const grid = { color:'rgba(255,255,255,.04)' };

  chartInstances['run'] = new Chart(document.getElementById('chart-run'), {
    type:'bar',
    data: {
      labels,
      datasets: [
        { label:'Planned', data: PLANNED_KM, backgroundColor:'rgba(255,255,255,.07)', borderRadius:2, order:2 },
        { label:'Actual', data: ws.map(w=>w.run||null), backgroundColor:'#1bc4a0', borderRadius:2, order:1 },
      ]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{grid,ticks:{...ticks,maxRotation:0,autoSkip:true,maxTicksLimit:13}}, y:{grid,ticks,beginAtZero:true} } }
  });

  chartInstances['rpe'] = new Chart(document.getElementById('chart-rpe'), {
    type:'line',
    data: {
      labels,
      datasets: [
        { label:'Avg RPE', data:ws.map(w=>w.avgRpe), borderColor:'#4a90d9', backgroundColor:'rgba(74,144,217,.1)', tension:.3, pointRadius:3, pointBackgroundColor:'#4a90d9', fill:false },
        { label:'Avg fatigue', data:ws.map(w=>w.avgFat), borderColor:'#e84545', backgroundColor:'rgba(232,69,69,.1)', tension:.3, pointRadius:3, pointBackgroundColor:'#e84545', fill:false },
      ]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{grid,ticks:{...ticks,maxRotation:0,autoSkip:true,maxTicksLimit:13}}, y:{grid,ticks,beginAtZero:true,max:10,
        annotations:{fatigue:{type:'line',yMin:4,yMax:4,borderColor:'rgba(232,69,69,.3)',borderDash:[4,4]}}} } }
  });
}

// ─── HISTORY ───────────────────────────────────────────────────────────────
function renderHistory(data) {
  const completed = data.filter(r=>String(r['Completed?']).toLowerCase()==='yes').reverse();
  if (!completed.length) {
    document.getElementById('content').innerHTML = `
      <div class="section-title">Session History</div>
      <div class="section-sub">Completed sessions from Google Sheets</div>
      <div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No completed sessions yet</div><p>Mark sessions as "Yes" in the Completed? column of your Google Sheet</p></div>`;
    return;
  }

  const cards = completed.map(r => `
    <div class="session-card">
      <div class="session-card-header">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            ${badgeHtml(r['Session Type'])}
            <span style="font-size:12px;color:var(--muted)">W${r['Week']}</span>
          </div>
          <div style="font-size:13px;font-weight:600">${r['Date']} · ${r['Day']||''}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${r['Actual Description']||r['Planned Session']||''}</div>
        </div>
      </div>
      <div class="session-mini-grid">
        <div class="session-mini-cell"><div class="session-mini-label">Run</div><div class="session-mini-value" style="color:var(--teal)">${parseNum(r['Run Distance (km)'])>0?parseNum(r['Run Distance (km)'])+'km':'—'}</div></div>
        <div class="session-mini-cell"><div class="session-mini-label">Cycle</div><div class="session-mini-value" style="color:var(--orange)">${parseNum(r['Cycle Distance (km)'])>0?parseNum(r['Cycle Distance (km)'])+'km':'—'}</div></div>
        <div class="session-mini-cell"><div class="session-mini-label">RPE</div><div class="session-mini-value" style="color:var(--blue)">${r['RPE']||'—'}</div></div>
        <div class="session-mini-cell"><div class="session-mini-label">Fatigue</div><div class="session-mini-value" style="color:var(--red)">${r['Fatigue (1-5)']||'—'}</div></div>
      </div>
      ${r['Notes']?`<div class="session-notes">${r['Notes']}</div>`:''}
    </div>`).join('');

  document.getElementById('content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div class="section-title">Session History</div>
      <button class="btn-refresh" onclick="refreshData()">↻ Refresh</button>
    </div>
    <div class="section-sub">${completed.length} completed sessions</div>
    ${cards}`;
}

// ─── TRAINING LOAD ─────────────────────────────────────────────────────────
function renderLoad(data, cw) {
  const ws = weeklyStats(data);
  const currLoad = ws[cw-1]?.load || 0;
  const allLoads = ws.filter(w=>w.load>0).map(w=>w.load);
  const avgLoad = allLoads.length ? Math.round(allLoads.reduce((a,b)=>a+b,0)/allLoads.length) : 0;
  const allFats = data.filter(r=>String(r['Completed?']).toLowerCase()==='yes'&&parseNum(r['Fatigue (1-5)'])>0).map(r=>parseNum(r['Fatigue (1-5)']));
  const avgFat = allFats.length ? (allFats.reduce((a,b)=>a+b,0)/allFats.length).toFixed(1) : '—';

  const loadColors = ws.map((w,i)=>{
    if (!w.load) return 'rgba(255,255,255,.04)';
    const prev = ws[i-1]?.load;
    return prev>0 && w.load>prev*1.15 ? '#e84545' : '#4a90d9';
  });

  document.getElementById('content').innerHTML = `
    <div class="section-title">Training Load</div>
    <div class="section-sub">Session load = Duration × RPE. Red = >15% jump week-on-week.</div>
    <div class="grid-3 mb16">
      <div class="stat-card"><div class="stat-label">This week</div><div class="stat-value" style="color:var(--amber)">${currLoad||'—'}</div><div class="stat-sub">load score</div></div>
      <div class="stat-card"><div class="stat-label">Avg load</div><div class="stat-value" style="color:var(--blue)">${avgLoad||'—'}</div><div class="stat-sub">per week</div></div>
      <div class="stat-card"><div class="stat-label">Avg fatigue</div><div class="stat-value" style="color:var(--red)">${avgFat}</div><div class="stat-sub">target < 3.5</div></div>
    </div>
    <div class="card mb16">
      <div class="card-title">Session load by week</div>
      <div class="chart-wrap" style="height:200px"><canvas id="chart-load"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Run & cycle km by week</div>
      <div class="chart-wrap" style="height:200px"><canvas id="chart-mil"></canvas></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--teal)"></div>Run</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>Cycle</div>
      </div>
    </div>`;

  const labels = ws.map(w=>`W${w.week}`);
  const ticks = { color:'#8891a8', font:{size:9} };
  const grid = { color:'rgba(255,255,255,.04)' };

  chartInstances['load'] = new Chart(document.getElementById('chart-load'), {
    type:'bar',
    data: { labels, datasets:[{ label:'Load', data:ws.map(w=>w.load||null), backgroundColor:loadColors, borderRadius:3 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{grid,ticks:{...ticks,maxRotation:0,autoSkip:true,maxTicksLimit:13}}, y:{grid,ticks,beginAtZero:true} } }
  });

  chartInstances['mil'] = new Chart(document.getElementById('chart-mil'), {
    type:'bar',
    data: { labels, datasets:[
      { label:'Run', data:ws.map(w=>w.run||null), backgroundColor:'#1bc4a0', borderRadius:3 },
      { label:'Cycle', data:ws.map(w=>w.cycle||null), backgroundColor:'#f07830', borderRadius:3 },
    ]},
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{grid,ticks:{...ticks,maxRotation:0,autoSkip:true,maxTicksLimit:13}}, y:{grid,ticks,beginAtZero:true} } }
  });
}

// ─── PLAN ──────────────────────────────────────────────────────────────────
function renderPlan(cw) {
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const weeks = PLAN.map(row => {
    const isCurrent = row[0] === cw;
    const startDate = new Date(row[1]).toLocaleDateString('en-IE',{day:'numeric',month:'short'});
    const sessionRows = days.map((d,i)=>`
      <div class="week-row">
        <span class="week-row-day">${d}</span>
        <span class="week-row-session">${row[i+2]}</span>
      </div>`).join('');
    return `
      <div class="week-card${isCurrent?' current':''}" id="wk-${row[0]}">
        <div class="week-header" onclick="toggleWeek(${row[0]})">
          <div class="week-header-left">
            <span class="week-num" style="color:${isCurrent?'var(--teal)':'var(--text)'}">${row[0]}${isCurrent?' ← now':''}</span>
            <span class="week-date">${startDate}</span>
            <span class="phase-tag">${row[9]}</span>
          </div>
          <span class="week-chevron" id="chev-${row[0]}">${isCurrent?'▴':'▾'}</span>
        </div>
        <div class="week-body" id="wkb-${row[0]}" style="display:${isCurrent?'block':'none'}">${sessionRows}</div>
      </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="section-title">Training Plan</div>
    <div class="section-sub">25 weeks · currently Week ${cw}</div>
    ${weeks}`;

  // Scroll current week into view
  setTimeout(()=>{
    const el = document.getElementById(`wk-${cw}`);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 100);
}

function toggleWeek(w) {
  const body = document.getElementById(`wkb-${w}`);
  const chev = document.getElementById(`chev-${w}`);
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  chev.textContent = open ? '▾' : '▴';
}

// ─── RACES ─────────────────────────────────────────────────────────────────
function renderRaces() {
  const races = [
    { color:'var(--teal)', name:'Killarney 10k', date:'Saturday 9 May 2026', week:8,
      pacing:[['0–3km','Controlled start, build into pace'],['Middle km','Settle and hold effort'],['Final km','Push hard if feeling strong']],
      strategy:['Warm-up: 10–15 min jog + drills + 3–4 strides','Race week: light strength Mon, 4×800m Wed at race pace','Day before: 20–30 min easy run or full rest','Avoid: hard gym sessions, extra mileage, testing fitness'] },
    { color:'var(--orange)', name:'Ring of Kerry Cycle', date:'Saturday 4 July 2026', week:15,
      pacing:[['Start','Conservative — ride well below ego'],['Fuel','60–90g carbs/hr from first 30 min'],['Fluid','500–750ml/hr, 500–700mg sodium/hr'],['Rule','Never chase groups above your plan']],
      strategy:['Race week: short easy sessions only — legs must feel fresh','Wed: easy 45min spin + 2–3 cadence lifts only','Day before: easy check spin 20min or full rest','Warm-up: the first 20 min of the ride IS your warm-up'] },
    { color:'var(--purple)', name:'Dingle Half Marathon', date:'Saturday 5 September 2026', week:24,
      pacing:[['0–5km','Conservative 5:05–5:10/km'],['5–15km','Settle at race rhythm'],['15–21km','Build if strong — target ~5:00/km avg'],['Goal','~1:45 finish']],
      strategy:['Warm-up: 12–15 min jog + mobility + 3 strides','Race week: 4×800m Wed at threshold/race rhythm','Day before: 15–20 min easy shakeout + 3 strides, or rest','Higher carbs day before · small gel only if practiced in training','Avoid: poor sleep, long standing, starting too fast'] },
  ];

  const html = races.map(r=>`
    <div class="card race-guide-card">
      <div class="race-guide-header">
        <div class="race-guide-dot" style="background:${r.color}"></div>
        <div>
          <div class="race-guide-name">${r.name}</div>
          <div class="race-guide-date">${r.date} · Week ${r.week}</div>
        </div>
      </div>
      <div class="card-title">Pacing</div>
      ${r.pacing.map(([k,v])=>`<div class="race-guide-row"><strong>${k}</strong> — ${v}</div>`).join('')}
      <div class="card-title" style="margin-top:14px">Race week</div>
      ${r.strategy.map(l=>`<div class="race-week-row">${l}</div>`).join('')}
    </div>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="section-title">Race Guides</div>
    <div class="section-sub">Pacing, fuelling & race week strategy</div>
    ${html}`;
}

// ─── SETUP ─────────────────────────────────────────────────────────────────
function setupHTML(isFirstTime) {
  return `
    <div class="config-wrap">
      <div class="section-title">${isFirstTime?'Welcome — Setup Required':'Setup'}</div>
      <div class="section-sub">${isFirstTime?'Connect your Google Sheet to activate the dashboard':'Update your Google Apps Script URL'}</div>

      <div class="config-step">
        <div class="config-step-num">1</div>
        <div class="config-step-body">
          <strong>Open your Google Sheet</strong> → click <strong>Extensions</strong> → <strong>Apps Script</strong>
        </div>
      </div>
      <div class="config-step">
        <div class="config-step-num">2</div>
        <div class="config-step-body">
          Delete any existing code, paste in the contents of <code>google_apps_script.gs</code>, then click <strong>Save</strong>
        </div>
      </div>
      <div class="config-step">
        <div class="config-step-num">3</div>
        <div class="config-step-body">
          Click <strong>Deploy</strong> → <strong>New deployment</strong> → Type: <strong>Web app</strong><br>
          Set <em>Execute as</em>: <strong>Me</strong><br>
          Set <em>Who has access</em>: <strong>Anyone</strong><br>
          Click <strong>Deploy</strong> and authorise when prompted
        </div>
      </div>
      <div class="config-step">
        <div class="config-step-num">4</div>
        <div class="config-step-body">
          Copy the <strong>Web app URL</strong> (looks like <code>https://script.google.com/macros/s/...</code>) and paste it below
        </div>
      </div>

      <div class="field">
        <label>Google Apps Script Web App URL</label>
        <input class="config-url-input" type="url" id="api-url-input" placeholder="https://script.google.com/macros/s/..." value="${API_URL}">
      </div>
      <button class="btn-config-save" onclick="saveApiUrl()">Save & Connect →</button>

      ${API_URL ? `<div style="margin-top:20px">
        <button class="btn-refresh" onclick="refreshData()" style="width:100%;justify-content:center">↻ Refresh data from Google Sheets</button>
      </div>` : ''}

      <div style="margin-top:24px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--muted);line-height:1.7">
        <strong style="color:var(--text)">How logging works:</strong><br>
        Paul logs sessions directly in the <strong>Training_Log</strong> tab of the Google Sheet — marking <em>Completed?</em> as <strong>Yes</strong> and filling in the actuals. The dashboard reads from the sheet automatically. No double-entry needed.
      </div>
    </div>`;
}

function saveApiUrl() {
  const url = document.getElementById('api-url-input')?.value?.trim();
  if (!url || !url.startsWith('https://')) { showToast('Please enter a valid URL', '#e84545'); return; }
  API_URL = url;
  localStorage.setItem(STORAGE_KEY, url);
  trainingData = [];
  showToast('Saved! Loading data...');
  navigate('overview');
}

async function refreshData() {
  trainingData = [];
  lastFetch = 0;
  showToast('Refreshing...');
  await render();
  showToast('Data refreshed ✓');
}

// ─── INIT ──────────────────────────────────────────────────────────────────
navigate('overview');
</script>
</body>
</html>
