<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Paul Carroll — Elite Endurance 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:#0f1117;--bg2:#181c27;--bg3:#1e2333;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf0;--muted:#8891a8;
  --teal:#1bc4a0;--orange:#f07830;--amber:#f5c518;
  --red:#e84545;--blue:#4a90d9;--purple:#9b7dea;--green:#4caf7a;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
.app{display:flex;flex-direction:column;min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:40}
.header-left .logo{font-size:12px;font-weight:700;color:var(--teal);letter-spacing:1.1px;text-transform:uppercase}
.header-left .sub{font-size:11px;color:var(--muted);margin-top:1px}
.header-right{display:flex;align-items:center;gap:10px}
.sync-badge{font-size:10px;color:var(--muted);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 8px;white-space:nowrap}
.sync-badge.error{color:var(--red);border-color:rgba(232,69,69,.3)}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1bc4a0,#4a90d9);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:16px 14px 90px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;background:transparent;border:none;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn .nav-icon{font-size:20px}
.nav-btn .nav-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;transition:color .15s}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.card-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.section-title{font-size:20px;font-weight:600;margin-bottom:4px}
.section-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.mb16{margin-bottom:16px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.stat-value{font-size:24px;font-weight:600;line-height:1}
.stat-sub{font-size:10px;color:var(--muted);margin-top:3px}
.race-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 10px;text-align:center}
.race-card-name{font-size:11px;font-weight:600;line-height:1.2;margin-bottom:2px}
.race-card-date{font-size:10px;color:var(--muted);margin-bottom:8px}
.race-card-days{font-size:28px;font-weight:700;line-height:1}
.race-card-daystxt{font-size:9px;color:var(--muted);margin-top:2px;margin-bottom:6px}
.race-card-dist{font-size:10px;font-weight:600}
.phase-bar-track{height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;margin-bottom:6px}
.phase-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--teal),var(--blue));transition:width .5s}
.phase-bar-labels{display:flex;justify-content:space-between}
.phase-bar-labels span{font-size:9px;color:var(--muted)}
.chart-wrap{position:relative;width:100%}
.legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.insight{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--radius-sm);margin-bottom:8px;border:1px solid}
.insight-red{background:rgba(232,69,69,.08);border-color:rgba(232,69,69,.25)}
.insight-amber{background:rgba(245,197,24,.06);border-color:rgba(245,197,24,.2)}
.insight-green{background:rgba(76,175,122,.06);border-color:rgba(76,175,122,.2)}
.insight-blue{background:rgba(74,144,217,.06);border-color:rgba(74,144,217,.2)}
.insight-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.insight-text{font-size:13px;line-height:1.5}
.insight-title{font-weight:600;margin-bottom:2px}
.heatmap-wrap{overflow-x:auto;padding-bottom:4px}
.heatmap-grid{display:grid;gap:3px;width:max-content}
.heatmap-month-labels{display:grid;gap:3px;margin-bottom:4px;width:max-content}
.hm-cell{width:13px;height:13px;border-radius:2px;position:relative}
.hm-cell:hover .hm-tip{display:block}
.hm-tip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:5px 8px;font-size:10px;white-space:nowrap;z-index:10;pointer-events:none}
.heatmap-legend{display:flex;align-items:center;gap:5px;margin-top:8px;font-size:10px;color:var(--muted);flex-wrap:wrap}
.session-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.session-mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.session-mini-cell{background:rgba(255,255,255,.03);border-radius:8px;padding:8px 10px}
.session-mini-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.session-mini-value{font-size:15px;font-weight:600}
.session-notes{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.week-card{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;background:var(--bg3)}
.week-card.current{border-color:var(--teal);background:rgba(27,196,160,.04)}
.week-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.week-header-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.week-num{font-size:14px;font-weight:700}
.week-date{font-size:10px;color:var(--muted)}
.phase-tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;background:rgba(74,144,217,.15);color:var(--blue)}
.week-chevron{color:var(--muted);font-size:14px;flex-shrink:0}
.week-body{padding:0 14px 14px}
.week-row{display:flex;gap:10px;padding:7px 0;border-top:1px solid rgba(255,255,255,.04)}
.week-row-day{font-size:11px;font-weight:600;color:var(--muted);width:28px;flex-shrink:0;padding-top:1px}
.week-row-session{font-size:13px}
.race-guide-row{font-size:13px;color:var(--muted);margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.04)}
.race-guide-row strong{color:var(--text);font-weight:500}
.race-week-row{font-size:13px;color:var(--muted);margin-bottom:5px;padding-left:10px;border-left:2px solid rgba(255,255,255,.08)}
.config-wrap{max-width:480px;margin:0 auto}
.config-step{display:flex;gap:12px;margin-bottom:14px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius)}
.config-step-num{width:24px;height:24px;border-radius:50%;background:var(--teal);color:#0f1117;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.config-step-body{font-size:13px;line-height:1.6;color:var(--muted)}
.config-step-body strong{color:var(--text)}
.config-step-body code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;font-size:12px;color:var(--teal)}
.config-url-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-size:13px;outline:none;margin-top:6px}
.config-url-input:focus{border-color:var(--teal)}
.btn-config-save{background:var(--teal);color:#0f1117;border:none;border-radius:var(--radius-sm);padding:12px 24px;font-size:14px;font-weight:700;width:100%;margin-top:8px}
.btn-refresh{background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 16px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.error-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:14px;text-align:center;padding:24px}
.error-icon{font-size:40px;opacity:.6}
.error-title{font-size:16px;font-weight:600}
.error-sub{font-size:13px;color:var(--muted);max-width:280px;line-height:1.6}
.btn-error-action{background:var(--teal);color:#0f1117;border:none;border-radius:var(--radius-sm);padding:10px 24px;font-size:13px;font-weight:700}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:12px;color:var(--muted)}
.spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 24px;color:var(--muted)}
.empty-icon{font-size:40px;opacity:.4;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:100;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <div class="logo">Elite Endurance</div>
      <div class="sub" id="hdr-sub">Paul Carroll · Loading...</div>
    </div>
    <div class="header-right">
      <div class="sync-badge" id="sync-badge" style="display:none"></div>
      <div class="avatar">PC</div>
    </div>
  </header>
  <main class="content" id="content">
    <div class="loading-state"><div class="spinner"></div><span>Loading dashboard...</span></div>
  </main>
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="navigate('overview')"><span class="nav-icon">📊</span><span class="nav-label" id="nl-overview">Overview</span></button>
    <button class="nav-btn" onclick="navigate('history')"><span class="nav-icon">📋</span><span class="nav-label" id="nl-history">History</span></button>
    <button class="nav-btn" onclick="navigate('load')"><span class="nav-icon">⚡</span><span class="nav-label" id="nl-load">Load</span></button>
    <button class="nav-btn" onclick="navigate('plan')"><span class="nav-icon">📅</span><span class="nav-label" id="nl-plan">Plan</span></button>
    <button class="nav-btn" onclick="navigate('races')"><span class="nav-icon">🏁</span><span class="nav-label" id="nl-races">Races</span></button>
    <button class="nav-btn" onclick="navigate('setup')"><span class="nav-icon">⚙️</span><span class="nav-label" id="nl-setup">Setup</span></button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script type="module">
const STORAGE_KEY = 'elite_endurance_api_url';
let API_URL = localStorage.getItem(STORAGE_KEY) || '';
let currentTab = 'overview';
let trainingData = [];
let lastFetch = 0;
let lastFetchTime = null;
let chartInstances = {};
let fetchError = false;

const PLAN = [
  [1,'2026-03-16','Strength Session A','4×1km @ 10k pace','Easy run 6km','Strength B + 5km easy','Rest / mobility','Long run 10km Z2','Easy cycle 60min','Base + 10k build'],
  [2,'2026-03-23','Strength Session A','5×800m @ 10k pace','Easy run 6km','Strength B + 5km easy','Rest / mobility','Long run 11km','Easy cycle 60min','Base + 10k build'],
  [3,'2026-03-30','Strength Session A','5×1km @ 10k pace','Easy run 6km','Strength B + 6km easy','Rest / mobility','Long run 12km','Recovery run 5km','Base + 10k build'],
  [4,'2026-04-06','Strength Session A','3×2km tempo','Easy run 6km','Strength B + 6km easy','Rest / mobility','Long run 12km','Easy cycle 60min','Base + 10k build'],
  [5,'2026-04-13','Strength Session A','6×1km @ 10k pace','Easy run 6km','Strength B + 6km easy','Rest / mobility','Long run 13km','Easy cycle 60min','10k peak'],
  [6,'2026-04-20','Strength Session A','4×1.5km threshold','Easy run 6km','Strength B + 6km easy','Rest / mobility','Long run 14km','Recovery run 5km','10k peak'],
  [7,'2026-04-27','Strength Session A','5×1km race pace','Easy run 5km','Strength B + 5km easy','Rest / mobility','Long run 12km','Easy cycle 45min','10k peak'],
  [8,'2026-05-04','Light strength','4×800m race pace','Easy run 5km','Easy run 4km','Rest','Killarney 10k 🏁','Recovery spin 30min','10k taper/race'],
  [9,'2026-05-11','Strength Session A','Tempo run 6km','Cycle 60min Z2','Strength B + 5km easy','Rest','Long ride 50km','Easy run 6km','Cycle base'],
  [10,'2026-05-18','Strength Session A','4×1km intervals','Cycle 75min Z2','Strength B + 6km easy','Rest','Long ride 70km','Easy run 6km','Cycle base'],
  [11,'2026-05-25','Strength Session A','Tempo run 7km','Cycle 75min Z2','Strength B + 5km easy','Rest','Long ride 90km','Easy run 6km','Cycle base'],
  [12,'2026-06-01','Strength Session A','5×1km intervals','Cycle 90min Z2','Strength B + 6km easy','Rest','Long ride 110km','Easy run 6km','Cycle base'],
  [13,'2026-06-08','Strength Session A','Tempo run 8km','Cycle 90min Z2 + 4×5min tempo','Strength B + 5km easy','Rest','Long ride 130km','Easy run 6km','Ring build'],
  [14,'2026-06-15','Strength Session A','4×1km intervals','Cycle 75min Z2','Strength B + 5km easy','Rest','Long ride 150km','Recovery run 5km','Ring build'],
  [15,'2026-06-22','Light strength','Easy run 6km','Easy spin 45min','Rest','Easy spin 20min','Ring of Kerry 170km 🚴','Recovery','Ring taper/race'],
  [16,'2026-06-29','Strength Session A','Tempo run 8km','Easy run 6km','Strength B + 6km easy','Rest / mobility','Long run 14km','Recovery run 5km','Half build'],
  [17,'2026-07-06','Strength Session A','5×1km intervals','Easy run 6km','Strength B + 6km easy','Rest / mobility','Long run 15km','Easy cycle 45min','Half build'],
  [18,'2026-07-13','Strength Session A','Tempo run 9km','Easy run 7km','Strength B + 6km easy','Rest / mobility','Long run 16km','Recovery run 5km','Half build'],
  [19,'2026-07-20','Strength Session A','6×1km intervals','Easy run 7km','Strength B + 7km easy','Rest / mobility','Long run 17km','Easy cycle 45min','Half build'],
  [20,'2026-07-27','Strength Session A','Tempo run 10km','Easy run 7km','Strength B + 6km easy','Rest / mobility','Long run 18km','Recovery run 5km','Half build'],
  [21,'2026-08-03','Strength Session A','3×3km tempo','Easy run 7km','Strength B + 6km easy','Rest / mobility','Long run 18km','Recovery run 5km','Half peak'],
  [22,'2026-08-10','Strength Session A','5×1km intervals','Easy run 6km','Strength B + 6km easy','Rest / mobility','Long run 16km','Recovery run 5km','Half peak'],
  [23,'2026-08-17','Light strength','Tempo 6km','Easy run 6km','Easy run 6km','Rest','Long run 12km','Recovery','Half taper'],
  [24,'2026-08-24','Light strength','4×800m race pace','Easy run 6km','Easy run 5km','Rest','Dingle Half Marathon 🏅','Recovery','Race week'],
  [25,'2026-08-31','Recovery / mobility','Optional easy jog 30min','Rest','Mobility','Rest','Optional easy walk','Rest','Post-race recovery'],
];

const PLANNED_KM = [10,11,12,12,13,14,12,0,6,6,6,6,6,5,0,14,15,16,17,18,18,16,12,0,0];
const RACE_DATES = { r1:new Date('2026-05-09'), r2:new Date('2026-07-04'), r3:new Date('2026-09-05') };

function daysUntil(d) {
  const now=new Date(); now.setHours(0,0,0,0);
  const diff=Math.ceil((d-now)/86400000);
  return diff>0?diff:0;
}
function currentWeek() {
  const start=new Date('2026-03-16'); start.setHours(0,0,0,0);
  const now=new Date(); now.setHours(0,0,0,0);
  return Math.max(1,Math.min(25,Math.floor((now-start)/(7*86400000))+1));
}
function parseNum(v) {
  if(v===null||v===undefined||v==='') return null;
  const n=parseFloat(v); return isNaN(n)?null:n;
}
function isCompleted(r) { return String(r['Completed?']||'').trim().toLowerCase()==='yes'; }

// FIXED: session-level load = sum(duration × RPE) per session
function weeklyStats(data) {
  const weeks={};
  for(let w=1;w<=25;w++) weeks[w]={run:0,cycle:0,duration:0,load:0,rpes:[],fatigues:[],completed:0,total:0};
  data.forEach(r=>{
    const w=parseInt(r['Week']); if(!weeks[w]) return;
    weeks[w].total++;
    if(isCompleted(r)) {
      weeks[w].completed++;
      const run=parseNum(r['Run Distance (km)'])||0;
      const cycle=parseNum(r['Cycle Distance (km)'])||0;
      const dur=parseNum(r['Duration (min)'])||0;
      const rpe=parseNum(r['RPE']);
      const fat=parseNum(r['Fatigue (1-5)']);
      weeks[w].run+=run; weeks[w].cycle+=cycle; weeks[w].duration+=dur;
      if(dur>0&&rpe!==null&&rpe>0) weeks[w].load+=dur*rpe;
      if(rpe!==null&&rpe>0) weeks[w].rpes.push(rpe);
      if(fat!==null&&fat>0) weeks[w].fatigues.push(fat);
    }
  });
  return Object.entries(weeks).map(([w,d])=>{
    const avgRpe=d.rpes.length?d.rpes.reduce((a,b)=>a+b,0)/d.rpes.length:null;
    const avgFat=d.fatigues.length?d.fatigues.reduce((a,b)=>a+b,0)/d.fatigues.length:null;
    return { week:parseInt(w), run:Math.round(d.run*10)/10, cycle:Math.round(d.cycle*10)/10,
      duration:Math.round(d.duration), load:Math.round(d.load),
      avgRpe:avgRpe?Math.round(avgRpe*10)/10:null, avgFat:avgFat?Math.round(avgFat*10)/10:null,
      completed:d.completed, total:d.total,
      completionPct:d.total>0?Math.round((d.completed/d.total)*100):0 };
  });
}

function badgeHtml(type) {
  const t=String(type||'').toLowerCase();
  const kind=t.includes('run')||t.includes('tempo')||t.includes('interval')||t.includes('jog')?'run'
    :t.includes('cycle')||t.includes('ride')||t.includes('spin')?'cycle'
    :t.includes('strength')?'strength':'rest';
  const map={run:['#1bc4a0','rgba(27,196,160,.15)'],cycle:['#f07830','rgba(240,120,48,.15)'],strength:['#9b7dea','rgba(155,125,234,.15)'],rest:['#8891a8','rgba(136,145,168,.15)']};
  const [c,bg]=map[kind];
  return `<span class="badge" style="background:${bg};color:${c}">${type||'—'}</span>`;
}

function showToast(msg,color) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=color||'var(--teal)'; el.style.color=color?'#fff':'#0f1117';
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500);
}

function updateSyncBadge(state) {
  const el=document.getElementById('sync-badge'); el.style.display='block';
  if(state==='error') { el.className='sync-badge error'; el.textContent='⚠ Connection error'; }
  else if(lastFetchTime) {
    el.className='sync-badge';
    const mins=Math.floor((Date.now()-lastFetchTime)/60000);
    el.textContent=mins<1?'↻ Just synced':`↻ ${mins}m ago`;
  }
}

function destroyCharts() {
  Object.values(chartInstances).forEach(c=>{try{c.destroy();}catch(e){}});
  chartInstances={};
}

async function fetchData(force) {
  if(!API_URL) return [];
  if(!force&&trainingData.length&&Date.now()-lastFetch<120000) return trainingData;
  try {
    const r=await fetch(API_URL+'?action=getData');
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const json=await r.json();
    if(json.status!=='ok') throw new Error(json.error||'Bad response');
    trainingData=json.data; lastFetch=Date.now(); lastFetchTime=Date.now();
    fetchError=false; updateSyncBadge('ok'); return trainingData;
  } catch(e) {
    fetchError=true; updateSyncBadge('error'); return trainingData;
  }
}

const tabs=['overview','history','load','plan','races','setup'];
function navigate(tab) {
  currentTab=tab;
  tabs.forEach(t=>{ const el=document.getElementById('nl-'+t); if(el) el.style.color=t===tab?'var(--teal)':'var(--muted)'; });
  render();
}

async function render() {
  destroyCharts();
  const content=document.getElementById('content');
  if(!API_URL&&currentTab!=='setup') { content.innerHTML=setupHTML(true); document.getElementById('hdr-sub').textContent='Setup required'; return; }
  content.innerHTML='<div class="loading-state"><div class="spinner"></div><span>Loading...</span></div>';
  const data=await fetchData();
  if(fetchError&&!data.length&&currentTab!=='setup') {
    content.innerHTML=`<div class="error-state"><div class="error-icon">⚠️</div><div class="error-title">Could not load data</div><div class="error-sub">Check your Google Apps Script URL in Setup, or verify the sheet is published correctly.</div><button class="btn-error-action" onclick="navigate('setup')">Go to Setup</button><br><br><button class="btn-refresh" style="margin:0 auto" onclick="refreshData()">↻ Try again</button></div>`;
    return;
  }
  const cw=currentWeek();
  document.getElementById('hdr-sub').textContent=`Paul Carroll · W${cw} of 25`;
  if(currentTab==='overview') renderOverview(data,cw);
  else if(currentTab==='history') renderHistory(data);
  else if(currentTab==='load') renderLoad(data,cw);
  else if(currentTab==='plan') renderPlan(cw);
  else if(currentTab==='races') renderRaces();
  else if(currentTab==='setup') content.innerHTML=setupHTML(false);
}

function generateInsights(ws,cw) {
  const insights=[];
  const cwd=ws[cw-1]; const pwd=ws[cw-2];
  if(cwd&&pwd&&cwd.load>0&&pwd.load>0) {
    const spike=((cwd.load-pwd.load)/pwd.load)*100;
    if(spike>15) insights.push({type:'red',icon:'🔴',title:`Load spike this week (+${Math.round(spike)}%)`,text:'Training load jumped more than 15% from last week. Consider an extra rest day or reduce intensity tomorrow.'});
  }
  if(cwd&&cwd.avgFat!==null&&cwd.avgFat>=4) insights.push({type:'red',icon:'🔴',title:`High fatigue this week (avg ${cwd.avgFat}/5)`,text:'Average fatigue is above 3.5 — your body is asking for recovery. Prioritise sleep and keep tomorrow easy.'});
  else if(cwd&&cwd.avgFat!==null&&cwd.avgFat>=3) insights.push({type:'amber',icon:'🟠',title:`Moderate fatigue building (avg ${cwd.avgFat}/5)`,text:'Fatigue is creeping up. Monitor closely and protect your sleep and easy days this week.'});
  const recent=ws.slice(Math.max(0,cw-4),cw).filter(w=>w.total>0);
  const avgComp=recent.length?Math.round(recent.reduce((a,w)=>a+w.completionPct,0)/recent.length):0;
  if(avgComp>=85) insights.push({type:'green',icon:'🟢',title:`Strong consistency (${avgComp}% over last ${recent.length} weeks)`,text:'Excellent adherence to the plan. Consistent training is your biggest asset heading into race prep.'});
  else if(avgComp<60&&recent.length>=2) insights.push({type:'amber',icon:'🟡',title:`Consistency needs attention (${avgComp}% recently)`,text:'Completion rate has dipped. Focus on completing the key sessions — intervals and long run — even if you miss others.'});
  if(cw>=23&&cw<=25) insights.push({type:'blue',icon:'🔵',title:'Taper phase — trust the process',text:'Volume drops now are intentional. Resist the urge to add extra sessions. Your fitness is banked, the goal is freshness.'});
  const r1d=daysUntil(RACE_DATES.r1),r2d=daysUntil(RACE_DATES.r2),r3d=daysUntil(RACE_DATES.r3);
  if(r1d>0&&r1d<=14) insights.push({type:'blue',icon:'🏁',title:`Killarney 10k in ${r1d} days`,text:'Race week protocol: keep volume low, one short sharpener midweek, full rest the day before.'});
  if(r2d>0&&r2d<=14) insights.push({type:'blue',icon:'🚴',title:`Ring of Kerry in ${r2d} days`,text:'Legs should feel springy. Short easy spin midweek, no hard efforts. Prep your bike and nutrition plan.'});
  if(r3d>0&&r3d<=14) insights.push({type:'blue',icon:'🏅',title:`Dingle Half Marathon in ${r3d} days`,text:'Trust your training. Short sharpener Tuesday, easy shakeout Friday, race Saturday.'});
  if(!insights.length) insights.push({type:'green',icon:'✅',title:'All systems good',text:'No alerts this week. Stay consistent, keep the easy days easy, and trust the plan.'});
  return insights;
}

function insightHtml(ins) {
  return `<div class="insight insight-${ins.type}"><div class="insight-icon">${ins.icon}</div><div class="insight-text"><div class="insight-title">${ins.title}</div>${ins.text}</div></div>`;
}

function buildHeatmap(data) {
  const byDate={};
  data.forEach(r=>{ const d=String(r['Date']).split('T')[0].split(' ')[0]; byDate[d]={completed:isCompleted(r),type:String(r['Session Type']||'').toLowerCase(),planned:r['Planned Session']}; });
  const startDate=new Date('2026-03-16'); const endDate=new Date('2026-09-06');
  const today=new Date(); today.setHours(0,0,0,0);
  const days=[]; let d=new Date(startDate);
  while(d<=endDate){days.push(new Date(d));d.setDate(d.getDate()+1);}
  const firstDay=days[0].getDay(); const padDays=firstDay===0?6:firstDay-1;
  function cellColor(date,info) {
    if(date>today) return 'rgba(255,255,255,0.05)';
    if(!info) return 'rgba(255,255,255,0.05)';
    if(!info.completed) return 'rgba(232,69,69,0.35)';
    const t=info.type;
    if(t.includes('run')||t.includes('tempo')||t.includes('interval')) return '#1bc4a0';
    if(t.includes('cycle')||t.includes('ride')||t.includes('spin')) return '#f07830';
    if(t.includes('strength')) return '#9b7dea';
    return '#4a90d9';
  }
  const totalCols=Math.ceil((padDays+days.length)/7);
  const cells=[];
  for(let i=0;i<padDays;i++) cells.push(`<div class="hm-cell" style="background:transparent"></div>`);
  days.forEach(date=>{
    const key=date.toISOString().split('T')[0];
    const info=byDate[key]; const color=cellColor(date,info);
    const label=date.toLocaleDateString('en-IE',{day:'numeric',month:'short'})+(info?` · ${info.planned||''}${info.completed?' ✓':' ✗'}':'');
    cells.push(`<div class="hm-cell" style="background:${color}"><span class="hm-tip">${label}</span></div>`);
  });
  const months=[]; let lastMonth=-1; let col=padDays;
  days.forEach(date=>{ const m=date.getMonth(); if(m!==lastMonth){months.push({label:date.toLocaleDateString('en-IE',{month:'short'}),col:Math.floor(col/7)});lastMonth=m;} col++; });
  const monthLabels=Array(totalCols).fill('');
  months.forEach(m=>{if(m.col<totalCols)monthLabels[m.col]=m.label;});
  return `<div class="heatmap-wrap">
    <div class="heatmap-month-labels" style="grid-template-columns:repeat(${totalCols},13px)">${monthLabels.map(l=>`<div style="font-size:9px;color:var(--muted)">${l}</div>`).join('')}</div>
    <div class="heatmap-grid" style="grid-template-columns:repeat(${totalCols},13px);grid-template-rows:repeat(7,13px)">${cells.join('')}</div>
    <div class="heatmap-legend">
      <div class="hm-cell" style="background:#1bc4a0;border-radius:2px"></div>Run
      <div class="hm-cell" style="background:#f07830;border-radius:2px;margin-left:6px"></div>Cycle
      <div class="hm-cell" style="background:#9b7dea;border-radius:2px;margin-left:6px"></div>Strength
      <div class="hm-cell" style="background:rgba(232,69,69,.35);border-radius:2px;margin-left:6px"></div>Missed
      <div class="hm-cell" style="background:rgba(255,255,255,.05);border-radius:2px;margin-left:6px"></div>Upcoming
    </div>
  </div>`;
}

function renderPlan(cw) {
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const weeks=PLAN.map(row=>{
    const isCurrent=row[0]===cw;
    const sd=new Date(row[1]).toLocaleDateString('en-IE',{day:'numeric',month:'short'});
    const sessionRows=days.map((d,i)=>`<div class="week-row"><span class="week-row-day">${d}</span><span class="week-row-session">${row[i+2]}</span></div>`).join('');
    return `<div class="week-card${isCurrent?' current':''}" id="wk-${row[0]}"><div class="week-header" onclick="toggleWeek(${row[0]})"><div class="week-header-left"><span class="week-num" style="color:${isCurrent?'var(--teal)':'var(--text)'}">${row[0]}${isCurrent?' ← now':''}</span><span class="week-date">${sd}</span><span class="phase-tag">${row[9]}</span></div><span class="week-chevron" id="chev-${row[0]}">${isCurrent?'▴':'▾'}</span></div><div class="week-body" id="wkb-${row[0]}" style="display:${isCurrent?'block':'none'}">${sessionRows}</div></div>`;
  }).join('');
  document.getElementById('content').innerHTML=`<div class="section-title">Training Plan</div><div class="section-sub">25 weeks · currently Week ${cw}</div>${weeks}`;

function toggleWeek(w) {
  const body=document.getElementById(`wkb-${w}`);const chev=document.getElementById(`chev-${w}`);
  if(!body) return;
  const open=body.style.display!=='none';
  body.style.display=open?'none':'block';
  chev.textContent=open?'▾':'▴';
}

    <div class="config-step"><div class="config-step-num">3</div><div class="config-step-body"><strong>Deploy → New deployment</strong> → Type: <strong>Web app</strong><br>Execute as: <strong>Me</strong> · Who has access: <strong>Anyone</strong> → Deploy → Authorise</div></div>
    <div class="config-step"><div class="config-step-num">4</div><div class="config-step-body">Copy the <strong>Web app URL</strong> and paste below</div></div>
    <div style="margin-bottom:16px"><label style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.7px">Google Apps Script URL</label><input class="config-url-input" type="url" id="api-url-input" placeholder="https://script.google.com/macros/s/..." value="${API_URL}"></div>
    <button class="btn-config-save" onclick="saveApiUrl()">Save & Connect →</button>
    ${API_URL?`<div style="margin-top:12px"><button class="btn-refresh" onclick="refreshData()" style="width:100%;justify-content:center">↻ Refresh data from Google Sheets</button></div>`:''}
    <div style="margin-top:20px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--muted);line-height:1.7"><strong style="color:var(--text)">How it works:</strong><br>Paul logs sessions in the <strong>Training_Log</strong> tab — marking <em>Completed?</em> as <strong>Yes</strong> and filling in actuals. The dashboard reads from the sheet automatically. No double-entry.</div>
  </div>`;
}

function saveApiUrl() {
  const url=document.getElementById('api-url-input')?.value?.trim();
  if(!url||!url.startsWith('https://')){ showToast('Please enter a valid URL','#e84545'); return; }
  API_URL=url; localStorage.setItem(STORAGE_KEY,url); trainingData=[];
  showToast('Saved! Loading data...'); navigate('overview');
}

async function refreshData() {
  trainingData=[]; lastFetch=0; showToast('Refreshing...');
  await render(); showToast('Data refreshed ✓');
}

// Expose to global scope so onclick attributes work
window.navigate = navigate;
window.toggleWeek = toggleWeek;
window.refreshData = refreshData;
window.saveApiUrl = saveApiUrl;

navigate('overview');
setInterval(()=>{ if(lastFetchTime) updateSyncBadge('ok'); },60000);
</script>
</body>
</html>
