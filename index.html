function parseDate(v) {
  if (!v && v !== 0) return null;
  if (typeof v === 'number') {
    const base = new Date(Date.UTC(1899,11,30));
    base.setUTCDate(base.getUTCDate() + Math.floor(v));
    return new Date(base.getUTCFullYear(), base.getUTCMonth(), base.getUTCDate());
  }
  if (typeof v === 'string') {
    const s = v.split('T')[0];
    const d = new Date(s);
    if (!isNaN(d.getTime())) return d;
  }
  return null;
}
function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function today() { return startOfDay(new Date()); }
function fmtDate(d) { return d ? d.toLocaleDateString('en-IE', {weekday:'short', day:'numeric', month:'short'}) : '-'; }
function fmtShort(d) { return d ? d.toLocaleDateString('en-IE', {day:'numeric', month:'short'}) : '-'; }
function daysUntil(d) { const diff = Math.ceil((startOfDay(d)-today())/86400000); return diff > 0 ? diff : 0; }
function pn(v) { const n = parseFloat(v); return isNaN(n) ? null : n; }
function txt(v) { return v == null ? '' : String(v); }
function ltxt(v) { return txt(v).trim().toLowerCase(); }
function isDone(r) { return ltxt(r['Completed?']) === 'yes'; }
function getKey(r, key, fallback='') { return r[key] != null ? r[key] : fallback; }

function inferDiscipline(r) {
  const d = ltxt(r['Discipline']);
  if (d) return d;
  const t = [r['Session Type'], r['Planned Session'], r['Actual Description']].map(ltxt).join(' ');
  if (/\b(ride|cycle|spin|bike)\b/.test(t)) return 'cycle';
  if (/\bstrength\b/.test(t)) return 'strength';
  if (/\b(rest|walk|recovery|mobility)\b/.test(t)) return 'recovery';
  return 'run';
}
function inferSubtype(r) {
  const s = ltxt(r['Session Subtype'] || r['Actual Description'] || r['Planned Session']);
  if (/race/.test(s)) return 'race';
  if (/long ride/.test(s)) return 'long ride';
  if (/long run/.test(s)) return 'long run';
  if (/threshold/.test(s)) return 'threshold';
  if (/tempo/.test(s)) return 'tempo';
  if (/interval|\d+\s*[x×]\s*\d|400m|800m|1km/.test(s)) return 'intervals';
  if (/easy run|recovery run|shakeout|jog/.test(s)) return 'easy run';
  if (/bike|cycle|ride|spin/.test(s)) return 'bike endurance';
  if (/strength/.test(s)) return 'strength';
  return 'general';
}
function isKeySession(r) {
  if (ltxt(r['Key Session?']) === 'yes') return true;
  return ['race','long ride','long run','threshold','tempo','intervals'].includes(inferSubtype(r));
}

function curWeek() {
  const t = today();
  for (const p of PLAN) {
    const st = startOfDay(new Date(p.start));
    const en = startOfDay(new Date(p.end));
    if (t >= st && t <= en) return p.week;
  }
  if (t < new Date(PLAN[0].start)) return 1;
  return PLAN[PLAN.length-1].week;
}

function weeklyStats(data) {
  const out = [];
  for (let i=0;i<PLAN.length;i++) {
    const p = PLAN[i];
    const weekRows = data.filter(r => Number(r['Week']) === p.week);
    const doneRows = weekRows.filter(isDone);
    const fatigueVals = doneRows.map(r => pn(r['Fatigue (1-5)'])).filter(v => v != null && v > 0);
    const sleepVals = doneRows.map(r => pn(r['Sleep (h)'])).filter(v => v != null && v > 0);
    const week = {
      week: p.week,
      phase: p.phase,
      goal: p.goal,
      start: new Date(p.start),
      end: new Date(p.end),
      runKm: 0, cycleKm: 0, duration: 0,
      runLoad: 0, bikeLoad: 0, strengthLoad: 0, totalLoad: 0,
      keyPlanned: 0, keyHit: 0,
      avgFatigue: fatigueVals.length ? fatigueVals.reduce((a,b)=>a+b,0)/fatigueVals.length : null,
      avgSleep: sleepVals.length ? sleepVals.reduce((a,b)=>a+b,0)/sleepVals.length : null,
      sessionsDone: doneRows.length,
      rows: doneRows
    };
    Object.values(p.days).forEach(x => {
      const s = txt(x).toLowerCase();
      if (/(threshold|tempo|\d+\s*[x×]\s*\d|long run|long ride|race)/.test(s)) week.keyPlanned++;
    });
    doneRows.forEach(r => {
      const runKm = pn(r['Run Distance (km)']) || 0;
      const cycleKm = pn(r['Cycle Distance (km)']) || 0;
      const dur = pn(r['Duration (min)']) || 0;
      const rpe = pn(r['RPE']) || 0;
      const srpe = pn(r['sRPE Load']) || (dur && rpe ? dur*rpe : 0);
      const disc = inferDiscipline(r);
      week.runKm += runKm;
      week.cycleKm += cycleKm;
      week.duration += dur;
      if (disc === 'cycle') week.bikeLoad += srpe;
      else if (disc === 'strength') week.strengthLoad += (pn(r['Strength Load']) || srpe*0.65);
      else if (disc === 'hybrid') {
        week.runLoad += srpe;
        week.strengthLoad += (pn(r['Strength Load']) || srpe*0.65);
      } else {
        week.runLoad += srpe;
      }
      if (isKeySession(r)) week.keyHit++;
    });
    week.totalLoad = week.runLoad + week.bikeLoad + week.strengthLoad;
    out.push(week);
  }
  for (let i=0;i<out.length;i++) {
    const recent = out.slice(Math.max(0, i-3), i+1).map(w => w.totalLoad).filter(v => v > 0);
    out[i].acute = out[i].totalLoad;
    out[i].chronic = recent.length === 4 ? recent.reduce((a,b)=>a+b,0)/recent.length : null;
    out[i].ac = out[i].chronic ? out[i].acute / out[i].chronic : null;
    if (recent.length === 4) {
      const mean = recent.reduce((a,b)=>a+b,0)/recent.length;
      const variance = recent.reduce((a,b)=>a+Math.pow(b-mean,2),0)/recent.length;
      const sd = Math.sqrt(variance);
      out[i].monotony = sd ? mean/sd : null;
      out[i].strain = out[i].monotony ? out[i].totalLoad * out[i].monotony : null;
    } else {
      out[i].monotony = null;
      out[i].strain = null;
    }
    out[i].keyPct = out[i].keyPlanned ? out[i].keyHit / out[i].keyPlanned : null;
    const fatiguePenalty = out[i].avgFatigue != null ? Math.max(0, (out[i].avgFatigue - 2.5) * 1.5) : 0;
    const sleepPenalty = out[i].avgSleep != null ? Math.max(0, 7 - out[i].avgSleep) : 0;
    const raw = 10 - fatiguePenalty - sleepPenalty;
    out[i].readiness = (out[i].avgFatigue != null || out[i].avgSleep != null) ? Math.max(1, Math.min(10, Math.round(raw*10)/10)) : null;
  }
  return out;
}

function historyRows(data) {
  return data.filter(isDone).map(r => {
    const date = parseDate(r['Date']);
    return {
      date, week: Number(r['Week'])||0, planned: txt(r['Planned Session']),
      actual: txt(r['Actual Description']) || txt(r['Planned Session']),
      subtype: inferSubtype(r), disc: inferDiscipline(r),
      runKm: pn(r['Run Distance (km)'])||0, cycleKm: pn(r['Cycle Distance (km)'])||0,
      dur: pn(r['Duration (min)'])||0, rpe: pn(r['RPE']), fatigue: pn(r['Fatigue (1-5)']),
      notes: txt(r['Notes'])
    };
  }).sort((a,b)=>b.date-a.date);
}

function qualityMetrics(data, ws) {
  const done = historyRows(data);
  const last4 = ws.slice(Math.max(0, curWeek()-4), curWeek());
  const longRuns = done.filter(x => x.subtype === 'long run').slice().sort((a,b)=>a.date-b.date);
  const longRides = done.filter(x => x.subtype === 'long ride' || x.disc === 'cycle').slice().sort((a,b)=>a.date-b.date);
  const thresholdSessions = done.filter(x => ['threshold','tempo','intervals'].includes(x.subtype));
  return {
    latestLongRun: longRuns.length ? longRuns[longRuns.length-1] : null,
    latestLongRide: longRides.length ? longRides[longRides.length-1] : null,
    bestLongRun: longRuns.reduce((m,x)=>Math.max(m,x.runKm),0),
    bestLongRide: longRides.reduce((m,x)=>Math.max(m,x.cycleKm),0),
    thresholdCount4w: thresholdSessions.filter(x => (today()-x.date)/(86400000) <= 28).length,
    recentKeyPct: last4.filter(w=>w.keyPct!=null).length ? last4.filter(w=>w.keyPct!=null).reduce((a,b)=>a+b.keyPct,0)/last4.filter(w=>w.keyPct!=null).length : null,
    recentFatigue: last4.filter(w=>w.avgFatigue!=null).length ? last4.filter(w=>w.avgFatigue!=null).reduce((a,b)=>a+b.avgFatigue,0)/last4.filter(w=>w.avgFatigue!=null).length : null
  };
}

function nextRace() {
  const now = today();
  return RACES.find(r => startOfDay(r.date) >= now) || RACES[RACES.length-1];
}

function raceReadiness(name, ws, qm) {
  if (name.indexOf('10k') >= 0) {
    const w = ws[7] || {}; // race week 8
    const prep = ws.slice(0,8);
    const hit = prep.filter(x=>x.keyPct!=null).length ? prep.filter(x=>x.keyPct!=null).reduce((a,b)=>a+b.keyPct,0)/prep.filter(x=>x.keyPct!=null).length : 0;
    const run = Math.max(...prep.map(x=>x.runKm||0),0);
    return {score: Math.round((hit*6 + Math.min(run/14,1)*4)*10)/10, driver:'Key-session adherence + long-run support'};
  }
  if (name.indexOf('Ring') >= 0) {
    const prep = ws.slice(8,15);
    const ride = Math.max(...prep.map(x=>x.cycleKm||0),0);
    const readiness = prep.filter(x=>x.readiness!=null).length ? prep.filter(x=>x.readiness!=null).reduce((a,b)=>a+b.readiness,0)/prep.filter(x=>x.readiness!=null).length : 0;
    return {score: Math.round((Math.min(ride/150,1)*6 + Math.min(readiness/7,1)*4)*10)/10, driver:'Longest ride + freshness'};
  }
  const prep = ws.slice(15,24);
  const hit = prep.filter(x=>x.keyPct!=null).length ? prep.filter(x=>x.keyPct!=null).reduce((a,b)=>a+b.keyPct,0)/prep.filter(x=>x.keyPct!=null).length : 0;
  const run = Math.max(...prep.map(x=>x.runKm||0),0);
  return {score: Math.round((hit*6 + Math.min(run/18,1)*4)*10)/10, driver:'HM-specific key work + long-run durability'};
}

function insightBlocks(ws) {
  const cw = curWeek();
  const cur = ws[cw-1] || {};
  const prev = ws[cw-2] || {};
  const out = [];
  if (cur.ac && cur.chronic && cur.ac/cur.chronic > 1.3) out.push({c:'red',i:'🔴',t:'Load spike risk',b:'This week is more than 1.3x the rolling 4-week average. Protect sleep and trim non-essential work.'});
  if (cur.monotony && cur.monotony > 2) out.push({c:'amber',i:'🟠',t:'Monotony is high',b:'Training variety is too narrow. Keep hard days hard and easy days genuinely easy.'});
  if (cur.avgFatigue != null && cur.avgFatigue >= 4) out.push({c:'red',i:'🔴',t:'Fatigue is elevated',b:'Average fatigue is high. Freshness now matters more than extra volume.'});
  if (cur.keyPct != null && cur.keyPct >= 0.85) out.push({c:'green',i:'🟢',t:'Key sessions are landing',b:'Your adherence to the most important work is strong. Keep prioritising the key sessions.'});
  if (cur.keyPct != null && cur.keyPct < 0.65) out.push({c:'amber',i:'🟡',t:'Priority sessions are slipping',b:'Missed easy sessions matter less. Missed threshold, long-run, or race-pace sessions matter more.'});
  const nr = nextRace();
  if (daysUntil(nr.date) <= 14) out.push({c:'blue',i:'🔵',t:nr.name + ' in ' + daysUntil(nr.date) + ' days',b:'You gain nothing now from proving fitness. Freshness and execution are the focus.'});
  if (!out.length) out.push({c:'green',i:'✅',t:'System stable',b:'No major red flags. Stay consistent and keep easy days under control.'});
  return out;
}

function toast(msg) {

function setSyncBadge(state) {
  const el = document.getElementById('sync');
  el.style.display = 'block';
  if (state === 'err') {
    el.className = 'sync err';
    el.textContent = 'Connection error';
  } else if (LAST_TIME) {
    el.className = 'sync';
    const m = Math.floor((Date.now()-LAST_TIME)/60000);
    el.textContent = m < 1 ? 'Synced just now' : 'Synced ' + m + 'm ago';
  }
}
function killCharts() {
  Object.keys(CHARTS).forEach(k => { try { CHARTS[k].destroy(); } catch(e) {} });
  CHARTS = {};
}
function mkChart(id, type, labels, datasets, yMax) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  CHARTS[id] = new Chart(ctx, {
    type,
    data: { labels, datasets },

      plugins:{ legend:{ display:false } },
      scales:{
        x:{ grid:{ color:'rgba(255,255,255,.04)' }, ticks:{ color:'#95a0b8', font:{size:9}, maxRotation:0, autoSkip:true, maxTicksLimit:12 } },
        y:{ grid:{ color:'rgba(255,255,255,.04)' }, ticks:{ color:'#95a0b8', font:{size:10} }, beginAtZero:true, max:yMax||undefined }
      }
    }
  });
}

function fetchData(force, cb) {
  if (!APIURL) { cb([]); return; }
  if (!force && DATA.length && (Date.now()-LAST_FETCH) < 120000) { cb(DATA); return; }
  const url = APIURL + (APIURL.indexOf('?') >= 0 ? '&' : '?') + 'action=getData&t=' + Date.now();
  const xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = 12000;
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        const json = JSON.parse(xhr.responseText);
        if (json.status === 'ok') {
          DATA = json.data || [];
          LAST_FETCH = Date.now();
          LAST_TIME = Date.now();
          FETCH_ERR = false;
          setSyncBadge('ok');
          cb(DATA); return;
        }
      } catch(e) {}
    }
    FETCH_ERR = true; setSyncBadge('err'); cb(DATA);
  };
  xhr.onerror = xhr.ontimeout = function() { FETCH_ERR = true; setSyncBadge('err'); cb(DATA); };
  xhr.send();
}

  const labels = ws.map(w => 'W'+w.week);
  mkChart('ld1','line',labels,[{data:ws.map(w => Math.round(w.totalLoad)||null), borderColor:'#22d3ee', backgroundColor:'rgba(34,211,238,.1)', tension:.3, pointRadius:3, fill:true}]);
  mkChart('ld2','line',labels,[{data:ws.map(w => w.ac != null ? Number(w.ac.toFixed(2)) : null), borderColor:'#fbbf24', backgroundColor:'rgba(251,191,36,.08)', tension:.3, pointRadius:3, fill:false}], 2);
}

function qualityPage(qm, ws, hist) {
  const body = document.getElementById('body');
  body.innerHTML = `
    <div style="font-size:20px;font-weight:700;margin-bottom:4px">Quality + durability</div>
    <div style="font-size:13px;color:var(--mu);margin-bottom:18px">This view tracks whether the work that matters most is actually landing.</div>
    <div class="g3">
      <div class="kpi"><div class="l">Recent key-hit %</div><div class="v">${qm.recentKeyPct != null ? Math.round(qm.recentKeyPct*100)+'%' : '-'}</div><div class="s">last 4 weeks</div></div>
      <div class="kpi"><div class="l">Longest ride</div><div class="v">${qm.bestLongRide || '-'}</div><div class="s">km completed</div></div>
      <div class="kpi"><div class="l">Threshold sessions</div><div class="v">${qm.thresholdCount4w}</div><div class="s">last 28 days</div></div>
      <div class="kpi"><div class="l">Latest long run</div><div class="v">${qm.latestLongRun ? qm.latestLongRun.runKm : '-'}</div><div class="s">${qm.latestLongRun ? fmtShort(qm.latestLongRun.date) : 'not yet logged'}</div></div>
      <div class="kpi"><div class="l">Latest long ride</div><div class="v">${qm.latestLongRide ? (qm.latestLongRide.cycleKm || qm.latestLongRide.runKm || '-') : '-'}</div><div class="s">${qm.latestLongRide ? fmtShort(qm.latestLongRide.date) : 'not yet logged'}</div></div>
      <div class="kpi"><div class="l">Recent fatigue</div><div class="v">${qm.recentFatigue != null ? qm.recentFatigue.toFixed(1) : '-'}</div><div class="s">last 4 weeks</div></div>
    </div>

    <div class="card">
      <div class="ct">What this means</div>
      <div class="ins ins-blue"><div class="ic">🔵</div><div><div class="tt">Elite dashboards do not reward box-ticking</div><div>The key question is whether threshold work, long endurance work, and race-specific sessions are happening consistently enough to move performance.</div></div></div>
    </div>

    <div class="card"><div class="ct">Key-session hit % by week</div><div class="cw" style="height:190px"><canvas id="ql1"></canvas></div></div>
    <div class="card"><div class="ct">Recent high-value sessions</div>
      <table class="table">
        <thead><tr><th>Date</th><th>Session</th><th>Type</th><th>Load</th><th>Notes</th></tr></thead>
        <tbody>
          ${hist.filter(x => ['race','long run','long ride','threshold','tempo','intervals'].includes(x.subtype)).slice(0,12).map(x => `<tr><td>${fmtDate(x.date)}</td><td>${x.actual}</td><td>${x.subtype}</td><td>${Math.round((x.dur||0)*(x.rpe||0))}</td><td>${x.notes ? x.notes.slice(0,90)+'…' : ''}</td></tr>`).join('') || '<tr><td colspan="5">No high-value completed sessions yet.</td></tr>'}
        </tbody>
      </table>
    </div>
  `;
  const labels = ws.map(w => 'W'+w.week);
  mkChart('ql1','bar',labels,[{data:ws.map(w => w.keyPct != null ? Math.round(w.keyPct*100) : null), backgroundColor:'#60a5fa', borderRadius:3}],100);
}

function historyPage(hist) {
  const body = document.getElementById('body');
  body.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div style="font-size:20px;font-weight:700">Session history</div>
      <button class="btn" onclick="fetchData(true, ()=>render())">Refresh</button>
    </div>
    <div style="font-size:13px;color:var(--mu);margin-bottom:18px">${hist.length} completed sessions</div>
    ${hist.length ? hist.slice(0,40).map(x => {
      const color = x.disc === 'run' ? '#22c55e' : x.disc === 'cycle' ? '#f97316' : x.disc === 'strength' ? '#a78bfa' : '#95a0b8';
      return `<div class="card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span class="badge" style="background:rgba(255,255,255,.06);color:${color}">${x.subtype}</span>
          <span style="font-size:12px;color:var(--mu)">W${x.week} · ${fmtDate(x.date)}</span>
        </div>
        <div style="font-weight:700;margin-bottom:8px">${x.actual}</div>
        <div class="g4">
          <div class="kpi"><div class="l">Run km</div><div class="v" style="font-size:18px">${x.runKm || '-'}</div></div>
          <div class="kpi"><div class="l">Cycle km</div><div class="v" style="font-size:18px">${x.cycleKm || '-'}</div></div>
          <div class="kpi"><div class="l">Duration</div><div class="v" style="font-size:18px">${x.dur || '-'}</div></div>
          <div class="kpi"><div class="l">RPE</div><div class="v" style="font-size:18px">${x.rpe || '-'}</div></div>
        </div>
        ${x.notes ? `<div style="font-size:12px;color:var(--mu);margin-top:8px">${x.notes.slice(0,180)}${x.notes.length>180?'…':''}</div>` : ''}
      </div>`;
    }).join('') : '<div class="empty"><div style="font-size:38px">📋</div><div>No completed sessions yet</div></div>'}
  `;
}

function planPage(cw) {
  const body = document.getElementById('body');
  body.innerHTML = `
    <div style="font-size:20px;font-weight:700;margin-bottom:4px">Periodized plan</div>
    <div style="font-size:13px;color:var(--mu);margin-bottom:18px">Upgraded for 10k performance, bike durability, and half-marathon specificity.</div>
    ${PLAN.map(p => `
      <div class="wcard" id="wk${p.week}">
        <div class="wh" onclick="toggleWeek(${p.week})">
          <div class="whl">
            <span class="wn" style="color:${p.week===cw?'var(--te)':'var(--tx)'}">W${p.week}${p.week===cw?' · now':''}</span>
            <span class="wdt">${fmtShort(new Date(p.start))}–${fmtShort(new Date(p.end))}</span>
            <span class="wpt">${p.phase}</span>
          </div>
          <span id="wch${p.week}" style="color:var(--mu)">${p.week===cw?'▲':'▼'}</span>
        </div>
        <div class="wb" id="wb${p.week}" style="display:${p.week===cw?'block':'none'}">
          <div style="font-size:12px;color:var(--mu);padding:8px 0 4px">${p.goal}</div>
          ${Object.entries(p.days).map(([d,s]) => `<div class="wr"><span class="wrd">${d}</span><span class="wrs">${s}</span></div>`).join('')}
          <div class="wr"><span class="wrd">Focus</span><span class="wrs">${p.focus}</span></div>
        </div>
      </div>`).join('')}
  `;
  setTimeout(() => {
    const el = document.getElementById('wk'+cw);
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 120);
}
function toggleWeek(w) {
  const b = document.getElementById('wb'+w), c = document.getElementById('wch'+w);
  if (!b) return;
  const open = b.style.display !== 'none';
  b.style.display = open ? 'none' : 'block';
  c.textContent = open ? '▼' : '▲';
}

function racesPage(ws, qm) {
  const body = document.getElementById('body');
  body.innerHTML = `
    <div style="font-size:20px;font-weight:700;margin-bottom:4px">Race readiness</div>
    <div style="font-size:13px;color:var(--mu);margin-bottom:18px">Readiness is inferred from the work relevant to each event, not from generic mileage alone.</div>
    ${RACES.map(r => {
      const rr = raceReadiness(r.name, ws, qm);
      return `<div class="race">
        <div class="nm">${r.name}</div>

}
