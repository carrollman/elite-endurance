function saveApi() {
  var el = document.getElementById('api-url');
  if(!el) return;
  var url = el.value.trim();
  if(url && url.indexOf('https://')!==0) { toast('URL must start with https://', '#ff3b5c'); return; }
  APIURL = url;
  localStorage.setItem(SKEY, url);
  if(url) {
    toast('Saved — connecting...');
    fetchData(true, function(){ render(); });
  } else {
    toast('Cleared');
    render();
  }
}

function testApi() {
  if(!APIURL) { toast('No URL saved yet', '#ff3b5c'); return; }
  toast('Testing...');
  fetchData(true, function(data) {
    if(LIVE_OK) toast('Connected — '+data.length+' sessions loaded');
    else        toast('Connection failed — check URL and deployment', '#ff3b5c');
  });
}


function fetchData(force, cb) {
  if(!APIURL){ cb(LOG_DATA); return; }
  if(!force && LIVE.length && (Date.now()-LAST_F) < 120000){ cb(LIVE); return; }

  var url = APIURL + (APIURL.indexOf('?')>=0?'&':'?') + 'action=getData&t=' + Date.now();
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = 15000;

  xhr.onload = function() {
    if(xhr.status === 200) {
      try {
        var j = JSON.parse(xhr.responseText);
        if(j.status === 'ok' && j.data && j.data.length) {
          LIVE = j.data;
          // If Apps Script returns updated plan/readiness, use them too
          if(j.plan && j.plan.length)      window._LIVE_PLAN = j.plan;
          if(j.readiness && j.readiness.length) window._LIVE_READINESS = j.readiness;
          LAST_F = Date.now();
          LAST_T = Date.now();
          LIVE_OK = true;
          var badge = document.getElementById('live-badge');
          if(badge) badge.style.display = 'flex';
          cb(LIVE);
          return;
        }
        // status ok but empty data — fall through to embedded
        if(j.status === 'ok') { cb(LOG_DATA); return; }
        throw new Error(j.error || 'Bad response');
      } catch(e) {
        console.warn('Dashboard fetch parse error:', e.message);
      }
    }
    // On any failure fall back to embedded data silently
    cb(LOG_DATA);
  };

  xhr.onerror = xhr.ontimeout = function() {
    cb(LOG_DATA);
  };

  xhr.send();
}

// Override getData() so live plan is used when available
function getData() {
  return LIVE.length ? LIVE : LOG_DATA;
}
function getPlanData() {
  return (window._LIVE_PLAN && window._LIVE_PLAN.length) ? window._LIVE_PLAN : PLAN_DATA;
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function toast(msg,col){
  var el=document.getElementById('toast');
  el.textContent=msg; el.style.background=col||'#00f5a0'; el.style.color=col?'#fff':'#07090d';
  el.className='toast on';
  setTimeout(function(){el.className='toast';},2500);
}

// ═══════════════════════════════════════════
// NAV & RENDER
// ═══════════════════════════════════════════
function go(tab) {
  TAB=tab;
  ['cmd','load','quality','plan','races','setup'].forEach(function(t){
    var el=document.getElementById('nl-'+t);
    if(el) el.className='nl'+(t===tab?' on':'');
  });
  render();
}

function render() {
  killCharts();
  var cw=curWeek();
  document.getElementById('hdr-meta').textContent='Paul Carroll · W'+cw+' of 25';
  document.getElementById('body').className='body fade-in';

  if(TAB==='plan'){   document.getElementById('body').innerHTML=planPage(cw); scrollToCurWk(); return; }
  if(TAB==='races'){  document.getElementById('body').innerHTML=racesPage(); return; }
  if(TAB==='setup'){  document.getElementById('body').innerHTML=setupPage(); return; }

  document.getElementById('body').innerHTML='<div class="ld-state"><div class="spin"></div><span>Loading data...</span></div>';
  fetchData(false,function(data){
    if(TAB==='cmd')     cmdPage(data,cw);
    else if(TAB==='load')    loadPage(data,cw);
    else if(TAB==='quality') qualityPage(data,cw);
  });
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
go('cmd');
setInterval(function(){if(LIVE_OK){var m=Math.floor((Date.now()-LAST_T)/60000);document.getElementById('hdr-meta').textContent='Paul Carroll · W'+curWeek()+' · Synced '+(m<1?'just now':m+'m ago');}},60000);
</script>
