<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Paul Carroll — Performance Cockpit 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  /* Core palette — gunmetal cockpit */
  --bg:    #07090d;
  --bg2:   #0c0f16;
  --bg3:   #10141d;
  --bg4:   #141923;
  --bg5:   #1a2030;
  --bd:    rgba(255,255,255,0.055);
  --bd2:   rgba(255,255,255,0.11);
  --bd3:   rgba(255,255,255,0.18);

  /* Text */
  --tx:    #e2e8f4;
  --tx2:   #7a8699;
  --tx3:   #3d4a5e;

  /* Discipline colours */
  --run:   #00f5a0;
  --run2:  rgba(0,245,160,0.10);
  --run3:  rgba(0,245,160,0.04);
  --cyc:   #ff9500;
  --cyc2:  rgba(255,149,0,0.10);
  --str:   #bf7fff;
  --str2:  rgba(191,127,255,0.10);

  /* Status */
  --ok:    #00f5a0;
  --warn:  #ffd60a;
  --alert: #ff3b5c;
  --info:  #0a84ff;

  /* UI */
  --r: 8px;
  --r2: 5px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--tx);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

button, input, select, textarea { font-family: inherit; }

/* ─── LAYOUT ─── */
.app { display: flex; flex-direction: column; min-height: 100vh; }

/* ─── HEADER ─── */
.hdr {
  background: rgba(7,9,13,0.94);
  border-bottom: 1px solid var(--bd);
  padding: 10px 15px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(16px);
}
.hdr-brand {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 800;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--run);
}
.hdr-meta { font-size: 10px; color: var(--tx3); margin-top: 1px; }
.hdr-r { display: flex; align-items: center; gap: 8px; }
.live-badge {
  display: flex; align-items: center; gap: 4px;
  font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 20px;
  background: rgba(0,245,160,0.10); color: var(--run);
  border: 1px solid rgba(0,245,160,0.2);
}
.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--run); animation: pulse 1.8s ease infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--run), var(--info));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 800; color: #07090d; flex-shrink: 0;
}

/* ─── BODY ─── */
.body { flex: 1; overflow-y: auto; padding: 14px 13px 90px; }

/* ─── NAV ─── */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(10,13,19,0.97);
  border-top: 1px solid var(--bd2);
  display: flex; z-index: 60;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  backdrop-filter: blur(20px);
}
.nb {
  flex: 1; background: transparent; border: none;
  padding: 9px 4px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: opacity .15s;
}
.nb:active { opacity: .6; }
.ni { font-size: 17px; line-height: 1; }
.nl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--tx3); transition: color .15s;
}
.nl.on { color: var(--run); }

/* ─── PAGE TITLES ─── */
.pg-hd { margin-bottom: 18px; }
.pg-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 800;
  letter-spacing: .5px; line-height: 1;
  margin-bottom: 3px;
}
.pg-sub { font-size: 11px; color: var(--tx2); }

/* ─── SECTION LABEL ─── */
.sec-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--tx3); margin-bottom: 9px;
  display: flex; align-items: center; gap: 8px;
}
.sec-label::after {
  content: ''; flex: 1; height: 1px;
  background: var(--bd);
}

/* ─── CARD ─── */
.card {
  background: var(--bg3);
  border: 1px solid var(--bd);
  border-radius: var(--r);
  padding: 14px 15px;
  margin-bottom: 12px;
}
.card:last-child { margin-bottom: 0; }
.card-hd {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.card-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--tx3);
}
.card-accent { font-size: 11px; font-weight: 600; }

/* ─── COMMAND ROW (today / tomorrow) ─── */
.cmd-session {
  background: var(--bg4);
  border: 1px solid var(--bd2);
  border-radius: var(--r);
  padding: 13px 14px;
  margin-bottom: 10px;
  position: relative; overflow: hidden;
}
.cmd-session::before {
  content: ''; position: absolute;
  top: 0; left: 0; width: 3px; bottom: 0;
  border-radius: 8px 0 0 8px;
}
.cmd-session.today::before  { background: var(--run); }
.cmd-session.tomorrow::before { background: var(--info); opacity: .6; }
.cmd-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 4px;
}
.cmd-tag.today  { color: var(--run); }
.cmd-tag.tomorrow { color: var(--info); opacity: .7; }
.cmd-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.cmd-meta { font-size: 11px; color: var(--tx2); }

/* ─── DIRECTIVE CARD ─── */
.directive {
  background: linear-gradient(135deg, rgba(0,245,160,0.05), rgba(10,132,255,0.04));
  border: 1px solid rgba(0,245,160,0.15);
  border-radius: var(--r);
  padding: 13px 14px;
  margin-bottom: 12px;
}
.directive-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--run); margin-bottom: 4px;
}
.directive-text { font-size: 13px; line-height: 1.6; color: var(--tx); }

/* ─── KPI STRIP ─── */
.kpi-strip { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
.kpi-strip-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; }
.kpi {
  background: var(--bg3);
  border: 1px solid var(--bd);
  border-radius: var(--r);
  padding: 11px 12px;
}
.kpi-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 8px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--tx3); margin-bottom: 5px;
}
.kpi-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 800; line-height: 1;
}
.kpi-sub { font-size: 10px; color: var(--tx2); margin-top: 3px; }

/* ─── RACE READINESS CARDS ─── */
.race-readiness-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
.rr-card {
  background: var(--bg3); border: 1px solid var(--bd);
  border-radius: var(--r); padding: 12px 11px; text-align: center;
  position: relative; overflow: hidden;
}
.rr-card::after {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0; height: 2px;
}
.rr-card.run::after  { background: var(--run); }
.rr-card.cyc::after  { background: var(--cyc); }
.rr-card.hm::after   { background: var(--str); }
.rr-name { font-size: 9px; font-weight: 700; color: var(--tx2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.rr-score {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 30px; font-weight: 800; line-height: 1;
}
.rr-grade { font-size: 9px; color: var(--tx2); margin-top: 2px; }
.rr-days { font-size: 10px; margin-top: 6px; font-weight: 600; }

/* ─── RADIAL RING ─── */
.ring-wrap {
  display: flex; align-items: center; justify-content: center;
  padding: 8px 0;
}
.ring-svg { transform: rotate(-90deg); }
.ring-track { fill: none; stroke: rgba(255,255,255,.06); }
.ring-fill  { fill: none; stroke-linecap: round; transition: stroke-dashoffset .6s; }

/* ─── INSIGHT ALERTS ─── */
.alert-stack { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.alert-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 11px 13px;
  border-radius: var(--r);
  border: 1px solid;
}
.alert-item.red   { background: rgba(255,59,92,.07);  border-color: rgba(255,59,92,.2); }
.alert-item.amber { background: rgba(255,214,10,.06); border-color: rgba(255,214,10,.2); }
.alert-item.green { background: rgba(0,245,160,.05);  border-color: rgba(0,245,160,.15); }
.alert-item.blue  { background: rgba(10,132,255,.05); border-color: rgba(10,132,255,.15); }
.alert-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.alert-body .a-title { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
.alert-body .a-text  { font-size: 11px; color: var(--tx2); line-height: 1.5; }

/* ─── PROGRESS SEASON BAR ─── */
.season-bar-wrap {
  height: 4px; background: rgba(255,255,255,.05);
  border-radius: 2px; overflow: hidden; margin: 8px 0 4px;
}
.season-bar-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--run), var(--info));
}
.season-labels { display: flex; justify-content: space-between; }
.season-labels span { font-size: 9px; color: var(--tx3); }

/* ─── CHART ─── */
.chart-wrap { position: relative; }

/* ─── LOAD BAR STACKED ─── */
.load-bar-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 0; border-top: 1px solid rgba(255,255,255,.03);
}
.load-bar-row:first-child { border-top: none; }
.lbr-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .5px;
  color: var(--tx2); width: 52px; flex-shrink: 0;
}
.lbr-track {
  flex: 1; height: 6px; background: rgba(255,255,255,.05);
  border-radius: 3px; overflow: hidden;
}
.lbr-fill { height: 100%; border-radius: 3px; transition: width .5s; }
.lbr-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 700;
  width: 40px; text-align: right; flex-shrink: 0;
}

/* ─── HEATMAP ─── */
.hm-wrap { overflow-x: auto; padding-bottom: 4px; }
.hm-grid { display: grid; gap: 3px; width: max-content; }
.hm-cell {
  width: 11px; height: 11px; border-radius: 2px;
  position: relative; cursor: default;
}
.hm-cell:hover .hm-tip { display: block; }
.hm-tip {
  display: none; position: absolute;
  bottom: calc(100% + 4px); left: 50%;
  transform: translateX(-50%);
  background: var(--bg2); border: 1px solid var(--bd2);
  border-radius: 5px; padding: 4px 8px;
  font-size: 10px; white-space: nowrap;
  z-index: 20; pointer-events: none; color: var(--tx);
}
.hm-legend { display: flex; align-items: center; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
.hm-li { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--tx2); }
.hm-sw { width: 9px; height: 9px; border-radius: 2px; }

/* ─── PLAN CARDS ─── */
.wk-card { border: 1px solid var(--bd); border-radius: var(--r); margin-bottom: 7px; overflow: hidden; background: var(--bg3); }
.wk-card.now { border-color: rgba(0,245,160,.25); background: rgba(0,245,160,.02); }
.wk-hd { display: flex; align-items: center; justify-content: space-between; padding: 11px 13px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
.wk-hl { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.wk-num { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 800; }
.wk-dates { font-size: 10px; color: var(--tx3); }
.phase-pill {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
  padding: 2px 8px; border-radius: 20px;
}
.phase-pill.build  { background: rgba(10,132,255,.12); color: var(--info); }
.phase-pill.peak   { background: rgba(255,149,0,.12);  color: var(--cyc); }
.phase-pill.taper  { background: rgba(255,214,10,.1);  color: var(--warn); }
.phase-pill.race   { background: rgba(0,245,160,.1);   color: var(--run); }
.phase-pill.recover{ background: rgba(122,134,153,.1); color: var(--tx2); }
.wk-chev { color: var(--tx3); font-size: 11px; }
.wk-body { padding: 0 13px 13px; }
.wk-day { display: flex; gap: 10px; padding: 6px 0; border-top: 1px solid rgba(255,255,255,.03); }
.wk-day:first-child { border-top: none; }
.day-ab {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; font-weight: 700; letter-spacing: .5px;
  text-transform: uppercase; color: var(--tx3);
  width: 26px; flex-shrink: 0; padding-top: 2px;
}
.day-sess { font-size: 12px; }

/* ─── SESSION LOG ─── */
.sess-card { background: var(--bg3); border: 1px solid var(--bd); border-radius: var(--r); padding: 13px 14px; margin-bottom: 9px; }
.sess-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.kind-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: 700; letter-spacing: .3px; text-transform: uppercase; }
.sess-title { font-size: 13px; font-weight: 600; margin-bottom: 9px; line-height: 1.3; }
.metrics-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; }
.m-box { background: rgba(255,255,255,.03); border-radius: 5px; padding: 7px 9px; }
.m-lbl { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--tx3); margin-bottom: 3px; }
.m-val { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 800; }
.sess-note { font-size: 11px; color: var(--tx2); margin-top: 9px; line-height: 1.6; border-top: 1px solid var(--bd); padding-top: 9px; }

/* ─── FILTER PILLS ─── */
.filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.f-pill { background: var(--bg3); border: 1px solid var(--bd); border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 600; color: var(--tx2); cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all .15s; }
.f-pill.on { background: rgba(0,245,160,.1); border-color: rgba(0,245,160,.25); color: var(--run); }

/* ─── TAB SWITCHER ─── */
.tab-row { display: flex; gap: 0; margin-bottom: 14px; background: var(--bg3); border: 1px solid var(--bd); border-radius: var(--r); padding: 3px; }
.tab-btn { flex: 1; padding: 7px 4px; border: none; background: transparent; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--tx3); border-radius: 6px; cursor: pointer; transition: all .15s; }
.tab-btn.on { background: var(--bg5); color: var(--tx); }

/* ─── ZONE BAR ─── */
.zone-strip { display: flex; gap: 3px; height: 7px; border-radius: 4px; overflow: hidden; margin: 8px 0; }
.zone-seg { flex: 1; transition: flex .4s; }

/* ─── RACE GUIDE ─── */
.rg-card { background: var(--bg3); border: 1px solid var(--bd); border-radius: var(--r); padding: 15px; margin-bottom: 12px; }
.rg-name { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; margin-bottom: 2px; }
.rg-meta { font-size: 11px; color: var(--tx2); margin-bottom: 14px; }
.rg-section { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--tx3); margin: 12px 0 7px; }
.rg-row { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-top: 1px solid var(--bd); }
.rg-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: var(--run); width: 65px; flex-shrink: 0; padding-top: 1px; }
.rg-desc { font-size: 12px; color: var(--tx2); line-height: 1.5; }
.rg-dot-row { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-top: 1px solid var(--bd); font-size: 12px; color: var(--tx2); }
.rg-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--run); flex-shrink: 0; margin-top: 6px; }

/* ─── STRENGTH ─── */
.str-table { width: 100%; border-collapse: collapse; }
.str-table th { font-family: 'Barlow Condensed', sans-serif; font-size: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--tx3); padding: 5px 8px; text-align: left; border-bottom: 1px solid var(--bd); }
.str-table td { font-size: 12px; padding: 8px 8px; border-bottom: 1px solid rgba(255,255,255,.025); vertical-align: top; color: var(--tx2); }
.str-table td:first-child { color: var(--tx); font-weight: 500; }
.str-val { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 800; }

/* ─── ACWR GAUGE ─── */
.acwr-gauge {
  text-align: center; padding: 16px 0 10px;
}
.acwr-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 52px; font-weight: 800; line-height: 1;
}
.acwr-lbl { font-size: 11px; color: var(--tx2); margin-top: 3px; }
.acwr-band-badge { display: inline-block; margin-top: 9px; padding: 3px 14px; border-radius: 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; }
.acwr-scale { display: flex; align-items: center; margin-top: 12px; }
.acwr-scale-bar { flex: 1; height: 4px; border-radius: 2px; background: linear-gradient(90deg, rgba(10,132,255,.4) 0%, rgba(0,245,160,.8) 35%, rgba(255,214,10,.8) 70%, rgba(255,59,92,.8) 100%); }
.acwr-scale-labels { display: flex; justify-content: space-between; margin-top: 4px; }
.acwr-scale-labels span { font-size: 8px; color: var(--tx3); }

/* ─── MONOTONY & STRAIN ─── */
.mono-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.mono-card { background: var(--bg3); border: 1px solid var(--bd); border-radius: var(--r); padding: 13px; text-align: center; }
.mono-val { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; margin: 6px 0 3px; }
.mono-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--tx3); }
.mono-note { font-size: 10px; color: var(--tx2); margin-top: 3px; }

/* ─── READINESS SCORES ─── */
.readiness-banner {
  background: var(--bg4); border: 1px solid var(--bd2); border-radius: var(--r);
  padding: 14px 15px; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.rb-label { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--tx3); margin-bottom: 4px; }
.rb-score { font-family: 'Barlow Condensed', sans-serif; font-size: 38px; font-weight: 800; line-height: 1; }
.rb-grade { font-size: 11px; color: var(--tx2); margin-top: 3px; }
.rb-bars { flex: 1; }
.rb-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.rb-bar-row:last-child { margin-bottom: 0; }
.rb-bar-lbl { font-size: 10px; color: var(--tx2); width: 72px; flex-shrink: 0; }
.rb-track { flex: 1; height: 4px; background: rgba(255,255,255,.05); border-radius: 2px; overflow: hidden; }
.rb-fill { height: 100%; border-radius: 2px; transition: width .5s; }

/* ─── SPINNER / LOADING ─── */
.spin { width: 24px; height: 24px; border: 2px solid rgba(255,255,255,.07); border-top-color: var(--run); border-radius: 50%; animation: sp .7s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }
.ld-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; gap: 10px; color: var(--tx2); font-size: 11px; }

/* ─── TOAST ─── */

function pn(v) {
  if (v === null || v === undefined || v === '') return null;
  if (typeof v === 'number') return isNaN(v) ? null : v;
  var n = parseFloat(String(v));
  return isNaN(n) ? null : n;
}

// Handles string dates AND Google Sheets serial numbers
function parseDate(v) {
  if (!v && v !== 0) return null;
  if (typeof v === 'number') {
    var base = new Date(Date.UTC(1899,11,30));
    base.setUTCDate(base.getUTCDate() + Math.floor(v));
    return new Date(base.getUTCFullYear(), base.getUTCMonth(), base.getUTCDate());
  }
  if (typeof v === 'string') {
    var s = v.split('T')[0];
    var d = new Date(s);
    if (!isNaN(d.getTime())) return d;
  }
  return null;
}

function startOfDay(d) { var x=new Date(d); x.setHours(0,0,0,0); return x; }
function todayDate()   { return startOfDay(new Date()); }
function isDone(r)     { return String(r['Completed?']||'').trim().toLowerCase() === 'yes'; }
function fmtDate(d)    { if(!d)return''; var dt=new Date(d); if(isNaN(dt))return String(d); return dt.toLocaleDateString('en-IE',{day:'numeric',month:'short'}); }
function fmtShort(d)   { if(!d)return''; var dt=new Date(d); if(isNaN(dt))return String(d); return dt.toLocaleDateString('en-IE',{day:'numeric',month:'short'}); }
function daysUntil(d)  { var diff=Math.ceil((startOfDay(d)-todayDate())/86400000); return diff>0?diff:0; }
function txt(v)        { return v==null?'':String(v); }
function ltxt(v)       { return txt(v).trim().toLowerCase(); }

function getData()    { return LIVE.length?LIVE:LOG_DATA; }
function curWeek() {
  var t = todayDate();
  for (var i=0;i<PLAN_DATA.length;i++) {
    var p=PLAN_DATA[i];
    var sd=startOfDay(new Date(p['Start Date']));
    var ed=startOfDay(new Date(p['End Date']));
    if(t>=sd&&t<=ed) return +p['Week'];
  }
  if(t < new Date(PLAN_DATA[0]['Start Date'])) return 1;
  return +PLAN_DATA[PLAN_DATA.length-1]['Week'];
}

// Discipline inference: prefer workbook Discipline field, fall back to text
function inferDiscipline(r) {
  var d = ltxt(r['Discipline']||'');
  if (d==='run')      return 'run';
  if (d==='cycle')    return 'cycle';
  if (d==='strength') return 'strength';
  if (d==='recovery'||d==='mobility') return 'recovery';
  if (d==='hybrid')   return 'hybrid';
  var t = [r['Session Type'],r['Planned Session'],r['Actual Description']].map(ltxt).join(' ');
  if (/\b(ride|cycle|spin|bike)\b/.test(t))        return 'cycle';
  if (/\bstrength\b/.test(t))                       return 'strength';
  if (/\b(rest|walk|recovery|mobility)\b/.test(t)) return 'recovery';
  return 'run';
}

// Subtype inference: prefer Session Subtype field
function inferSubtype(r) {
  var s = ltxt(r['Session Subtype']||r['Actual Description']||r['Planned Session']||'');
  if (/race/.test(s))                                          return 'race';
  if (/long ride/.test(s))                                     return 'long ride';
  if (/long run/.test(s))                                      return 'long run';
  if (/threshold/.test(s))                                     return 'threshold';
  if (/tempo/.test(s))                                         return 'tempo';
  if (/interval|\d+\s*[x×]\s*\d|400m|800m|1km/.test(s))      return 'intervals';
  if (/easy run|recovery run|shakeout|jog/.test(s))           return 'easy run';
  if (/bike|cycle|ride|spin/.test(s))                         return 'bike endurance';
  if (/strength/.test(s))                                      return 'strength';
  return 'general';
}

// Key session: prefer workbook flag, fall back to subtype
function isKeySession(r) {
  var k = String(r['Key Session?']||'').trim();
  if (k==='Yes') return true;
  if (k==='No')  return false;
  return ['race','long ride','long run','threshold','tempo','intervals'].indexOf(inferSubtype(r)) >= 0;
}

// Full weekly stats — PLAN_DATA driven, per-session sRPE, readiness scoring
function calcWeeks(data) {
  var out = [];
  for (var i=0;i<PLAN_DATA.length;i++) {
    var p = PLAN_DATA[i];
    var wNum = +p['Week'];
    var weekRows = data.filter(function(r){ return +r['Week']===wNum; });
    var doneRows = weekRows.filter(isDone);

    var fatigueVals = doneRows.map(function(r){ return pn(r['Fatigue (1-5)']); }).filter(function(v){ return v!=null&&v>0; });
    var sleepVals   = doneRows.map(function(r){ return pn(r['Sleep (h)']); }).filter(function(v){ return v!=null&&v>0; });

    var week = {
      week: wNum,
      phase: String(p['Phase']||''),
      goal:  String(p['Primary Goal']||''),
      start: parseDate(p['Start Date']),
      end:   parseDate(p['End Date']),
      run:0, cyc:0, dur:0,
      runLoad:0, cycLoad:0, strLoad:0, totalLoad:0,
      keyDone:0, keyTotal:0,
      done: doneRows.length, total: weekRows.length,
      avgFatigue: fatigueVals.length ? fatigueVals.reduce(function(a,b){return a+b;},0)/fatigueVals.length : null,
      avgSleep:   sleepVals.length   ? sleepVals.reduce(function(a,b){return a+b;},0)/sleepVals.length   : null,
      rpes:[], fats:[]
    };

    // Count planned key sessions from plan text
    var DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    DAYS.forEach(function(d){
      var s = ltxt(p[d]||'');
      if(/(threshold|tempo|\d+\s*[x×]\s*\d|long run|long ride|race)/.test(s)) week.keyTotal++;
    });

    doneRows.forEach(function(r) {
      var runKm  = pn(r['Run Distance (km)'])||0;
      var cycKm  = pn(r['Cycle Distance (km)'])||0;
      var dur    = pn(r['Duration (min)'])||0;
      var rpe    = pn(r['RPE'])||0;
      // Prefer workbook pre-computed sRPE Load
      var srpe   = pn(r['sRPE Load']) || (dur&&rpe ? dur*rpe : 0);
      var disc   = inferDiscipline(r);

      week.run += runKm;
      week.cyc += cycKm;
      week.dur += dur;

      if (disc==='cycle')          { week.cycLoad += srpe; }
      else if (disc==='strength')  { week.strLoad += (pn(r['Strength Load'])||srpe*0.65); }
      else if (disc==='hybrid')    { week.runLoad += srpe*0.5; week.strLoad += (pn(r['Strength Load'])||srpe*0.5); }
      else                         { week.runLoad += srpe; }

      if(isKeySession(r)) week.keyDone++;
      if(rpe>0)  week.rpes.push(rpe);
      if(pn(r['Fatigue (1-5)'])!=null&&pn(r['Fatigue (1-5)'])>0) week.fats.push(pn(r['Fatigue (1-5)']));
    });

    week.totalLoad = week.runLoad + week.cycLoad + week.strLoad;
    week.avgRpe = week.rpes.length ? week.rpes.reduce(function(a,b){return a+b;},0)/week.rpes.length : null;
    week.pct    = week.total>0 ? Math.round(week.done/week.total*100) : 0;
    week.keyPct = week.keyTotal>0 ? week.keyDone/week.keyTotal : null;
    out.push(week);
  }

  // Rolling calculations: ACWR, monotony, strain, readiness
  for (var i=0;i<out.length;i++) {
    var recent4 = [];
    for(var j=Math.max(0,i-3);j<=i;j++) if(out[j].totalLoad>0) recent4.push(out[j].totalLoad);

    out[i].acute   = out[i].totalLoad;
    out[i].chronic = recent4.length===4 ? recent4.reduce(function(a,b){return a+b;},0)/recent4.length : null;
    out[i].ac      = out[i].chronic ? Math.round((out[i].acute/out[i].chronic)*100)/100 : null;

    if(recent4.length===4) {
      var mean = recent4.reduce(function(a,b){return a+b;},0)/recent4.length;
      var sd   = Math.sqrt(recent4.reduce(function(a,v){return a+Math.pow(v-mean,2);},0)/recent4.length);
      out[i].monotony = sd>0 ? Math.round((mean/sd)*100)/100 : null;
      out[i].strain   = out[i].monotony!=null ? Math.round(out[i].totalLoad*out[i].monotony) : null;
    } else { out[i].monotony=null; out[i].strain=null; }

    // Readiness from fatigue + sleep (index.html's model — better than static 10)
    var fatPen  = out[i].avgFatigue!=null ? Math.max(0,(out[i].avgFatigue-2.5)*1.5)  : 0;
    var slpPen  = out[i].avgSleep!=null   ? Math.max(0,7-out[i].avgSleep)            : 0;
    out[i].readiness = (out[i].avgFatigue!=null||out[i].avgSleep!=null)
      ? Math.max(1, Math.min(10, Math.round((10-fatPen-slpPen)*10)/10))
      : null;
  }
  return out;
}

// Per-session history array (index.html pattern)
function historyRows(data) {
  return data.filter(isDone).map(function(r) {
    return {
      date:    parseDate(r['Date']),
      week:    +r['Week']||0,
      planned: txt(r['Planned Session']),
      actual:  txt(r['Actual Description'])||txt(r['Planned Session']),
      subtype: inferSubtype(r),
      disc:    inferDiscipline(r),
      kind:    inferDiscipline(r)==='cycle'?'cycle':inferDiscipline(r)==='strength'?'strength':'run',
      runKm:   pn(r['Run Distance (km)'])||0,
      cycKm:   pn(r['Cycle Distance (km)'])||0,
      dur:     pn(r['Duration (min)'])||0,
      rpe:     pn(r['RPE']),
      fatigue: pn(r['Fatigue (1-5)']),
      srpe:    pn(r['sRPE Load']),
      quality: txt(r['Completion Quality']),
      phase:   txt(r['Phase']),
      notes:   txt(r['Notes'])
    };
  }).sort(function(a,b){ return b.date-a.date; });
}

// Quality metrics (unique to index.html)
function qualityMetrics(data, ws) {
  var hist = historyRows(data);
  var cw   = curWeek();
  var last4 = ws.slice(Math.max(0,cw-4), cw);
  var longRuns  = hist.filter(function(x){ return x.subtype==='long run'; }).sort(function(a,b){ return a.date-b.date; });
  var longRides = hist.filter(function(x){ return x.subtype==='long ride'||x.disc==='cycle'; }).sort(function(a,b){ return a.date-b.date; });
  var threshSess= hist.filter(function(x){ return ['threshold','tempo','intervals'].indexOf(x.subtype)>=0; });
  var now = todayDate();
  return {
    latestLongRun:   longRuns.length  ? longRuns[longRuns.length-1]   : null,
    latestLongRide:  longRides.length ? longRides[longRides.length-1]  : null,
    bestLongRun:     longRuns.reduce(function(m,x){ return Math.max(m,x.runKm); },0),
    bestLongRide:    longRides.reduce(function(m,x){ return Math.max(m,x.cycKm); },0),
    thresholdCount4w:threshSess.filter(function(x){ return (now-x.date)/86400000<=28; }).length,
    recentKeyPct:    last4.filter(function(w){ return w.keyPct!=null; }).length
      ? last4.filter(function(w){ return w.keyPct!=null; }).reduce(function(a,w){ return a+w.keyPct; },0)
        / last4.filter(function(w){ return w.keyPct!=null; }).length
      : null,
    recentFatigue: last4.filter(function(w){ return w.avgFatigue!=null; }).length
      ? last4.filter(function(w){ return w.avgFatigue!=null; }).reduce(function(a,w){ return a+w.avgFatigue; },0)
        / last4.filter(function(w){ return w.avgFatigue!=null; }).length
      : null,
    recentReadiness: last4.filter(function(w){ return w.readiness!=null; }).length
      ? last4.filter(function(w){ return w.readiness!=null; }).reduce(function(a,w){ return a+w.readiness; },0)
        / last4.filter(function(w){ return w.readiness!=null; }).length
      : null
  };
}

// Race-specific readiness (index.html's per-event model)
function raceReadiness(name, ws, qm) {
  if (name.indexOf('10k')>=0||name.indexOf('Killarney')>=0) {
    var prep = ws.slice(0,8);
    var hit  = prep.filter(function(x){return x.keyPct!=null;}).length
      ? prep.filter(function(x){return x.keyPct!=null;}).reduce(function(a,b){return a+b.keyPct;},0)
        / prep.filter(function(x){return x.keyPct!=null;}).length : 0;
    var run  = prep.reduce(function(m,x){return Math.max(m,x.run||0);},0);
    return {score:Math.round((hit*6+Math.min(run/14,1)*4)*10)/10, grade:hit>=0.8?'On track':hit>=0.6?'Building':'Early', driver:'Key-session adherence + long-run support'};
  }
  if (name.indexOf('Ring')>=0) {
    var prep = ws.slice(8,15);
    var ride = prep.reduce(function(m,x){return Math.max(m,x.cyc||0);},0);
    var rdy  = prep.filter(function(x){return x.readiness!=null;}).length
      ? prep.filter(function(x){return x.readiness!=null;}).reduce(function(a,b){return a+b.readiness;},0)
        / prep.filter(function(x){return x.readiness!=null;}).length : 5;
    return {score:Math.round((Math.min(ride/150,1)*6+Math.min(rdy/7,1)*4)*10)/10, grade:ride>=120?'On track':ride>=70?'Building':'Early', driver:'Longest ride + freshness'};
  }
  var prep = ws.slice(15,24);
  var hit  = prep.filter(function(x){return x.keyPct!=null;}).length
    ? prep.filter(function(x){return x.keyPct!=null;}).reduce(function(a,b){return a+b.keyPct;},0)
      / prep.filter(function(x){return x.keyPct!=null;}).length : 0;
  var run  = prep.reduce(function(m,x){return Math.max(m,x.run||0);},0);
  return {score:Math.round((hit*6+Math.min(run/18,1)*4)*10)/10, grade:hit>=0.8?'On track':hit>=0.6?'Building':'Early', driver:'HM-specific key work + long-run durability'};
}

// Simple ACWR for current week (v9 path)
function calcACWR(ws, cw) {
  var w = ws[cw-1];
  return w ? w.ac : null;
}
function calcMonotony(ws, cw) { var w=ws[cw-1]; return w?w.monotony:null; }
function calcStrain(ws, cw)   { var w=ws[cw-1]; return w?w.strain:null; }
function keySessionRate(data) {
  var total=0,done=0;
  data.forEach(function(r){ if(isKeySession(r)){total++;if(isDone(r))done++;} });
  return total>0?Math.round(done/total*100):null;
}
function zoneDistribution(data) {
  var z={Z1:0,Z2:0,Z3:0,Z4:0,Z5:0};
  data.filter(isDone).forEach(function(r){ var v=String(r['Intensity Zone']||'').trim(); if(z[v]!==undefined)z[v]++; });
  return z;
}

function buildHeatmap(data) {
  var byDate={};
  data.forEach(function(r){
    var d=String(r['Date']||'').split('T')[0].split(' ')[0];
    if(d) byDate[d]={done:isDone(r),kind:inferDiscipline(r),plan:r['Planned Session']||'',key:isKeySession(r)};
  });
  var start=new Date('2026-03-16'),end=new Date('2026-09-06'),today=new Date();
  today.setHours(0,0,0,0);
  var days=[]; for(var d=new Date(start);d<=end;d.setDate(d.getDate()+1)) days.push(new Date(d));
  var pad=days[0].getDay(); if(pad===0)pad=6;else pad--;
  var cols=Math.ceil((pad+days.length)/7);
  var mCols={},col=pad;
  days.forEach(function(day){var m=day.getMonth();if(!mCols[m])mCols[m]=Math.floor(col/7);col++;});
  var ML=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep'];
  var mLabels=Object.keys(mCols).map(function(m){return '<span style="position:absolute;left:'+(mCols[m]*14)+'px;font-size:8px;font-family:\'Barlow Condensed\',sans-serif;color:var(--tx3)">'+ML[m]+'</span>';}).join('');
  function cellColor(dt,info){
    if(dt>today) return 'rgba(255,255,255,.03)';
    if(!info)    return 'rgba(255,255,255,.03)';
    if(!info.done) return info.key?'rgba(255,59,92,.55)':'rgba(255,59,92,.22)';
    var k=info.kind;
    if(k==='run')      return info.key?'#00f5a0':'rgba(0,245,160,.55)';
    if(k==='cycle')    return info.key?'#ff9500':'rgba(255,149,0,.55)';
    if(k==='strength') return info.key?'#bf7fff':'rgba(191,127,255,.55)';
    return 'rgba(61,74,94,.5)';
  }
  var cells='';
  for(var i=0;i<pad;i++) cells+='<div class="hm-cell" style="background:transparent;pointer-events:none"></div>';
  days.forEach(function(day){
    var key=day.toISOString().split('T')[0];
    var info=byDate[key];
    var col=cellColor(day,info);
    var tip=day.toLocaleDateString('en-IE',{day:'numeric',month:'short'});
    if(info) tip+=' — '+info.plan+(info.done?' ✓':' ✗')+(info.key?' ★':'');
    cells+='<div class="hm-cell" style="background:'+col+'"><span class="hm-tip">'+tip+'</span></div>';
  });
  return '<div class="hm-wrap">'+
    '<div style="position:relative;height:12px;width:'+(cols*14)+'px;margin-bottom:3px">'+mLabels+'</div>'+
    '<div class="hm-grid" style="grid-template-columns:repeat('+cols+',11px);grid-template-rows:repeat(7,11px)">'+cells+'</div>'+
    '<div class="hm-legend">'+
      '<div class="hm-li"><div class="hm-sw" style="background:#00f5a0"></div>Key run done</div>'+
      '<div class="hm-li"><div class="hm-sw" style="background:rgba(0,245,160,.55)"></div>Run</div>'+
      '<div class="hm-li"><div class="hm-sw" style="background:#ff9500"></div>Key ride done</div>'+
      '<div class="hm-li"><div class="hm-sw" style="background:rgba(255,149,0,.55)"></div>Cycle</div>'+
      '<div class="hm-li"><div class="hm-sw" style="background:rgba(255,59,92,.55)"></div>★ Key missed</div>'+
      '<div class="hm-li"><div class="hm-sw" style="background:rgba(255,59,92,.22)"></div>Missed</div>'+
    '</div></div>';
}

// COACHING DIRECTIVES ENGINE
// ═══════════════════════════════════════════
function buildAlerts(ws, cw, data) {
  var out=[];
  var cwd=ws[cw-1]||{}, pwd=ws[cw-2]||{};
  var acwr=calcACWR(ws,cw);
  var mono=calcMonotony(ws,cw);
  var keyRate=keySessionRate(data);

  // ACWR
  if(acwr!==null){
    if(acwr>1.5)      out.push({c:'red',  icon:'🔴',title:'Injury risk — ACWR '+acwr+' (above 1.5)',text:'Acute load has spiked far above your chronic baseline. Drop one session this week and keep all remaining work easy.'});
    else if(acwr>1.3) out.push({c:'amber',icon:'🟡',title:'Load caution — ACWR '+acwr,text:'In the caution zone. Avoid adding extra sessions. Protect sleep and do not extend easy runs.'});
    else if(acwr>=0.8)out.push({c:'green',icon:'🟢',title:'Optimal load zone — ACWR '+acwr,text:'Acute-chronic ratio is balanced. Training is building safely.'});
  }

  // Fatigue alarm
  if(cwd.avgFatigue>=4)  out.push({c:'red',  icon:'🔴',title:'High fatigue — avg '+cwd.avgFatigue+'/5 this week',text:'Body is signalling accumulation. Add an unplanned rest day, prioritise 8+ hours sleep, and cut easy sessions shorter.'});
  else if(cwd.avgFatigue>=3.2) out.push({c:'amber',icon:'🟡',title:'Fatigue building — '+cwd.avgFatigue+'/5',text:'Monitor closely. Keep Z2 sessions genuinely easy. Avoid stacking strength before key runs this week.'});

  // Monotony flag
  if(mono!==null && mono>2.0) out.push({c:'amber',icon:'🟡',title:'Training monotony high ('+mono+')',text:'Lack of variety increases injury and plateau risk. Vary session types and add a true rest day this week.'});

  // Key session compliance
  if(keyRate!==null && keyRate<70 && cw>=4) out.push({c:'red',icon:'🔴',title:'Key session compliance at '+keyRate+'%',text:'Quality sessions (intervals, tempo, long runs) are the engine of fitness. Missing these hurts race readiness more than anything else.'});
  else if(keyRate!==null && keyRate>=85) out.push({c:'green',icon:'🟢',title:'Key session compliance excellent — '+keyRate+'%',text:'Quality sessions are consistently hit. This is where race fitness is built.'});

  // Taper
  if(cw>=23&&cw<=25) out.push({c:'blue',icon:'🔵',title:'Taper phase — hold the line',text:'Volume cuts are physiologically required. Resist adding sessions. Sharpness comes from rest, not extra work.'});

  // Race proximity alerts
  [
    [R1,'Killarney 10k','Short sharpener midweek (3×800m), full rest day before. Arrive warmed.'],
    [R2,'Ring of Kerry','Legs must feel springy. Easy spin only midweek. Start conservatively — fuel from km 20.'],
    [R3,'Dingle Half Marathon','Sharpener Tuesday, easy shakeout Friday. First 5km controlled — patience wins the race.']
  ].forEach(function(rc){
    var d=daysUntil(rc[0]);
    if(d>0&&d<=14) out.push({c:'blue',icon:'🏁',title:rc[1]+' in '+d+' days',text:rc[2]});
  });

  if(!out.length) out.push({c:'green',icon:'✅',title:'All systems clear',text:'Load, fatigue, and compliance are all in range. Stay consistent and trust the plan.'});
  return out;
}

function alertsHtml(alerts) {
  return '<div class="alert-stack">'+alerts.map(function(a){
    return '<div class="alert-item '+a.c+'"><div class="alert-icon">'+a.icon+'</div><div class="alert-body"><div class="a-title">'+a.title+'</div><div class="a-text">'+a.text+'</div></div></div>';
  }).join('')+'</div>';
}

function buildDirective(ws, cw, data) {
  var cwd=ws[cw-1]||{};
  var acwr=calcACWR(ws,cw);
  var planRow=PLAN_DATA[cw-1]||{};
  var phase=String(planRow['Phase']||'').toLowerCase();
  var goal=String(planRow['Primary Goal']||'');
  var coachFocus=String(planRow['Coaching Focus']||'');

  if(acwr!==null && acwr>1.5) return 'Reduce load now. Drop one session and keep all remaining work at conversational effort. Recovery IS the training.';
  if(cwd.avgFatigue>=4) return 'High fatigue detected. Add one rest day, sleep 8+ hours tonight, and make every easy session shorter than planned.';
  // Use the plan's own coaching focus if available
  if(coachFocus && coachFocus !== 'null' && coachFocus.length > 5) return coachFocus + (goal?' Goal: '+goal+'.':'');
  if(/taper|race week/.test(phase)) return 'Taper is working. Fitness is banked. Your job this week is freshness — not fitness. Resist the urge to add work.';
  if(/deload/.test(phase)) return 'Deload week: let adaptation happen. Keep sessions short and controlled. Don\'t compensate for missed volume — absorb the block.';
  if(/half specific|half peak/.test(phase)) return 'Half marathon specific phase: sustained threshold and long-run quality are the engine now. Hit the quality sessions, protect the easy ones.';
  if(/half build/.test(phase)) return 'Half build: threshold density is building. Hit tempo and intervals fully. Long run pace should feel controlled and progressive.';
  if(/ring build|ring peak/.test(phase)) return 'Ring of Kerry build: protect long-ride quality and practise fuelling every ride over 90 minutes. Keep runs short and recovery-focused.';
  if(/bike build|transition/.test(phase)) return 'Bike build phase: aerobic base on the bike is the priority. Fuel every ride over 75 minutes. Keep run touch without accumulating run fatigue.';
  if(/10k specific|10k taper|10k race/.test(phase)) return '10k specific phase: race pace efficiency is the target. The interval session this week is more important than any easy run. Hit it fully.';
  if(/foundation|10k prep/.test(phase)) return 'Foundation phase: establish consistent frequency and rhythm. Keep easy days genuinely easy — don\'t chase pace in recovery sessions.';
  return goal ? goal+'. Stay consistent and protect easy sessions.' : 'Stay consistent. Hit key sessions, keep easy days easy, and let fitness accumulate.';
}

function getTodayTomorrow() {
  var today=new Date(); today.setHours(0,0,0,0);
  var tom=new Date(today); tom.setDate(tom.getDate()+1);
  var fmt=function(d){return d.toISOString().split('T')[0];};
  var tKey=fmt(today), tmKey=fmt(tom);
  var t=null,tm=null;
  getData().forEach(function(r){
    var d=String(r['Date']||'').split('T')[0].split(' ')[0];
    if(d===tKey&&!t)  t=r;
    if(d===tmKey&&!tm) tm=r;
  });
  // Fallback to plan if no log entry found
  var WDAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  if(!t) {
    var wd=WDAYS[today.getDay()];
    PLAN_DATA.forEach(function(p){
      if(!t){ var sd=new Date(p['Start Date']),ed=new Date(p['End Date']);
        if(today>=sd&&today<=ed) t={Fake:true,'Planned Session':p[wd]||'–','Session Type':'','Week':p['Week'],'Date':tKey,'Phase':p['Phase'],'Primary Goal':p['Primary Goal']}; }
    });
  }
  if(!tm){
    var wd2=WDAYS[tom.getDay()];
    PLAN_DATA.forEach(function(p){
      if(!tm){ var sd=new Date(p['Start Date']),ed=new Date(p['End Date']);
        if(tom>=sd&&tom<=ed) tm={Fake:true,'Planned Session':p[wd2]||'–','Session Type':'','Week':p['Week'],'Date':tmKey,'Phase':p['Phase'],'Primary Goal':p['Primary Goal']}; }
    });
  }
  return {today:t, tomorrow:tm};
}

function sessionCard(r, cls, tag) {
  if(!r) return '';
  var kind=inferDiscipline(r);
  var kc=KC[kind];
  var done=isDone(r);
  var name=r['Actual Description']||r['Planned Session']||'–';
  var meta=[];
  var run=pn(r['Run Distance (km)']);
  var cyc=pn(r['Cycle Distance (km)']);
  var dur=pn(r['Duration (min)']);
  var phase=String(r['Phase']||'');
  if(run&&run>0) meta.push(run+'km run');
  if(cyc&&cyc>0) meta.push(cyc+'km ride');

  if(done) meta.push('✓ Completed');

  return '<div class="cmd-session '+cls+'">' +
    '<div class="cmd-tag '+cls+'">'+tag+'</div>'+
    '<div class="cmd-name" style="color:'+(done?kc.a:'var(--tx)')+'">'+name+'</div>'+

    '</div>';
}

function rrCard(dist, name, cls, ready, days) {
  var color = cls==='run'?'var(--run)':cls==='cyc'?'var(--cyc)':'var(--str)';
  // score is 0–1 from raceReadiness(); display as 0–10
  var sc = Math.round((ready.score||0) * 10);
  var scColor = sc>=8?'var(--ok)':sc>=6?'var(--warn)':'var(--alert)';
  return '<div class="rr-card '+cls+'">'+
    '<div class="rr-name">'+dist+' · '+name+'</div>'+
    '<div class="rr-score" style="color:'+scColor+'">'+sc+'</div>'+
    '<div class="rr-grade">'+ready.grade+'</div>'+
    '<div class="rr-days" style="color:'+color+'">'+(days>0?days+' days':'Race day!')+'</div>'+
    '</div>';

// LOAD PAGE
// ═══════════════════════════════════════════
function loadPage(data, cw) {
  var ws     = calcWeeks(data);
  var acwr   = calcACWR(ws,cw);
  var mono   = calcMonotony(ws,cw);
  var strain = calcStrain(ws,cw);
  var cwd    = ws[cw-1]||{};
  var labels = ws.map(function(w){return 'W'+w.week;});
  var zones  = zoneDistribution(data);
  var totalZ = Object.values(zones).reduce(function(a,b){return a+b},0)||1;

  var acwrColor = acwr===null?'var(--tx2)':acwr>1.5?'var(--alert)':acwr>1.3?'var(--warn)':acwr>=0.8?'var(--ok)':'var(--info)';
  var acwrBand  = acwr===null?'No data':acwr>1.5?'REDUCE LOAD':acwr>1.3?'Caution zone':acwr>=0.8?'Optimal zone':'Under-loading';
  var acwrBandBg= acwr===null?'rgba(122,134,153,.1)':acwr>1.5?'rgba(255,59,92,.15)':acwr>1.3?'rgba(255,214,10,.12)':acwr>=0.8?'rgba(0,245,160,.1)':'rgba(10,132,255,.1)';

  // Load chart colors — use totalLoad from new calcWeeks
  var loadColors = ws.map(function(w,i){
    if(!w.totalLoad) return 'rgba(255,255,255,.04)';
    var prev=i>0?ws[i-1].totalLoad:0;
    if(prev>0&&w.totalLoad>prev*1.5) return '#ff3b5c';
    if(prev>0&&w.totalLoad>prev*1.15) return '#ffd60a';
    return '#0a84ff';
  });

  var maxLoad = Math.max.apply(null, ws.map(function(w){return w.totalLoad||0})) || 1;

  document.getElementById('body').innerHTML =
    '<div class="pg-hd"><div class="pg-title">Load Analysis</div>'+
    '<div class="pg-sub">Discipline-separated sRPE · ACWR · Monotony · Strain</div></div>'+

    // ACWR
    '<div class="card">'+
      '<div class="card-title">Acute:Chronic Workload Ratio</div>'+
      '<div class="acwr-gauge">'+
        '<div class="acwr-num" style="color:'+acwrColor+'">'+(acwr!==null?acwr:'—')+'</div>'+
        '<div class="acwr-lbl">4-week chronic baseline</div>'+
        '<div class="acwr-band-badge" style="background:'+acwrBandBg+';color:'+acwrColor+'">'+acwrBand+'</div>'+
      '</div>'+
      '<div class="acwr-scale"><div class="acwr-scale-bar"></div></div>'+
      '<div class="acwr-scale-labels"><span>0</span><span>0.8</span><span>1.3</span><span>1.5</span><span>2.0+</span></div>'+
    '</div>'+

    // Monotony + Strain
    '<div class="mono-wrap">'+
      '<div class="mono-card"><div class="mono-lbl">Monotony</div>'+
        '<div class="mono-val" style="color:'+(mono&&mono>2?'var(--warn)':'var(--tx)')+'">'+
          (mono!==null?mono:'—')+'</div>'+
        '<div class="mono-note">&lt;2.0 = varied loading</div></div>'+
      '<div class="mono-card"><div class="mono-lbl">Strain Index</div>'+
        '<div class="mono-val" style="color:'+(strain&&strain>2500?'var(--alert)':strain&&strain>1800?'var(--warn)':'var(--tx)')+'">'+
          (strain!==null?strain:'—')+'</div>'+
        '<div class="mono-note">Load × Monotony</div></div>'+
    '</div>'+

    // Discipline load bars
    '<div class="card">'+
      '<div class="card-title" style="margin-bottom:12px">This Week — Load by Discipline</div>'+
      loadBar('Run',      cwd.runLoad||0,  maxLoad, 'var(--run)')+
      loadBar('Cycle',    cwd.cycLoad||0,  maxLoad, 'var(--cyc)')+
      loadBar('Strength', cwd.strLoad||0,  maxLoad, 'var(--str)')+
      loadBar('Total',    cwd.totalLoad||0,maxLoad*2,'var(--info)')+
    '</div>'+

    // Session load chart
    '<div class="card">'+
      '<div class="card-title">Session Load by Week — Stacked by Discipline</div>'+
      '<div style="font-size:10px;color:var(--tx3);margin-bottom:8px">True sRPE: sum of duration × RPE per session. 🟡 >15% spike, 🔴 >50% spike</div>'+
      '<div class="chart-wrap" style="height:180px"><canvas id="lc-load"></canvas></div>'+
      '<div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap">'+
        '<span style="font-size:10px;color:var(--run)">■ Run</span>'+
        '<span style="font-size:10px;color:var(--cyc)">■ Cycle</span>'+
        '<span style="font-size:10px;color:var(--str)">■ Strength</span>'+
      '</div>'+
    '</div>'+

    // Zone distribution
    '<div class="card">'+
      '<div class="card-title">Intensity Zone Distribution</div>'+
      '<div class="zone-strip">'+
        ['Z1','Z2','Z3','Z4','Z5'].map(function(z){
          var pct=Math.round(zones[z]/totalZ*100);
          var col={Z1:'#00f5a0',Z2:'#0a84ff',Z3:'#ffd60a',Z4:'#ff9500',Z5:'#ff3b5c'}[z];
          return '<div class="zone-seg" style="background:'+col+';flex:'+(pct||0.5)+'" title="'+z+': '+pct+'%"></div>';
        }).join('')+
      '</div>'+
      '<div style="display:flex;gap:12px;margin-top:6px;flex-wrap:wrap">'+
        ['Z1','Z2','Z3','Z4','Z5'].map(function(z){
          var pct=Math.round(zones[z]/totalZ*100);
          var col={Z1:'#00f5a0',Z2:'#0a84ff',Z3:'#ffd60a',Z4:'#ff9500',Z5:'#ff3b5c'}[z];
          return '<span style="font-size:10px;color:var(--tx2)"><span style="color:'+col+';font-family:\'Barlow Condensed\',sans-serif;font-weight:700">'+z+'</span> '+pct+'%</span>';
        }).join('')+
      '</div>'+
      '<div style="font-size:10px;color:var(--tx3);margin-top:8px">Elite hybrid target: Z1-Z2 = 75–80%, Z3 = 10–15%, Z4-Z5 = 5–10%</div>'+
    '</div>'+

    // RPE vs Fatigue
    '<div class="card">'+
      '<div class="card-title">RPE vs Fatigue Divergence</div>'+
      '<div style="font-size:10px;color:var(--tx3);margin-bottom:8px">Rising fatigue with stable/falling RPE = overreaching signal</div>'+
      '<div class="chart-wrap" style="height:160px"><canvas id="lc-rpe"></canvas></div>'+
      '<div style="display:flex;gap:12px;margin-top:8px">'+
        '<span style="font-size:10px;color:var(--info)">■ Avg RPE /10</span>'+
        '<span style="font-size:10px;color:var(--alert)">■ Avg Fatigue /5</span>'+
      '</div>'+
    '</div>'+

    // Cumulative
    '<div class="card" style="margin-bottom:0">'+
      '<div class="card-title">Cumulative Volume</div>'+
      '<div class="chart-wrap" style="height:160px"><canvas id="lc-cum"></canvas></div>'+
      '<div style="display:flex;gap:12px;margin-top:8px">'+
        '<span style="font-size:10px;color:var(--run)">■ Run km</span>'+
        '<span style="font-size:10px;color:var(--cyc)">■ Cycle km</span>'+
      '</div>'+
    '</div>';

  // Charts
  mkChart('lc-load','bar',labels,[
    {label:'Run',      data:ws.map(function(w){return w.runLoad||null;}), backgroundColor:'rgba(0,245,160,.7)',borderRadius:2,stack:'a'},
    {label:'Cycle',    data:ws.map(function(w){return w.cycLoad||null;}), backgroundColor:'rgba(255,149,0,.7)', borderRadius:2,stack:'a'},
    {label:'Strength', data:ws.map(function(w){return w.strLoad||null;}),backgroundColor:'rgba(191,127,255,.7)',borderRadius:2,stack:'a'}
  ],{stacked:true});

  mkChart('lc-rpe','line',labels,[
    {label:'Avg RPE',    data:ws.map(function(w){return w.avgRpe;}),      borderColor:'#0a84ff', tension:.3,pointRadius:3,pointBackgroundColor:'#0a84ff',fill:false},
    {label:'Avg Fatigue',data:ws.map(function(w){return w.avgFatigue;}),  borderColor:'#ff3b5c',tension:.3,pointRadius:3,pointBackgroundColor:'#ff3b5c',fill:false}
  ],{maxY:10});

  var cumR=0, cumC=0;
  mkChart('lc-cum','line',labels,[
    {label:'Run km',   data:ws.map(function(w){cumR+=w.run; return cumR>0?Math.round(cumR*10)/10:null;}),borderColor:'#00f5a0',backgroundColor:'rgba(0,245,160,.07)',tension:.3,pointRadius:2,fill:true},
    {label:'Cycle km', data:ws.map(function(w){cumC+=w.cyc; return cumC>0?Math.round(cumC*10)/10:null;}),borderColor:'#ff9500',backgroundColor:'rgba(255,149,0,.06)',tension:.3,pointRadius:2,fill:true}
  ]);
}

function loadBar(label, val, max, color) {
  var pct = max>0?Math.min(100,Math.round(val/max*100)):0;
  return '<div class="load-bar-row">'+
    '<div class="lbr-label">'+label+'</div>'+
    '<div class="lbr-track"><div class="lbr-fill" style="width:'+pct+'%;background:'+color+'"></div></div>'+
    '<div class="lbr-val" style="color:'+color+'">'+val+'</div>'+
    '</div>';
}

// ═══════════════════════════════════════════
// PLAN PAGE
// ═══════════════════════════════════════════
function planPage(cw) {
  var DAYS   = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  var ABBRV  = ['MON','TUE','WED','THU','FRI','SAT','SUN'];

  // Map new phase names to pill styles
  function phaseCls(p) {
    var pl = String(p||'').toLowerCase();
    if (/taper|race week/.test(pl))    return 'taper';
    if (/race|ring of kerry|killarney|dingle/.test(pl)) return 'race';
    if (/peak|specific/.test(pl))      return 'peak';
    if (/deload|recovery/.test(pl))    return 'recover';
    return 'build';
  }

  var html = '<div class="pg-hd"><div class="pg-title">25-Week Plan</div><div class="pg-sub">Currently Week '+cw+' · New periodised plan from W1</div></div>';

  PLAN_DATA.forEach(function(row) {
    var w      = +row['Week'];
    var isCur  = w===cw;
    var phase  = String(row['Phase']||'');
    var goal   = String(row['Primary Goal']||'');
    var focus  = String(row['Coaching Focus']||'');
    var sd     = row['Start Date']?fmtDate(row['Start Date']):'';
    var ed     = row['End Date']?fmtDate(row['End Date']):'';
    var pCls   = phaseCls(phase);

    html += '<div class="wk-card'+(isCur?' now':'')+ '" id="wk'+w+'">'+
      '<div class="wk-hd" onclick="toggleWk('+w+')">'+
        '<div class="wk-hl">'+
          '<span class="wk-num" style="color:'+(isCur?'var(--run)':'var(--tx)')+'">W'+w+(isCur?' ← NOW':'')+'</span>'+
          '<span class="wk-dates">'+sd+(ed?' – '+ed:'')+'</span>'+
          '<span class="phase-pill '+pCls+'">'+phase+'</span>'+
        '</div>'+
        '<span class="wk-chev" id="wch'+w+'">'+(isCur?'▲':'▼')+'</span>'+
      '</div>'+
      '<div class="wk-body" id="wb'+w+'" style="display:'+(isCur?'block':'none')+'">';

    // Goal + coaching focus header inside expanded card
    if(goal || focus) {
      html += '<div style="padding:9px 0 10px;border-bottom:1px solid var(--bd);margin-bottom:4px">'+
        (goal?'<div style="font-size:11px;font-weight:600;color:var(--tx);margin-bottom:2px">🎯 '+goal+'</div>':'')+
        (focus && focus!=='null'?'<div style="font-size:11px;color:var(--tx2)">'+focus+'</div>':'')+
      '</div>';
    }

    DAYS.forEach(function(day,i){
      var sess = String(row[day]||'–');
      var isKey = /interval|threshold|long run|long ride|race|tempo.*min|x[0-9]|[0-9]x/i.test(sess);
      html += '<div class="wk-day">'+
        '<div class="day-ab">'+ABBRV[i]+'</div>'+
        '<div class="day-sess">'+(isKey?'<span style="color:var(--warn)">★ </span>':'')+sess+'</div>'+
        '</div>';
    });
    html += '</div></div>';
  });
  return html;
}

function toggleWk(w) {
  var b=document.getElementById('wb'+w), c=document.getElementById('wch'+w);
  if(!b) return;
  var open = b.style.display!=='none';
  b.style.display = open?'none':'block';
  c.textContent   = open?'▼':'▲';
}

function scrollToCurWk() {
  setTimeout(function(){ var el=document.getElementById('wk'+curWeek()); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); },100);
}

// SESSION LOG
// ═══════════════════════════════════════════
function logPage(data) {
  var done     = data.filter(isDone).reverse();
  var filtered = H_FILT==='all'?done:done.filter(function(r){return inferDiscipline(r)===H_FILT;});

  // Summary stats for filter
  var totRun  = filtered.reduce(function(a,r){return a+(pn(r['Run Distance (km)'])||0);},0);
  var totCyc  = filtered.reduce(function(a,r){return a+(pn(r['Cycle Distance (km)'])||0);},0);
  var totLoad = filtered.reduce(function(a,r){return a+(pn(r['sRPE Load'])||0);},0);

  var html = '<div class="pg-hd"><div class="pg-title">Session Log</div>'+
    '<div class="pg-sub">'+done.length+' completed sessions</div></div>'+
    '<div class="filter-row">'+
      ['all','run','cycle','strength'].map(function(f){
        var lbl=f==='all'?'All':f.charAt(0).toUpperCase()+f.slice(1);
        return '<button class="f-pill'+(H_FILT===f?' on':'')+ '" onclick="setHF(\''+f+'\')">'+lbl+'</button>';
      }).join('')+
    '</div>';

  // Mini summary strip
  if(filtered.length) {
    html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">'+
      '<div class="kpi"><div class="kpi-label">Run km</div><div class="kpi-val" style="font-size:18px;color:var(--run)">'+totRun.toFixed(1)+'</div></div>'+
      '<div class="kpi"><div class="kpi-label">Cycle km</div><div class="kpi-val" style="font-size:18px;color:var(--cyc)">'+totCyc.toFixed(1)+'</div></div>'+
      '<div class="kpi"><div class="kpi-label">Total Load</div><div class="kpi-val" style="font-size:18px;color:var(--warn)">'+Math.round(totLoad)+'</div></div>'+
    '</div>';
  }

  if(!filtered.length){
    html+='<div style="text-align:center;padding:50px 20px;color:var(--tx2)"><div style="font-size:36px;opacity:.3;margin-bottom:12px">📋</div><div>No sessions match this filter</div></div>';
  } else {
    filtered.forEach(function(r){
      var kind    = inferDiscipline(r), kc=KC[kind];
      var run     = pn(r['Run Distance (km)'])||0;
      var cyc     = pn(r['Cycle Distance (km)'])||0;
      var dur     = pn(r['Duration (min)'])||0;
      var rpe     = pn(r['RPE']);
      var fat     = pn(r['Fatigue (1-5)']);
      var zone    = String(r['Intensity Zone']||'');
      var srpe    = pn(r['sRPE Load']); // prefer workbook value
      var load    = srpe!==null ? srpe : (dur>0&&rpe ? dur*rpe : null);
      var key     = isKeySession(r);
      var quality = String(r['Completion Quality']||'');
      var subtype = String(r['Session Subtype']||'');
      var phase   = String(r['Phase']||'');
      var qualColor = quality==='Hit'?'var(--ok)':quality==='Modified'?'var(--warn)':quality==='Partial'?'var(--cyc)':'var(--tx3)';

      html += '<div class="sess-card">'+
        '<div class="sess-hd">'+
          '<span class="kind-badge" style="background:'+kc.d+';color:'+kc.a+'">'+
            (subtype && subtype!=='null' ? subtype : (r['Session Type']||kind))+
          '</span>'+
          '<span style="font-size:10px;color:var(--tx3)">W'+r['Week']+'</span>'+
          (zone ? '<span style="font-family:\'Barlow Condensed\',sans-serif;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,.05);color:var(--tx2)">'+zone+'</span>' : '')+
          (key  ? '<span style="font-size:9px;font-weight:700;color:var(--warn)">★ KEY</span>' : '')+
          (quality && quality!=='null' ? '<span style="font-size:9px;font-weight:700;color:'+qualColor+'">'+quality+'</span>' : '')+
        '</div>'+
        '<div class="sess-title">'+fmtDate(r['Date'])+' · '+(r['Actual Description']||r['Planned Session']||'')+'</div>'+
        (phase && phase!=='null' ? '<div style="font-size:10px;color:var(--tx3);margin-bottom:8px">'+phase+'</div>' : '')+
        '<div class="metrics-row">'+
          '<div class="m-box"><div class="m-lbl">Run</div>'+
            '<div class="m-val" style="color:var(--run)">'+(run>0?run+'km':'—')+'</div></div>'+
          '<div class="m-box"><div class="m-lbl">Cycle</div>'+
            '<div class="m-val" style="color:var(--cyc)">'+(cyc>0?cyc+'km':'—')+'</div></div>'+
          '<div class="m-box"><div class="m-lbl">RPE</div>'+
            '<div class="m-val" style="color:var(--info)">'+(rpe!==null?rpe+'/10':'—')+'</div></div>'+
          '<div class="m-box"><div class="m-lbl">sRPE Load</div>'+
            '<div class="m-val" style="color:var(--warn)">'+(load!==null?Math.round(load):'—')+'</div></div>'+
        '</div>'+
        (r['Notes']?'<div class="sess-note">'+String(r['Notes']).split('.').slice(0,2).join('.')+'.</div>':'')+
      '</div>';
    });
  }
  document.getElementById('body').innerHTML = html;
}

function setHF(f) { H_FILT=f; logPage(getData()); }

        'W24 Wed: Easy run 5km',
        'W24 Thu: 20 min easy shakeout',
        'W24 Fri: Full rest',
        'W24 Sat: RACE — warm up 10–12 min jog + mobility + 3 strides'
      ]
    }
  ];

  var activeRace = races[RG_TAB];

    '<div class="pg-sub">Pacing · Fuelling · Race week · Execution</div></div>'+
    '<div class="tab-row">'+
      races.map(function(r,i){return '<button class="tab-btn'+(RG_TAB===i?' on':'')+ '" onclick="setRGTab('+i+')">'+r.dist+'</button>';}).join('')+

  var r = activeRace;

  html += '<div class="rg-card">'+
    // Header

      '<div style="width:8px;height:8px;border-radius:50%;background:'+r.color+';flex-shrink:0;margin-top:6px"></div>'+
      '<div style="flex:1">'+
        '<div class="rg-name">'+r.name+'</div>'+
        '<div class="rg-meta">'+r.date+' · Week '+r.rWeek+' · '+(days>0?days+' days away':'Race day!')+'</div>'+
        '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:6px">'+
          '<span style="font-family:\'Barlow Condensed\',sans-serif;font-size:13px;font-weight:800;color:'+r.color+'">'+r.target+'</span>'+
          '<span style="font-size:11px;color:var(--tx3)">'+r.pred+'</span>'+
        '</div>'+
      '</div>'+
      '<div style="text-align:center;flex-shrink:0">'+
        '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:28px;font-weight:800;line-height:1;color:'+readyColor+'">'+readyScore+'/10</div>'+
        '<div style="font-size:9px;color:var(--tx3);letter-spacing:.5px;text-transform:uppercase">Readiness</div>'+
        '<div style="font-size:9px;color:'+readyColor+';margin-top:2px">'+ready.grade+'</div>'+
      '</div>'+
    '</div>'+

    // Execution theme from workbook
    '<div style="padding:9px 12px;background:rgba(255,255,255,.03);border-radius:6px;border-left:2px solid '+r.color+';margin-bottom:14px">'+
      '<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);margin-bottom:3px">Execution Theme</div>'+
      '<div style="font-size:12px;color:var(--tx)">'+r.execTheme+'</div>'+
    '</div>'+

    '<div class="rg-section">Pacing Strategy</div>'+
    r.pacing.map(function(p){return '<div class="rg-row"><div class="rg-lbl" style="color:'+r.color+'">'+p[0]+'</div><div class="rg-desc">'+p[1]+'</div></div>';}).join('')+

    '<div class="rg-section">Fuelling</div>'+
    r.fuel.map(function(f){return '<div class="rg-dot-row"><div class="rg-dot" style="background:'+r.color+'"></div>'+f+'</div>';}).join('')+

    '<div class="rg-section">Race Week Schedule</div>'+
    r.week.map(function(w){return '<div class="rg-dot-row"><div class="rg-dot"></div>'+w+'</div>';}).join('')+

    // Decision cue
    '<div style="padding:9px 12px;background:rgba(255,214,10,.06);border-radius:6px;border-left:2px solid var(--warn);margin-top:14px">'+
      '<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--warn);margin-bottom:3px">Race Day Decision Cue</div>'+
      '<div style="font-size:12px;color:var(--tx)">'+r.decisionCue+'</div>'+
    '</div>'+
  '</div>'+

  // Race predictor — from v7 Race_Predictor values
  '<div class="rg-card" style="margin-bottom:0">'+
    '<div class="rg-section" style="margin-top:0">Race Predictor — Riegel Formula</div>'+
    [
      ['5k Time','23:00','Manual input'],
      ['Predicted 10k','47:50','From 5k'],
      ['Current 10k PB','48:16','Benchmark'],
      ['Predicted Half','1:42:19','From 10k PB'],
      ['A Goal 10k','45:00','Season target'],
      ['A Goal Half','1:40:00','Season target']
    ].map(function(row){
      var isGoal = row[2]==='Season target';
      var isPred = row[2].startsWith('From');
      var col    = isGoal?'var(--warn)':isPred?'var(--ok)':'var(--tx)';
      return '<div class="rg-row">'+
        '<div class="rg-lbl" style="color:var(--tx2)">'+row[0]+'</div>'+
        '<div class="rg-desc">'+
          '<span style="font-family:\'Barlow Condensed\',sans-serif;font-size:14px;font-weight:800;color:'+col+'">'+row[1]+'</span>'+
          ' <span style="font-size:10px;color:var(--tx3)">'+row[2]+'</span>'+
        '</div></div>';
    }).join('')+
    '<div style="font-size:10px;color:var(--tx3);margin-top:10px;line-height:1.7">'+
      'T₂ = T₁ × (D₂/D₁)^1.06 &nbsp;·&nbsp; '+
      'Update 5k / 10k times in the workbook Race_Predictor sheet as fitness improves.'+
    '</div>'+
  '</div>';

  return html;
}

// ═══════════════════════════════════════════
// STRENGTH PAGE  (v7 block-based structure)
// ═══════════════════════════════════════════
function strPage() {
  // v7 STR_DATA uses Block / Day / Focus / Main Lift / Support Work / Dose / Notes
  var cw  = curWeek();
  var planRow = PLAN_DATA[cw-1]||{};
  var phase   = String(planRow['Phase']||'').toLowerCase();

  // Determine current block from phase
  var currentBlock = '10k build';
  if (/bike|ring|transition/.test(phase))  currentBlock = 'Bike build';
  else if (/half|run rebuild/.test(phase)) currentBlock = 'Half build';
  else if (/taper|race week/.test(phase))  currentBlock = 'Taper weeks';
  else                                      currentBlock = '10k build';

  // Group STR_DATA by block
  var blocks = {};
  STR_DATA.forEach(function(r){
    var b = String(r['Block']||'');
    if(!blocks[b]) blocks[b]=[];
    blocks[b].push(r);
  });

  // Block tabs
  var blockKeys = Object.keys(blocks);
  var activeBlock = STR_TAB === 'phase' ? null : (blockKeys.indexOf(STR_TAB) >= 0 ? STR_TAB : blockKeys[0]);

  function blockCard(rows) {
    return rows.map(function(r){
      var day      = String(r['Day']||'');
      var focus    = String(r['Focus']||'');
      var mainLift = String(r['Main Lift']||'');
      var support  = String(r['Support Work']||'');
      var dose     = String(r['Dose']||'');
      var notes    = String(r['Notes']||'');
      var isA      = /session a/i.test(day);
      var dayColor = isA ? 'var(--run)' : 'var(--cyc)';
      var timing   = isA ? 'Monday' : 'Thursday';

      return '<div class="card" style="margin-bottom:10px">'+
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">'+
          '<div>'+
            '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:14px;font-weight:800;color:'+dayColor+'">'+day+'</div>'+
            '<div style="font-size:11px;color:var(--tx2);margin-top:1px">'+timing+' &nbsp;·&nbsp; <span style="color:var(--str)">'+focus+'</span></div>'+
          '</div>'+
          '<span style="font-family:\'Barlow Condensed\',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;'+
            'padding:2px 8px;border-radius:20px;background:rgba(191,127,255,.12);color:var(--str)">'+dose+'</span>'+
        '</div>'+
        '<div style="margin-bottom:10px">'+
          '<div class="rg-section" style="margin:0 0 6px">Main Lift</div>'+
          '<div style="font-size:13px;font-weight:600;color:var(--tx);padding:8px 10px;background:rgba(255,255,255,.03);border-radius:6px;border-left:2px solid var(--str)">'+mainLift+'</div>'+
        '</div>'+
        '<div style="margin-bottom:10px">'+
          '<div class="rg-section" style="margin:0 0 6px">Support Work</div>'+
          '<div style="font-size:12px;color:var(--tx2);padding:8px 10px;background:rgba(255,255,255,.02);border-radius:6px">'+support+'</div>'+
        '</div>'+
        (notes && notes!=='null' ? '<div style="font-size:11px;color:var(--warn);font-style:italic;padding-top:8px;border-top:1px solid var(--bd)">⚡ '+notes+'</div>' : '')+
      '</div>';
    }).join('');
  }

  var html = '<div class="pg-hd">'+
    '<div class="pg-title">Strength Program</div>'+
    '<div class="pg-sub">Progressive hybrid strength — Development → Maintenance → Freshness</div>'+
  '</div>'+

  // Current block callout
  '<div class="directive" style="margin-bottom:12px">'+
    '<div class="directive-label">Current block</div>'+
    '<div class="directive-text" style="font-size:12px">'+
      '<strong>'+currentBlock+'</strong> — based on W'+cw+' phase ('+String(planRow['Phase']||'')+').'+
      ' Strength prescription adjusts automatically as the season progresses.'+
    '</div>'+
  '</div>'+

  // Block tabs — one per training block
  '<div class="tab-row">'+
    blockKeys.map(function(b){
      return '<button class="tab-btn'+(activeBlock===b?' on':'')+ '" onclick="setStrTab(\''+b+'\')">'+b+'</button>';
    }).join('')+
    '<button class="tab-btn'+(STR_TAB==='phase'?' on':'')+ '" onclick="setStrTab(\'phase\')">Rules</button>'+
  '</div>';

  if(STR_TAB==='phase') {
    html +=
      '<div class="card">'+
        '<div class="card-title" style="margin-bottom:12px">Periodisation Rules</div>'+
        blockKeys.map(function(b){
          var rows = blocks[b];
          var sessions = rows.map(function(r){return String(r['Day']||'');}).join(' + ');
          var dose = rows[0] ? String(rows[0]['Dose']||'') : '';
          return '<div style="padding:12px 0;border-top:1px solid var(--bd)">'+
            '<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:5px">'+
              '<span style="font-family:\'Barlow Condensed\',sans-serif;font-size:14px;font-weight:800;color:var(--str)">'+b+'</span>'+
              '<span style="font-size:9px;color:var(--info);font-weight:700;text-transform:uppercase;letter-spacing:.5px">'+dose+'</span>'+
            '</div>'+
            '<div style="font-size:12px;color:var(--tx2);margin-bottom:4px">'+sessions+'</div>'+
            (rows[0] ? '<div style="font-size:11px;color:var(--warn)">'+rows.map(function(r){return String(r['Notes']||'');}).filter(function(n){return n&&n!=='null';}).join(' · ')+'</div>' : '')+
          '</div>';
        }).join('')+
      '</div>'+
      '<div class="card" style="margin-bottom:0">'+
        '<div class="card-title" style="margin-bottom:12px">Interference Rules</div>'+
        [
          ['Strength → Quality Run','24–48 hrs minimum between lower-body strength and intervals or tempo. Never the same day.'],
          ['Long Ride → Strength','No heavy lower-body strength within 24 hrs of a long ride. Upper body or core only if needed.'],
          ['Race week','Stop all strength 7 days before each A-race. Light neural activation only (glute bridges, band work).'],
          ['DOMS rule','If soreness alters your running gait, skip or shorten that strength session. Run quality wins.'],
          ['Key session clash','When in doubt between a strength session and a quality run on the same day, choose the run.']
        ].map(function(r){
          return '<div class="rg-row">'+
            '<div class="rg-lbl" style="color:var(--warn);width:115px;line-height:1.4">'+r[0]+'</div>'+
            '<div class="rg-desc">'+r[1]+'</div></div>';
        }).join('')+
      '</div>';
  } else if(activeBlock && blocks[activeBlock]) {
    html += blockCard(blocks[activeBlock]);
    // Cues per session type
    var cuesMap = {
      'Session A': ['Full depth squat before adding load — range of motion first','Hip hinge on RDL: feel hamstring load, not lower back','Bench + Row as superset: maintain scapular position on row','2–3 reps in reserve on main lift — this is not a test day'],
      'Session B': ['Deadlift: hinge pattern, bar grazes shins from floor to knee','Lat pulldown: initiate from scapula depression, not elbow pull','Walking lunges: knee tracks over second toe — single-leg control','Hanging leg raise: lock anterior pelvic tilt before raising'],
      'One light session': ['Move well, not hard','Activate glutes and posterior chain','Leave feeling better than you arrived','Skip if you are sore or fatigued before a race']
    };
    var sessionDays = blocks[activeBlock].map(function(r){return String(r['Day']||'');});
    sessionDays.forEach(function(day){
      var cues = cuesMap[day];
      if(cues) {
        html += '<div class="card" style="margin-bottom:10px">'+
          '<div class="card-title" style="margin-bottom:10px">Coaching Cues — '+day+'</div>'+
          cues.map(function(c){
            return '<div class="rg-dot-row"><div class="rg-dot" style="background:var(--str)"></div>'+c+'</div>';
          }).join('')+
        '</div>';
      }
    });
  }

  return html;
}

function setStrTab(t) { STR_TAB=t; document.getElementById('body').innerHTML=strPage(); }

// QUALITY PAGE  (from index.html — unique view)
// ═══════════════════════════════════════════
function qualityPage(data, cw) {
  var ws  = calcWeeks(data);
  var qm  = qualityMetrics(data, ws);
  var hist= historyRows(data);
  var labels = ws.map(function(w){ return 'W'+w.week; });

  var keyHighSessions = hist.filter(function(x){
    return ['race','long run','long ride','threshold','tempo','intervals'].indexOf(x.subtype) >= 0;
  }).slice(0, 15);

  document.getElementById('body').innerHTML =
    '<div class="pg-hd"><div class="pg-title">Quality & Durability</div>'+
    '<div class="pg-sub">Whether the work that matters most is landing</div></div>'+

    '<div class="kpi-strip">' +
      kpi('Key Hit %', qm.recentKeyPct!=null ? Math.round(qm.recentKeyPct*100)+'%' : '—', 'var(--warn)', 'Last 4 weeks') +
      kpi('Threshold', qm.thresholdCount4w, 'var(--run)', 'Sessions last 28d') +
      kpi('Readiness', qm.recentReadiness!=null ? qm.recentReadiness.toFixed(1) : '—', 'var(--info)', '4-week avg /10') +
    '</div>'+
    '<div class="kpi-strip">' +
      kpi('Best Long Run',  qm.bestLongRun  ? qm.bestLongRun+'km'  : '—', 'var(--run)', 'Completed') +
      kpi('Best Long Ride', qm.bestLongRide ? qm.bestLongRide+'km' : '—', 'var(--cyc)', 'Completed') +
      kpi('Avg Fatigue',    qm.recentFatigue!=null ? qm.recentFatigue.toFixed(1)+'/5' : '—', 'var(--alert)', 'Last 4 weeks') +
    '</div>'+

    // Durability cards
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">'+
      '<div class="card" style="margin:0">'+
        '<div class="card-title">Latest Long Run</div>'+
        (qm.latestLongRun
          ? '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:28px;font-weight:800;color:var(--run)">'+qm.latestLongRun.runKm+'km</div>'+
            '<div style="font-size:11px;color:var(--tx2);margin-top:3px">'+fmtDate(qm.latestLongRun.date)+'</div>'+
            '<div style="font-size:10px;color:var(--tx3);margin-top:3px">RPE '+qm.latestLongRun.rpe+'</div>'
          : '<div style="color:var(--tx3);font-size:12px">Not yet logged</div>')+
      '</div>'+
      '<div class="card" style="margin:0">'+
        '<div class="card-title">Latest Long Ride</div>'+
        (qm.latestLongRide
          ? '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:28px;font-weight:800;color:var(--cyc)">'+(qm.latestLongRide.cycKm||qm.latestLongRide.runKm)+'km</div>'+
            '<div style="font-size:11px;color:var(--tx2);margin-top:3px">'+fmtDate(qm.latestLongRide.date)+'</div>'+
            '<div style="font-size:10px;color:var(--tx3);margin-top:3px">RPE '+qm.latestLongRide.rpe+'</div>'
          : '<div style="color:var(--tx3);font-size:12px">Not yet logged</div>')+
      '</div>'+
    '</div>'+

    // Key session adherence chart
    '<div class="card">'+
      '<div class="card-title">Key Session Hit % by Week</div>'+
      '<div class="chart-wrap" style="height:160px"><canvas id="ql-key"></canvas></div>'+
      '<div style="display:flex;gap:12px;margin-top:8px">'+
        '<span style="font-size:10px;color:var(--info)">■ Key session hit %</span>'+
        '<span style="font-size:10px;color:var(--alert)">■ Avg fatigue /5×20</span>'+
      '</div>'+
    '</div>'+

    // High-value session table
    '<div class="card" style="margin-bottom:0">'+
      '<div class="card-title" style="margin-bottom:10px">Recent High-Value Sessions</div>'+
      (keyHighSessions.length
        ? keyHighSessions.map(function(x) {
            var kc = KC[x.kind]||KC['other'];
            var qCol = x.quality==='Hit'?'var(--ok)':x.quality==='Modified'?'var(--warn)':x.quality==='Partial'?'var(--cyc)':'var(--tx3)';
            return '<div style="padding:9px 0;border-top:1px solid var(--bd);display:flex;align-items:flex-start;gap:10px">'+
              '<div style="flex:1">'+
                '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">'+
                  '<span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:20px;background:'+kc.d+';color:'+kc.a+'">'+x.subtype+'</span>'+
                  (x.quality?'<span style="font-size:9px;font-weight:700;color:'+qCol+'">'+x.quality+'</span>':'')+''+
                '</div>'+
                '<div style="font-size:12px;font-weight:600">'+x.actual+'</div>'+
                '<div style="font-size:10px;color:var(--tx3);margin-top:2px">'+fmtDate(x.date)+' · W'+x.week+'</div>'+
              '</div>'+
              '<div style="text-align:right;flex-shrink:0">'+
                '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:16px;font-weight:800;color:var(--warn)">'+
                  (x.srpe!=null?Math.round(x.srpe):(x.dur&&x.rpe?Math.round(x.dur*x.rpe):'—'))+
                '</div>'+
                '<div style="font-size:9px;color:var(--tx3)">load</div>'+
              '</div>'+
            '</div>';
          }).join('')
        : '<div style="color:var(--tx3);font-size:12px;padding:12px 0">No high-value sessions logged yet</div>')+
    '</div>';

  mkChart('ql-key','bar',labels,[
    {label:'Key %', data:ws.map(function(w){ return w.keyPct!=null?Math.round(w.keyPct*100):null; }), backgroundColor:'rgba(10,132,255,.7)', borderRadius:3},
    {label:'Fatigue', data:ws.map(function(w){ return w.avgFatigue!=null?Math.round(w.avgFatigue*20):null; }), backgroundColor:'rgba(255,59,92,.5)', borderRadius:3, type:'line', borderColor:'#ff3b5c', pointRadius:3, fill:false}
  ],{maxY:100});
}
